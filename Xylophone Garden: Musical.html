<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xylophone Garden Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdf4ff; --border: #701a75; }
        .game-widget { 
            width: 100%; max-width: 320px; margin: 10px auto; font-family: 'Fredoka One', cursive; 
            background: var(--bg); padding: 15px; border-radius: 30px; border: 5px solid var(--border);
            text-align: center; touch-action: none; position: relative;
        }

        .xylo-frame { 
            display: flex; flex-direction: column; gap: 6px; align-items: center; 
            margin: 15px 0; padding: 10px; background: #f5d0fe; border-radius: 20px;
        }

        .bar {
            height: 38px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.4rem; transition: 0.2s; opacity: 0.5;
        }
        
        /* Each bar gets its own color and specific width */
        #b1 { width: 95%; background: #ef4444; }
        #b2 { width: 85%; background: #f97316; }
        #b3 { width: 75%; background: #facc15; }
        #b4 { width: 65%; background: #22c55e; }
        #b5 { width: 55%; background: #3b82f6; }

        .active-bar { opacity: 1 !important; transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.8); }

        .flower-tray { height: 80px; position: relative; background: #f0abfc; border-radius: 15px; margin-top: 10px; }

        .flower {
            width: 45px; height: 45px; position: absolute; cursor: grab;
            font-size: 32px; display: flex; align-items: center; justify-content: center;
            z-index: 10; transition: transform 0.1s;
        }
        .flower:active { cursor: grabbing; transform: scale(1.2); }
        .planted { display: none; } /* Hide the original once moved into the bar */

        .msg { font-size: 0.75rem; color: #a21caf; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="game-widget">
    <div style="color:var(--border); font-size:1.3rem;">Xylophone Garden</div>
    
    <div class="xylo-frame">
        <div id="b1" class="bar" data-id="1">1</div>
        <div id="b2" class="bar" data-id="2">2</div>
        <div id="b3" class="bar" data-id="3">3</div>
        <div id="b4" class="bar" data-id="4">4</div>
        <div id="b5" class="bar" data-id="5">5</div>
    </div>

    <div class="flower-tray" id="tray"></div>
    <div class="msg">MATCH THE COLORS TO THE BARS!</div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [261.63, 293.66, 329.63, 349.23, 392.00]; // C, D, E, F, G

    function playNote(f) {
        if (audio.state === 'suspended') audio.resume();
        const o=audio.createOscillator(), g=audio.createGain();
        o.type='sine'; o.frequency.value=f; g.gain.value=0.1;
        o.connect(g); g.connect(audio.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime+0.5);
        o.stop(audio.currentTime+0.5);
    }

    let score = 0;
    const tray = document.getElementById('tray');

    function init() {
        score = 0;
        tray.innerHTML = '';
        const emojis = ['🌹', '🍊', '🌻', '🌿', '💧']; // Colors: Red, Orange, Yellow, Green, Blue
        
        document.querySelectorAll('.bar').forEach(b => {
            b.classList.remove('active-bar');
            b.innerText = b.dataset.id;
        });

        for(let i=1; i<=5; i++) {
            const f = document.createElement('div');
            f.className = 'flower'; 
            f.innerText = emojis[i-1];
            f.style.left = (15 + (i-1)*55) + 'px';
            f.style.top = '15px';
            f.dataset.id = i;
            f.onpointerdown = startDrag;
            tray.appendChild(f);
        }
    }

    function startDrag(e) {
        const el = e.target;
        el.setPointerCapture(e.pointerId);
        const startX = e.clientX, startY = e.clientY;
        const origX = el.offsetLeft, origY = el.offsetTop;

        const onMove = (me) => {
            el.style.left = (origX + (me.clientX - startX)) + 'px';
            el.style.top = (origY + (me.clientY - startY)) + 'px';
        };

        const onUp = (ue) => {
            el.removeEventListener('pointermove', onMove);
            el.removeEventListener('pointerup', onUp);
            
            const targetBar = document.getElementById(`b${el.dataset.id}`);
            const rect = targetBar.getBoundingClientRect();
            
            // Checking if drop is inside the correct color bar
            if (ue.clientX > rect.left && ue.clientX < rect.right && 
                ue.clientY > rect.top && ue.clientY < rect.bottom) {
                
                score++;
                playNote(notes[el.dataset.id - 1]);
                targetBar.innerText = el.innerText;
                targetBar.classList.add('active-bar');
                el.remove();

                if(score === 5) {
                    setTimeout(() => {
                        notes.forEach((n, idx) => setTimeout(() => playNote(n), idx * 150));
                        setTimeout(init, 2000);
                    }, 500);
                }
            } else {
                // Return to tray
                el.style.left = (15 + (el.dataset.id-1)*55) + 'px';
                el.style.top = '15px';
            }
        };

        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
    }

    init();
</script>
</body>
</html>
