<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salam Adventures | Phonics Worksheet Generator - Easy, Middle, Hard Levels</title>
    <meta name="description" content="Free printable phonics worksheets for kids. Three difficulty levels: Easy, Middle, Hard. Perfect for early learners, ESL students, and classroom use.">
    <meta name="keywords" content="phonics worksheets, English for kids, Salam Adventures, literacy activities, ESL worksheets, beginning sounds, CVC words, digraphs">
    <meta name="author" content="Salam Adventures">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --accent: #f59e0b;
            --easy: #22c55e;
            --middle: #f97316;
            --hard: #ef4444;
            --secondary: #8b5cf6;
        }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #f0f9f0 0%, #dcfce7 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* Toolbar */
        .toolbar {
            max-width: 1200px;
            margin: 0 auto 25px auto;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            background: white;
            padding: 15px 28px;
            border-radius: 80px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid rgba(16,185,129,0.4);
        }

        .btn {
            padding: 10px 28px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-easy { background: var(--easy); color: white; }
        .btn-easy:hover { background: #16a34a; transform: translateY(-2px); }
        .btn-middle { background: var(--middle); color: white; }
        .btn-middle:hover { background: #ea580c; transform: translateY(-2px); }
        .btn-hard { background: var(--hard); color: white; }
        .btn-hard:hover { background: #dc2626; transform: translateY(-2px); }
        .btn-print { background: var(--secondary); color: white; }
        .btn-print:hover { background: #7c3aed; transform: translateY(-2px); }

        .status-pill {
            background: #f1f5f9;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-dark);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Level indicator */
        .level-badge {
            text-align: center;
            margin-bottom: 15px;
        }
        .level-tag {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }
        .level-easy { background: var(--easy); }
        .level-middle { background: var(--middle); }
        .level-hard { background: var(--hard); }

        /* A4 Worksheet */
        .worksheet {
            background: white;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 14mm 18mm;
            transition: all 0.2s;
        }

        /* Header with Logo */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #10b981, #059669);
            overflow: hidden;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-fallback {
            color: white;
            font-size: 42px;
            font-weight: bold;
        }

        .title h1 {
            color: var(--primary);
            font-size: 32px;
            margin: 0;
        }
        .title p {
            color: #475569;
            font-weight: 600;
            font-size: 14px;
            margin-top: 5px;
        }

        .student-info {
            background: #f8fafc;
            padding: 8px 18px;
            border-radius: 28px;
            font-size: 12px;
            text-align: right;
        }

        /* Phonics Sections */
        .section {
            margin: 28px 0 32px;
        }

        .section-title {
            background: #ecfdf5;
            padding: 6px 18px;
            border-left: 7px solid var(--primary);
            font-weight: 800;
            font-size: 18px;
            color: var(--primary-dark);
            margin-bottom: 20px;
            border-radius: 0 30px 30px 0;
            display: inline-block;
        }

        .sound-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
            margin: 20px 0;
        }

        .sound-card {
            background: #fefce8;
            border-radius: 24px;
            padding: 16px;
            text-align: center;
            border: 2px solid #fde68a;
        }

        .picture {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .word-fragment {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 4px;
            background: white;
            padding: 5px 10px;
            border-radius: 40px;
            display: inline-block;
            margin: 8px 0;
        }

        .blank {
            display: inline-block;
            width: 50px;
            border-bottom: 3px dashed var(--primary);
            margin: 0 6px;
            font-size: 26px;
            text-align: center;
        }

        .rhyme-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
        }

        .rhyme-card {
            background: #e0f2fe;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
        }

        .cvc-blocks {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }

        .cvc-block {
            background: #f3e8ff;
            border-radius: 20px;
            padding: 14px 20px;
            text-align: center;
            min-width: 120px;
        }

        .trace-line {
            border-bottom: 2px solid #cbd5e1;
            margin: 12px 0 20px;
            height: 40px;
            width: 100%;
        }

        .dotted-line {
            border-bottom: 2px dashed #94a3b8;
            margin: 8px 0;
            height: 32px;
        }

        .sentence-box {
            background: #fefce8;
            border-radius: 20px;
            padding: 16px;
            margin-top: 15px;
        }

        @media print {
            .toolbar { display: none; }
            body { background: white; padding: 0; margin: 0; }
            .worksheet { box-shadow: none; padding: 15mm; width: 100%; }
        }

        footer {
            text-align: center;
            font-size: 10px;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            margin-top: 35px;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn btn-easy" id="easyBtn">🌱 Easy Level</button>
    <button class="btn btn-middle" id="middleBtn">⭐ Middle Level</button>
    <button class="btn btn-hard" id="hardBtn">🔥 Hard Level</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ Print / PDF</button>
    <div class="status-pill" id="statusMsg">📚 Salam Phonics · Ready</div>
</div>

<div class="worksheet" id="worksheetContainer">
    <div style="text-align: center; padding: 60px;">🐛 Loading Salam Adventures Phonics...</div>
</div>

<script>
    // ==================== PHONICS DATA BY LEVEL ====================
    
    // EASY LEVEL: Beginning sounds, simple CVC, basic rhyming
    const easyData = {
        beginningSounds: [
            { emoji: "🐱", hint: "at", answer: "c" },
            { emoji: "🐕", hint: "og", answer: "d" },
            { emoji: "☀️", hint: "un", answer: "s" },
            { emoji: "🐭", hint: "ouse", answer: "m" },
            { emoji: "🐝", hint: "ee", answer: "b" },
            { emoji: "🐸", hint: "rog", answer: "f" }
        ],
        rhymeFamily: { base: "at", words: ["cat", "bat", "hat", "rat"] },
        cvcWords: [
            { word: "cat", picture: "🐱" },
            { word: "dog", picture: "🐕" },
            { word: "sun", picture: "☀️" }
        ],
        extra: "trace"
    };

    // MIDDLE LEVEL: Digraphs (sh, ch, th), blends, sentence writing
    const middleData = {
        digraphs: [
            { digraph: "sh", examples: ["ship", "fish"], emoji: "🚢" },
            { digraph: "ch", examples: ["chick", "lunch"], emoji: "🐥" },
            { digraph: "th", examples: ["thumb", "bath"], emoji: "👍" }
        ],
        blends: [
            { blend: "bl", word: "blue", emoji: "🔵" },
            { blend: "cr", word: "crab", emoji: "🦀" },
            { blend: "st", word: "star", emoji: "⭐" }
        ],
        rhymeFamily: { base: "ake", words: ["cake", "lake", "make", "rake"] },
        cvcWords: [
            { word: "frog", picture: "🐸" },
            { word: "nest", picture: "🪹" },
            { word: "milk", picture: "🥛" }
        ]
    };

    // HARD LEVEL: Complex blends, silent letters, spelling, sentence creation
    const hardData = {
        complexBlends: [
            { blend: "spl", word: "splash", emoji: "💦" },
            { blend: "str", word: "strong", emoji: "💪" },
            { blend: "scr", word: "screen", emoji: "🖥️" },
            { blend: "thr", word: "three", emoji: "3️⃣" }
        ],
        silentLetters: [
            { word: "knife", silent: "k", emoji: "🔪" },
            { word: "write", silent: "w", emoji: "✍️" },
            { word: "lamb", silent: "b", emoji: "🐑" }
        ],
        rhymeFamily: { base: "ight", words: ["light", "night", "bright", "fight"] },
        challengeWords: ["elephant", "butterfly", "adventure"]
    };

    let currentLevel = "easy";
    let currentLogoUrl = "https://salamtruthfulltd-alt.github.io/salam-adventures-games/Salam%20Adventures.png";

    // Helper: shuffle array
    function shuffle(arr) {
        let copy = [...arr];
        for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    }

    // Generate Easy Worksheet
    function generateEasy() {
        const sounds = shuffle(easyData.beginningSounds).slice(0, 5);
        const rhymeWords = shuffle(easyData.rhymeFamily.words);
        const cvc = shuffle(easyData.cvcWords);
        
        let soundsHtml = '';
        sounds.forEach(item => {
            soundsHtml += `
                <div class="sound-card">
                    <div class="picture">${item.emoji}</div>
                    <div class="word-fragment">
                        <span class="blank">___</span>${item.hint}
                    </div>
                    <div style="font-size:12px; margin-top:8px;">✏️ Write the first letter: ______</div>
                </div>
            `;
        });

        let rhymeHtml = `
            <div style="background:#fef9e3; border-radius:28px; padding:16px;">
                <div style="font-size:18px; font-weight:bold;">🎈 Words that rhyme with "${easyData.rhymeFamily.base}"</div>
                <div class="rhyme-row">
                    ${rhymeWords.slice(0, 4).map(w => `<div class="rhyme-card">🔊 ${w}</div>`).join('')}
                </div>
                <div class="trace-line"></div>
                <p>📝 Write 2 more words that rhyme:</p>
                <div class="dotted-line"></div>
                <div class="dotted-line"></div>
            </div>
        `;

        let cvcHtml = `<div class="cvc-blocks">`;
        cvc.forEach(item => {
            cvcHtml += `
                <div class="cvc-block">
                    <div style="font-size:42px;">${item.picture}</div>
                    <div style="font-weight:bold; font-size:24px; letter-spacing:2px;">_ ${item.word.slice(1)}</div>
                    <div class="dotted-line"></div>
                </div>
            `;
        });
        cvcHtml += `</div>`;

        return { soundsHtml, rhymeHtml, cvcHtml, levelName: "Easy", levelClass: "level-easy" };
    }

    // Generate Middle Worksheet
    function generateMiddle() {
        const digraphsList = shuffle(middleData.digraphs).slice(0, 3);
        const blendsList = shuffle(middleData.blends).slice(0, 3);
        const rhymeWords = shuffle(middleData.rhymeFamily.words);
        const cvc = shuffle(middleData.cvcWords);
        
        let digraphHtml = `<div style="background:#e6f7ff; border-radius:28px; padding:16px; margin-bottom:20px;">`;
        digraphsList.forEach(d => {
            digraphHtml += `
                <div style="display:flex; align-items:center; gap:12px; margin:12px 0; flex-wrap:wrap;">
                    <span style="font-size:36px;">${d.emoji}</span>
                    <span style="font-size:24px; font-weight:800; background:white; padding:4px 16px; border-radius:50px;">${d.digraph}</span>
                    <span style="font-size:14px;">Examples: ${d.examples.join(', ')}</span>
                </div>
                <div class="dotted-line"></div>
            `;
        });
        digraphHtml += `</div>`;

        let blendsHtml = `<div class="cvc-blocks">`;
        blendsList.forEach(b => {
            blendsHtml += `
                <div class="cvc-block">
                    <div style="font-size:38px;">${b.emoji}</div>
                    <div style="font-weight:bold; font-size:20px;"><span class="blank">___</span>${b.word.slice(b.blend.length)}</div>
                    <div style="font-size:12px;">Missing blend: ${b.blend}___</div>
                    <div class="dotted-line"></div>
                </div>
            `;
        });
        blendsHtml += `</div>`;

        let rhymeHtml = `
            <div style="background:#fef9e3; border-radius:28px; padding:16px; margin-top:15px;">
                <div style="font-size:18px; font-weight:bold;">🎈 Rhyme Time: "${middleData.rhymeFamily.base}" family</div>
                <div class="rhyme-row">
                    ${rhymeWords.slice(0, 4).map(w => `<div class="rhyme-card">🔊 ${w}</div>`).join('')}
                </div>
                <div class="sentence-box">
                    <strong>📝 Write a sentence using two of these rhyming words:</strong>
                    <div class="dotted-line"></div>
                    <div class="dotted-line"></div>
                </div>
            </div>
        `;

        return { digraphHtml, blendsHtml, rhymeHtml, levelName: "Middle", levelClass: "level-middle" };
    }

    // Generate Hard Worksheet
    function generateHard() {
        const blends = shuffle(hardData.complexBlends).slice(0, 3);
        const silent = shuffle(hardData.silentLetters);
        const rhymeWords = shuffle(hardData.rhymeFamily.words);
        const challenges = hardData.challengeWords;

        let blendsHtml = `<div style="background:#fef2f2; border-radius:28px; padding:16px; margin-bottom:20px;">`;
        blends.forEach(b => {
            blendsHtml += `
                <div style="display:flex; align-items:center; gap:12px; margin:12px 0; flex-wrap:wrap;">
                    <span style="font-size:38px;">${b.emoji}</span>
                    <span style="font-size:22px; font-weight:800;">${b.blend}</span>
                    <span style="font-size:20px;">→ ${b.word}</span>
                </div>
                <div class="dotted-line"></div>
            `;
        });
        blendsHtml += `</div>`;

        let silentHtml = `<div style="background:#f3e8ff; border-radius:28px; padding:16px;">`;
        silent.forEach(s => {
            silentHtml += `
                <div style="display:flex; align-items:center; gap:12px; margin:10px 0;">
                    <span style="font-size:36px;">${s.emoji}</span>
                    <span style="font-size:22px; font-weight:bold;">${s.word}</span>
                    <span style="font-size:14px;">(silent letter: ${s.silent})</span>
                </div>
                <div class="dotted-line"></div>
            `;
        });
        silentHtml += `</div>`;

        let challengeHtml = `
            <div style="background:#fefce8; border-radius:28px; padding:16px; margin-top:15px;">
                <div style="font-size:18px; font-weight:bold;">🏆 Challenge Words</div>
                <div class="rhyme-row">
                    ${challenges.map(w => `<div class="rhyme-card">📖 ${w}</div>`).join('')}
                </div>
                <div class="sentence-box">
                    <strong>✍️ Write a creative paragraph using at least 2 challenge words:</strong>
                    <div class="trace-line" style="height:80px;"></div>
                </div>
            </div>
        `;

        let rhymeHtml = `
            <div style="background:#e0f2fe; border-radius:28px; padding:16px; margin-top:15px;">
                <div style="font-size:18px; font-weight:bold;">🎈 Advanced Rhyming: "${hardData.rhymeFamily.base}"</div>
                <div class="rhyme-row">
                    ${rhymeWords.map(w => `<div class="rhyme-card">🔊 ${w}</div>`).join('')}
                </div>
                <div class="dotted-line"></div>
            </div>
        `;

        return { blendsHtml, silentHtml, challengeHtml, rhymeHtml, levelName: "Hard", levelClass: "level-hard" };
    }

    // Render the complete worksheet
    function renderWorksheet(level) {
        const container = document.getElementById('worksheetContainer');
        let content;
        let levelName, levelClass;

        if (level === 'easy') {
            content = generateEasy();
            levelName = content.levelName;
            levelClass = content.levelClass;
            const fullHtml = `
                <div class="header">
                    <div class="brand">
                        <div class="logo-container">
                            <img src="${currentLogoUrl}" alt="Salam Adventures Logo" class="logo-img" 
                                 onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'logo-fallback\\'>س</div>'">
                        </div>
                        <div class="title">
                            <h1>Salam Adventures</h1>
                            <p>Phonics Explorer · ${levelName} Level</p>
                        </div>
                    </div>
                    <div class="student-info">
                        🧒 Name: ___________________ <br>
                        📅 Date: ___________________
                    </div>
                </div>
                <div class="level-badge"><span class="level-tag ${levelClass}">🌱 ${levelName} Level · Beginning Sounds</span></div>
                <div class="section"><div class="section-title">🎯 Part 1: Beginning Sounds</div><div class="sound-grid">${content.soundsHtml}</div></div>
                <div class="section"><div class="section-title">🎵 Part 2: Rhyming Fun</div>${content.rhymeHtml}</div>
                <div class="section"><div class="section-title">🧩 Part 3: CVC Words</div>${content.cvcHtml}</div>
                <div class="section"><div class="section-title">✏️ Part 4: Trace & Write</div><div class="trace-line"></div><div class="trace-line"></div></div>
                <footer>🌟 Salam Adventures · Building confident readers · ${levelName} level 🌟</footer>
            `;
            container.innerHTML = fullHtml;
        } 
        else if (level === 'middle') {
            content = generateMiddle();
            levelName = content.levelName;
            levelClass = content.levelClass;
            const fullHtml = `
                <div class="header">
                    <div class="brand">
                        <div class="logo-container">
                            <img src="${currentLogoUrl}" alt="Salam Adventures Logo" class="logo-img" 
                                 onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'logo-fallback\\'>س</div>'">
                        </div>
                        <div class="title">
                            <h1>Salam Adventures</h1>
                            <p>Phonics Explorer · ${levelName} Level</p>
                        </div>
                    </div>
                    <div class="student-info">
                        🧒 Name: ___________________ <br>
                        📅 Date: ___________________
                    </div>
                </div>
                <div class="level-badge"><span class="level-tag ${levelClass}">⭐ ${levelName} Level · Digraphs & Blends</span></div>
                <div class="section"><div class="section-title">🔗 Part 1: Digraph Discovery</div>${content.digraphHtml}</div>
                <div class="section"><div class="section-title">🔤 Part 2: Beginning Blends</div>${content.blendsHtml}</div>
                <div class="section"><div class="section-title">🎵 Part 3: Rhyming & Sentences</div>${content.rhymeHtml}</div>
                <footer>🌟 Salam Adventures · Building confident readers · ${levelName} level 🌟</footer>
            `;
            container.innerHTML = fullHtml;
        } 
        else if (level === 'hard') {
            content = generateHard();
            levelName = content.levelName;
            levelClass = content.levelClass;
            const fullHtml = `
                <div class="header">
                    <div class="brand">
                        <div class="logo-container">
                            <img src="${currentLogoUrl}" alt="Salam Adventures Logo" class="logo-img" 
                                 onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'logo-fallback\\'>س</div>'">
                        </div>
                        <div class="title">
                            <h1>Salam Adventures</h1>
                            <p>Phonics Explorer · ${levelName} Level</p>
                        </div>
                    </div>
                    <div class="student-info">
                        🧒 Name: ___________________ <br>
                        📅 Date: ___________________
                    </div>
                </div>
                <div class="level-badge"><span class="level-tag ${levelClass}">🔥 ${levelName} Level · Advanced Phonics</span></div>
                <div class="section"><div class="section-title">🌀 Part 1: Complex Blends</div>${content.blendsHtml}</div>
                <div class="section"><div class="section-title">🔇 Part 2: Silent Letters</div>${content.silentHtml}</div>
                <div class="section"><div class="section-title">🎵 Part 3: Advanced Rhyming</div>${content.rhymeHtml}</div>
                <div class="section"><div class="section-title">🏆 Part 4: Challenge Words</div>${content.challengeHtml}</div>
                <footer>🌟 Salam Adventures · Building confident readers · ${levelName} level 🌟</footer>
            `;
            container.innerHTML = fullHtml;
        }

        document.getElementById('statusMsg').innerHTML = `📚 ${levelName} level worksheet ready!`;
        setTimeout(() => {
            document.getElementById('statusMsg').innerHTML = '📚 Salam Phonics · Ready';
        }, 2000);
    }

    // Event Listeners
    document.getElementById('easyBtn').addEventListener('click', () => { currentLevel = 'easy'; renderWorksheet('easy'); });
    document.getElementById('middleBtn').addEventListener('click', () => { currentLevel = 'middle'; renderWorksheet('middle'); });
    document.getElementById('hardBtn').addEventListener('click', () => { currentLevel = 'hard'; renderWorksheet('hard'); });

    // Initial load
    renderWorksheet('easy');
</script>
</body>
</html>
