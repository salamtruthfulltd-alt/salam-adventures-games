<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixed Mystery: Shape Collector</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdf4ff; --primary: #86198f; --accent: #f5d0fe; }
        body { margin: 0; background: #701a75; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Fredoka One', cursive; overflow: hidden; }

        .game-card { 
            width: 100%; max-width: 340px; background: white; padding: 20px; 
            border-radius: 35px; border: 6px solid var(--accent); text-align: center;
            box-shadow: 0 15px 0 #4a044e; position: relative; touch-action: none;
        }

        .recipe-box {
            background: var(--accent); padding: 10px; border-radius: 20px;
            margin-bottom: 15px; display: flex; justify-content: center; gap: 15px;
            border: 2px dashed var(--primary);
        }

        .recipe-item { font-size: 0.9rem; color: var(--primary); display: flex; flex-direction: column; align-items: center; }
        .recipe-count { font-size: 1.2rem; margin-bottom: 2px; }

        #collection-zone {
            width: 200px; height: 100px; background: #faf5ff; border: 4px solid #d8b4fe;
            margin: 0 auto 15px; border-radius: 20px; position: relative;
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center; overflow: hidden;
        }

        .shape { width: 40px; height: 40px; position: absolute; cursor: grab; z-index: 10; transition: transform 0.1s; }
        
        /* Shape Visuals */
        .star { 
            background: #facc15; 
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
        .triangle { 
            background: #22c55e; 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        .square { background: #3b82f6; border-radius: 4px; }

        .placed { pointer-events: none; position: static !important; transform: scale(0.6) !important; margin: -5px; }

        .tray { height: 180px; background: #fdf4ff; border-radius: 20px; position: relative; border: 2px solid #f5d0fe; overflow: hidden; }
        .level-text { color: #a21caf; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="game-card">
    <div id="recipe" class="recipe-box">
        </div>
    
    <div id="collection-zone"></div>
    <div class="tray" id="tray"></div>
    <div id="level-indicator" class="level-text">LEVEL 1: MIXED COUNTING</div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    let level = 1;
    let currentRecipe = {};
    let collected = {};
    let shapesInPlay = [];

    function playTone(f, dur=0.2) {
        if (audio.state === 'suspended') audio.resume();
        const o=audio.createOscillator(), g=audio.createGain();
        o.type='sine'; o.frequency.value=f; g.gain.value=0.1;
        o.connect(g); g.connect(audio.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime+dur);
        o.stop(audio.currentTime+dur);
    }

    function init() {
        const tray = document.getElementById('tray');
        const recipeEl = document.getElementById('recipe');
        const zone = document.getElementById('collection-zone');
        tray.innerHTML = ''; recipeEl.innerHTML = ''; zone.innerHTML = '';
        shapesInPlay = [];
        
        // Define targets based on your request
        currentRecipe = { triangle: 2, star: 1, square: 3 };
        collected = { triangle: 0, star: 0, square: 0 };
        const totalToCollect = 6; // 2+1+3

        // Display Recipe
        for (const [shape, qty] of Object.entries(currentRecipe)) {
            const item = document.createElement('div');
            item.className = 'recipe-item';
            item.innerHTML = `<span class="recipe-count" id="count-${shape}">0/${qty}</span><div class="shape ${shape}" style="position:static; transform:scale(0.5)"></div>`;
            recipeEl.appendChild(item);
        }

        // Spawn logic: Spawn required + extra distractors as level increases
        const spawnCount = totalToCollect + (level * 2);
        const types = ['triangle', 'star', 'square'];

        for(let i=0; i < spawnCount; i++) {
            const s = document.createElement('div');
            const type = types[i % 3];
            s.className = `shape ${type}`;
            s.dataset.type = type;
            
            const data = {
                el: s,
                x: Math.random() * 260,
                y: Math.random() * 120,
                vx: (Math.random() - 0.5) * (level - 1),
                vy: (Math.random() - 0.5) * (level - 1),
                rot: 0,
                vr: (Math.random() - 0.5) * (level * 2),
                active: true
            };

            s.style.left = data.x + 'px';
            s.style.top = data.y + 'px';
            s.onpointerdown = (e) => startDrag(e, data);
            tray.appendChild(s);
            shapesInPlay.push(data);
        }
        if(level > 1) requestAnimationFrame(updatePhysics);
    }

    function updatePhysics() {
        shapesInPlay.forEach(s => {
            if(!s.active) return;
            s.x += s.vx; s.y += s.vy; s.rot += s.vr;
            if(s.x < 0 || s.x > 280) s.vx *= -1;
            if(s.y < 0 || s.y > 140) s.vy *= -1;
            s.el.style.left = s.x + 'px';
            s.el.style.top = s.y + 'px';
            s.el.style.transform = `rotate(${s.rot}deg)`;
        });
        if(level > 1) requestAnimationFrame(updatePhysics);
    }

    function startDrag(e, data) {
        const el = data.el;
        data.active = false;
        el.setPointerCapture(e.pointerId);
        const sX = e.clientX, sY = e.clientY, oX = el.offsetLeft, oY = el.offsetTop;

        const onMove = (me) => {
            el.style.left = (oX + (me.clientX - sX)) + 'px';
            el.style.top = (oY + (me.clientY - startY)) + 'px'; // Note: simplified Y
            el.style.left = (oX + (me.clientX - sX)) + 'px';
            el.style.top = (oY + (me.clientY - sY)) + 'px';
        };

        const onUp = (ue) => {
            el.removeEventListener('pointermove', onMove);
            el.removeEventListener('pointerup', onUp);
            const r = document.getElementById('collection-zone').getBoundingClientRect();
            
            if (ue.clientX > r.left && ue.clientX < r.right && ue.clientY > r.top && ue.clientY < r.bottom) {
                const type = el.dataset.type;
                if(collected[type] < currentRecipe[type]) {
                    collected[type]++;
                    document.getElementById(`count-${type}`).innerText = `${collected[type]}/${currentRecipe[type]}`;
                    el.classList.add('placed');
                    el.style.transform = 'scale(0.6)';
                    document.getElementById('collection-zone').appendChild(el);
                    playTone(400 + (Object.values(collected).reduce((a,b)=>a+b) * 100));
                    checkWin();
                } else {
                    playTone(150); // Too many!
                    data.active = true;
                }
            } else {
                data.active = true;
            }
        };
        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
    }

    function checkWin() {
        const win = Object.keys(currentRecipe).every(k => collected[k] === currentRecipe[k]);
        if(win) {
            playTone(800, 0.5);
            level++;
            document.getElementById('level-indicator').innerText = `LEVEL ${level}: GETTING HARDER!`;
            setTimeout(init, 2000);
        }
    }

    init();
</script>
</body>
</html>
