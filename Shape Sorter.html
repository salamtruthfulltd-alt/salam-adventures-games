<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Quest: Level Up Counting</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --primary: #6366f1; --success: #22c55e; }
        body { margin: 0; background: #334155; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Fredoka One', cursive; overflow: hidden; }

        .game-card { 
            width: 100%; max-width: 340px; background: white; padding: 20px; 
            border-radius: 35px; border: 6px solid var(--primary); text-align: center;
            box-shadow: 0 15px 0 #312e81; position: relative; touch-action: none;
        }

        /* Level Indicator */
        .level-badge { background: #e0e7ff; color: var(--primary); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; display: inline-block; margin-bottom: 10px; }

        /* The Collector Bin */
        #shape-bin {
            width: 180px; height: 100px; border: 4px dashed #94a3b8;
            margin: 0 auto 20px; border-radius: 25px; background: #f1f5f9;
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
            gap: 5px; padding: 10px; position: relative; transition: 0.3s;
        }

        .bin-active { border-color: var(--success) !important; background: #f0fdf4 !important; transform: scale(1.05); }

        /* Shape CSS */
        .shape { width: 45px; height: 45px; position: absolute; cursor: grab; z-index: 10; user-select: none; }
        
        .circle { background: #ef4444; border-radius: 50%; }
        .square { background: #3b82f6; border-radius: 6px; }
        .triangle { 
            background: none !important; width: 0; height: 0; 
            border-left: 23px solid transparent; border-right: 23px solid transparent; 
            border-bottom: 40px solid #facc15; 
        }

        .placed { pointer-events: none; position: static !important; transform: scale(0.6) !important; animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(0.6); } }

        .tray { height: 160px; background: #f8fafc; border-radius: 25px; position: relative; border: 3px solid #cbd5e1; overflow: hidden; }
        .instruction { font-size: 1.2rem; color: #1e1b4b; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="game-card">
    <div id="lvl-text" class="level-badge">LEVEL 1: EASY</div>
    <div class="instruction">Find 5 <span id="target-name">Shapes</span></div>
    
    <div id="shape-bin"></div>
    <div class="tray" id="tray"></div>

    <div style="margin-top:15px; color:#64748b; font-size:0.9rem">STARS: <span id="cur-count" style="color:var(--primary)">0</span> / 5</div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const shapeTypes = ['circle', 'square', 'triangle'];
    let level = 1;
    let targetShape = '';
    let count = 0;
    let shapesInPlay = [];

    function playTone(f, dur=0.2) {
        if (audio.state === 'suspended') audio.resume();
        const o=audio.createOscillator(), g=audio.createGain();
        o.type='sine'; o.frequency.value=f; g.gain.value=0.1;
        o.connect(g); g.connect(audio.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime+dur);
        o.stop(audio.currentTime+dur);
    }

    function init() {
        count = 0;
        shapesInPlay = [];
        document.getElementById('cur-count').innerText = count;
        document.getElementById('shape-bin').innerHTML = '';
        document.getElementById('shape-bin').classList.remove('bin-active');
        const tray = document.getElementById('tray');
        tray.innerHTML = '';

        // Set Level Difficulty
        const lvlBadge = document.getElementById('lvl-text');
        if(level === 1) lvlBadge.innerText = "LEVEL 1: EASY";
        else if(level === 2) lvlBadge.innerText = "LEVEL 2: MIXED";
        else lvlBadge.innerText = "LEVEL 3: MOVING!";

        // Pick Target
        targetShape = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
        const nameEl = document.getElementById('target-name');
        nameEl.innerText = targetShape.toUpperCase() + 'S';
        nameEl.style.color = (targetShape === 'circle' ? '#ef4444' : targetShape === 'square' ? '#3b82f6' : '#eab308');

        // Spawn logic
        const totalToSpawn = level === 1 ? 5 : 10;
        for(let i=0; i < totalToSpawn; i++) {
            const s = document.createElement('div');
            let type;
            if(level === 1) type = targetShape;
            else type = i < 5 ? targetShape : shapeTypes.filter(x => x !== targetShape)[Math.floor(Math.random()*2)];

            s.className = `shape ${type}`;
            s.dataset.type = type;
            s.style.left = Math.random() * 250 + 'px';
            s.style.top = Math.random() * 100 + 'px';
            
            const data = {
                el: s,
                x: Math.random() * 250,
                y: Math.random() * 100,
                vx: (Math.random() - 0.5) * (level === 3 ? 3 : 0),
                vy: (Math.random() - 0.5) * (level === 3 ? 3 : 0),
                active: true
            };

            s.onpointerdown = (e) => startDrag(e, data);
            tray.appendChild(s);
            shapesInPlay.push(data);
        }
        if(level === 3) requestAnimationFrame(updatePhysics);
    }

    function updatePhysics() {
        if(level !== 3) return;
        shapesInPlay.forEach(s => {
            if(!s.active) return;
            s.x += s.vx; s.y += s.vy;
            if(s.x < 0 || s.x > 260) s.vx *= -1;
            if(s.y < 0 || s.y > 110) s.vy *= -1;
            s.el.style.left = s.x + 'px';
            s.el.style.top = s.y + 'px';
        });
        requestAnimationFrame(updatePhysics);
    }

    function startDrag(e, data) {
        const el = data.el;
        data.active = false; // Stop physics while dragging
        el.setPointerCapture(e.pointerId);
        const sX = e.clientX, sY = e.clientY, oX = el.offsetLeft, oY = el.offsetTop;

        const onMove = (me) => {
            el.style.left = (oX + (me.clientX - sX)) + 'px';
            el.style.top = (oY + (me.clientY - sY)) + 'px';
        };

        const onUp = (ue) => {
            el.removeEventListener('pointermove', onMove);
            el.removeEventListener('pointerup', onUp);
            const bin = document.getElementById('shape-bin');
            const r = bin.getBoundingClientRect();
            
            if (ue.clientX > r.left && ue.clientX < r.right && ue.clientY > r.top && ue.clientY < r.bottom) {
                if(el.dataset.type === targetShape) {
                    count++;
                    document.getElementById('cur-count').innerText = count;
                    el.classList.add('placed');
                    bin.appendChild(el);
                    bin.classList.add('bin-active');
                    setTimeout(() => bin.classList.remove('bin-active'), 300);
                    playTone(400 + (count * 100));

                    if(count === 5) {
                        playTone(800, 0.4);
                        level = level < 3 ? level + 1 : 1;
                        setTimeout(init, 1500);
                    }
                } else {
                    playTone(100, 0.3); // Error sound
                    data.active = true;
                }
            } else {
                data.active = true; // Resume physics
            }
        };
        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
    }

    init();
</script>
</body>
</html>
