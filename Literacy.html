<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salam Adventures | Mixed Literacy Master</title>
    <style>
        :root { --primary: #10b981; --secondary: #3b82f6; --accent: #f59e0b; --ink: #1f2937; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; margin: 0; padding: 20px; color: var(--ink); }
        
        .controls { 
            background: white; padding: 15px; border-radius: 12px; border: 2px solid var(--primary);
            max-width: 800px; margin: 0 auto 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;
        }
        button { padding: 10px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gen { background: var(--primary); color: white; }
        .btn-step { background: var(--accent); color: white; }
        .btn-print { background: var(--secondary); color: white; }
        .generator-status { 
            background: #fef3c7; padding: 8px 15px; border-radius: 20px; font-size: 12px;
            display: inline-block; margin: 0 auto; text-align: center;
        }

        .page { 
            background: white; width: 210mm; min-height: 297mm; padding: 15mm; 
            margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative;
            box-sizing: border-box;
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .logo-img { width: 80px; height: auto; }
        
        .section-title { background: #ecfdf5; padding: 6px 12px; color: var(--primary); font-weight: 800; margin: 18px 0 8px; border-radius: 5px; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; border-left: 4px solid var(--primary); }

        .flex-row { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
        .column { flex: 1; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; min-width: 120px; }
        
        .word-tag { display: inline-block; padding: 4px 10px; background: #f3f4f6; border-radius: 15px; margin: 3px; font-size: 13px; font-weight: 600; }
        .blank-line { border-bottom: 1px solid #000; width: 100%; height: 25px; display: block; margin: 5px 0; }
        
        .abc-item { margin-bottom: 8px; font-size: 15px; }

        @media print {
            .controls { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .page { box-shadow: none; border: none; margin: 0; width: 100%; padding: 15mm; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

<div class="controls">
    <button class="btn-gen" onclick="generateFullPage()">✨ Generate Full Worksheet</button>
    <button class="btn-step" onclick="nextGeneratorStep()">⚡ Next Generator Step</button>
    <button class="btn-print" onclick="window.print()">🖨️ Print Worksheet</button>
</div>

<div style="text-align: center; margin-bottom: 10px;">
    <span class="generator-status" id="generatorStatus">⚙️ Generator ready</span>
</div>

<div class="page" id="main-page"></div>

<script>
    // ============ DATA SOURCES (like Python lists) ============
    const nouns = ["Apple", "Teacher", "London", "Cat", "Table", "Dog", "School"];
    const verbs = ["Jump", "Sing", "Read", "Run", "Sleep", "Write", "Draw"];
    const opposites = [
        {a: "Hot", b: "Cold"}, {a: "Fast", b: "Slow"}, 
        {a: "Big", b: "Small"}, {a: "Up", b: "Down"},
        {a: "Happy", b: "Sad"}, {a: "Day", b: "Night"}
    ];
    const abcWords = ["Zebra", "Apple", "Monkey", "Glass", "Bird", "Yarn", "Ocean", "Kite", "Cat", "Dog"];
    
    // ============ JAVASCRIPT GENERATOR FUNCTION (yields each part) ============
    function* worksheetGenerator() {
        // Step 1: Randomize all data
        const mixedGrammar = [...nouns.slice(0,4), ...verbs.slice(0,4)].sort(() => 0.5 - Math.random());
        yield { part: 1, type: "Grammar Sort", data: mixedGrammar, message: "✅ Part 1 generated: Grammar words mixed!" };
        
        const shuffledABC = [...abcWords].sort(() => 0.5 - Math.random()).slice(0, 5);
        yield { part: 3, type: "Alphabetical Order", data: shuffledABC, message: "✅ Part 3 generated: New ABC words ready!" };
        
        const shuffledOpposites = [...opposites].sort(() => 0.5 - Math.random()).slice(0, 4);
        const leftOpposites = shuffledOpposites.map(o => o.a);
        const rightOpposites = shuffledOpposites.map(o => o.b);
        const shuffledRight = [...rightOpposites].sort(() => 0.5 - Math.random());
        yield { part: 2, type: "Opposites Match", left: leftOpposites, right: shuffledRight, message: "✅ Part 2 generated: New opposite pairs!" };
        
        // Final yield with complete data
        yield { 
            complete: true, 
            mixedGrammar, shuffledABC, leftOpposites, shuffledRight,
            message: "🎉 All parts generated! Worksheet ready to print."
        };
    }

    let currentGenerator = null;
    let lastData = null;

    // Function to generate the FULL page (like your original)
    function generateFullPage() {
        // Reset and run the generator fully
        const gen = worksheetGenerator();
        let result = gen.next();
        let finalData = null;
        
        while (!result.done) {
            if (result.value.complete) {
                finalData = result.value;
            }
            result = gen.next();
        }
        
        if (finalData) {
            renderWorksheet(finalData);
            document.getElementById('generatorStatus').innerHTML = '✅ Full worksheet generated! ' + finalData.message;
        }
    }
    
    // Step through generator one yield at a time
    function nextGeneratorStep() {
        if (!currentGenerator || lastData?.complete) {
            // Start new generator
            currentGenerator = worksheetGenerator();
            lastData = null;
        }
        
        const result = currentGenerator.next();
        
        if (!result.done) {
            const stepData = result.value;
            if (stepData.complete) {
                // Final step
                renderWorksheet(stepData);
                lastData = stepData;
                document.getElementById('generatorStatus').innerHTML = '✨ ' + stepData.message;
                currentGenerator = null;
            } else {
                // Partial step - show progress
                document.getElementById('generatorStatus').innerHTML = `⚡ ${stepData.message} (${stepData.type}) - Click again for next part`;
                
                // Store partial data
                if (!lastData) lastData = {};
                if (stepData.part === 1) lastData.mixedGrammar = stepData.data;
                if (stepData.part === 3) lastData.shuffledABC = stepData.data;
                if (stepData.part === 2) {
                    lastData.leftOpposites = stepData.left;
                    lastData.shuffledRight = stepData.right;
                }
                
                // Show partial worksheet
                if (lastData.mixedGrammar || lastData.shuffledABC || lastData.leftOpposites) {
                    renderWorksheet(lastData, true);
                }
            }
        } else if (currentGenerator) {
            document.getElementById('generatorStatus').innerHTML = '✅ Generator complete! Click "Generate Full" for new worksheet.';
            currentGenerator = null;
        }
    }
    
    // Render the worksheet (same as your original render function)
    function renderWorksheet(data, isPartial = false) {
        const page = document.getElementById('main-page');
        
        const mixedGrammar = data.mixedGrammar || [...nouns.slice(0,4), ...verbs.slice(0,4)].sort(() => 0.5 - Math.random());
        const shuffledABC = data.shuffledABC || [...abcWords].sort(() => 0.5 - Math.random()).slice(0, 5);
        const leftOpposites = data.leftOpposites || opposites.slice(0,4).map(o => o.a);
        const shuffledRight = data.shuffledRight || opposites.slice(0,4).map(o => o.b).sort(() => 0.5 - Math.random());
        
        page.innerHTML = `
            <div class="header">
                <div style="display:flex; align-items:center; gap:15px; flex-wrap:wrap;">
                    <div style="width:80px; height:80px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:14px;">
                        SALAM
                    </div>
                    <div>
                        <h1 style="margin:0; color:var(--primary); font-size:24px;">Salam Adventures</h1>
                        <p style="margin:0; font-size:13px; font-weight:bold; color:#64748b;">Mixed Literacy Expedition: Level 2</p>
                        ${isPartial ? '<p style="margin:5px 0 0; color:#f59e0b; font-size:11px;">⚠️ Partial generator view - click "Next Step" to add more</p>' : ''}
                    </div>
                </div>
                <div style="text-align:right; font-size:11px;">
                    <b>NAME:</b> ____________________ <br>
                    <b>DATE:</b> ____________________
                </div>
            </div>

            <div class="section-title">Part 1: Grammar Sort (Noun vs. Verb)</div>
            <div style="text-align:center; margin-bottom:10px;">
                ${mixedGrammar.map(w => `<span class="word-tag">${w}</span>`).join('')}
            </div>
            <div class="flex-row">
                <div class="column">
                    <b style="color:var(--secondary)">NOUNS (Naming)</b>
                    <span class="blank-line"></span><span class="blank-line"></span><span class="blank-line"></span><span class="blank-line"></span>
                </div>
                <div class="column">
                    <b style="color:var(--primary)">VERBS (Action)</b>
                    <span class="blank-line"></span><span class="blank-line"></span><span class="blank-line"></span><span class="blank-line"></span>
                </div>
            </div>

            <div class="section-title">Part 2: Opposites Match</div>
            <p style="font-size:12px; margin:0 0 10px;">Draw a line to connect the words with opposite meanings.</p>
            <div style="display:flex; justify-content:space-around; font-size:15px; font-weight:bold; padding:0 20px; flex-wrap:wrap;">
                <div style="line-height:2.5; min-width:100px;">
                    ${leftOpposites.map(o => `<div>${o} •</div>`).join('')}
                </div>
                <div style="line-height:2.5; min-width:100px;">
                    ${shuffledRight.map(o => `<div>• ${o}</div>`).join('')}
                </div>
            </div>

            <div class="section-title">Part 3: Alphabetical Order</div>
            <p style="font-size:12px; margin:0 0 10px;">Rewrite these words in ABC order: <b>${shuffledABC.join(", ")}</b></p>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                ${shuffledABC.map((w, i) => `<div class="abc-item">${i+1}. ____________________</div>`).join('')}
            </div>

            <div class="section-title">Part 4: Compound Word Bridge</div>
            <p style="font-size:12px; margin:0 0 10px;">Join two words to make one new word!</p>
            <div style="font-size:15px; line-height:2;">
                1. Rain + Bow = ____________________ <br>
                2. Foot + Ball = ____________________ <br>
                3. Sun + Flower = ____________________
            </div>

            <div class="section-title">Part 5: Sentence Builder</div>
            <p style="font-size:12px; margin:0 0 10px;">Write a sentence using one <b>Noun</b> and one <b>Verb</b> from Part 1.</p>
            <div style="border: 1px solid #e5e7eb; height: 60px; border-radius: 8px; margin-top:5px; padding:10px; color:#9ca3af; background: #fefce8;">__________________________________________________________________</div>

            <div style="margin-top: 30px; text-align:center; font-size:10px; color:#9ca3af; border-top:1px solid #eee; padding-top:12px;">
                © Salam Adventures • Mixed Literacy Skills • Master the Journey!
            </div>
        `;
    }
    
    // Initial load
    generateFullPage();
</script>
</body>
</html>
