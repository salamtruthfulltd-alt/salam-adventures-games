<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Math Snack Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #8b5cf6; --bg: #f5f3ff; --green: #10b981; }
        .game-card { 
            width: 100%; max-width: 300px; margin: 10px auto; 
            font-family: 'Fredoka One', cursive; background: #ddd6fe; 
            padding: 15px; border-radius: 25px; border: 4px solid var(--purple);
            touch-action: none; position: relative;
        }
        
        #box { 
            width: 100%; height: 160px; background: white; border-radius: 20px; 
            position: relative; margin-bottom: 15px; border: 3px dashed var(--purple);
            display: flex; align-items: center; justify-content: center;
        }
        
        .monster { font-size: 70px; transition: 0.2s; user-select: none; z-index: 1; }
        .yum { transform: scale(1.4); }

        .tray { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; min-height: 90px; }
        
        .snack { 
            font-size: 32px; cursor: grab; user-select: none; 
            touch-action: none; position: relative; z-index: 10;
        }
        .snack:active { cursor: grabbing; }

        .ui { color: #4c1d95; font-size: 1.1rem; margin-bottom: 10px; }
        .score { font-size: 0.8rem; color: #6d28d9; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="ui">Feed Me <span id="target" style="color:var(--green)">0</span> Snacks</div>
    
    <div id="box">
        <div id="m-face" class="monster">👾</div>
    </div>

    <div class="tray" id="tray"></div>
    
    <div class="score">EATEN: <span id="count">0</span></div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(f) {
        const o=audio.createOscillator(), g=audio.createGain();
        o.type='sine'; o.frequency.value=f; g.gain.value=0.1;
        o.connect(g); g.connect(audio.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime+0.2);
        o.stop(audio.currentTime+0.2);
    }

    let goal=0, fed=0;
    const foods = ['🍎','🍪','🍩','🍓','🍕'];
    const monster = document.getElementById('m-face');
    const box = document.getElementById('box');

    function start() {
        goal = Math.floor(Math.random()*8)+2;
        fed = 0;
        document.getElementById('target').innerText = goal;
        document.getElementById('count').innerText = fed;
        monster.innerText = '👾';
        
        const tray = document.getElementById('tray');
        tray.innerHTML = '';
        const food = foods[Math.floor(Math.random()*foods.length)];
        
        for(let i=0; i<12; i++) {
            const s = document.createElement('div');
            s.className = 'snack'; s.innerText = food;
            s.onpointerdown = dragStart; // Better for mobile + mouse
            tray.appendChild(s);
        }
    }

    function dragStart(e) {
        const el = e.target;
        el.setPointerCapture(e.pointerId);
        
        const startX = e.clientX;
        const startY = e.clientY;

        const onMove = (me) => {
            const dx = me.clientX - startX;
            const dy = me.clientY - startY;
            el.style.transform = `translate(${dx}px, ${dy}px)`;
        };

        const onUp = (ue) => {
            el.removeEventListener('pointermove', onMove);
            el.removeEventListener('pointerup', onUp);
            
            // Fix: Check if snack is inside the Monster Box bounds
            const mRect = box.getBoundingClientRect();
            if (ue.clientX >= mRect.left && ue.clientX <= mRect.right &&
                ue.clientY >= mRect.top && ue.clientY <= mRect.bottom) {
                eat(el);
            } else {
                el.style.transform = 'none';
            }
        };

        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
    }

    function eat(el) {
        fed++;
        el.remove();
        document.getElementById('count').innerText = fed;
        
        monster.innerText = '🤤';
        monster.classList.add('yum');
        playBeep(300 + (fed * 60));

        setTimeout(() => {
            monster.classList.remove('yum');
            if (fed === goal) {
                monster.innerText = '🥳';
                playBeep(600);
                setTimeout(start, 1500);
            } else if (fed > goal) {
                monster.innerText = '🤢';
                playBeep(150);
                setTimeout(start, 1000);
            } else {
                monster.innerText = '👾';
            }
        }, 300);
    }

    start();
</script>
</body>
</html>
