<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Math Snack</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --main: #8b5cf6; --accent: #ddd6fe; --monster: #10b981; }
        .game-box { width: 100%; max-width: 300px; margin: 10px auto; font-family: 'Fredoka One', cursive; text-align: center; background: var(--accent); padding: 15px; border-radius: 25px; border: 4px solid var(--main); }
        
        /* The Feeding Area */
        #drop-zone { width: 100%; height: 180px; background: white; border-radius: 20px; position: relative; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 3px dashed var(--main); }
        
        .monster { font-size: 80px; transition: transform 0.2s; z-index: 2; }
        .monster.eat { transform: scale(1.3); }
        
        /* The Snacks */
        .snack-tray { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; min-height: 80px; }
        .snack { font-size: 35px; cursor: grab; transition: transform 0.1s; touch-action: none; user-select: none; }
        .snack:active { cursor: grabbing; }
        
        .target-ui { font-size: 1.2rem; color: #4c1d95; margin-bottom: 10px; }
        #status { font-size: 0.8rem; color: #7c3aed; margin-top: 10px; }
    </style>
</head>
<body>

<div class="game-box">
    <div class="target-ui">Feed Monster <span id="goal-num" style="color:var(--monster)">?</span> Snacks</div>
    
    <div id="drop-zone">
        <div id="monster-face" class="monster">👾</div>
    </div>

    <div class="snack-tray" id="tray"></div>
    
    <div id="status">COUNT: <span id="current-fed">0</span></div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function sound(f, t='sine') {
        const o=audio.createOscillator(), g=audio.createGain();
        o.type=t; o.frequency.value=f; g.gain.value=0.1;
        o.connect(g); g.connect(audio.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime+0.2);
        o.stop(audio.currentTime+0.2);
    }

    let goal = 0, fed = 0;
    const foodItems = ['🍪', '🍎', '🍕', '🍩', '🍓', '🧁'];
    const tray = document.getElementById('tray');
    const monster = document.getElementById('monster-face');
    const dropZone = document.getElementById('drop-zone');

    function init() {
        goal = Math.floor(Math.random() * 9) + 2;
        fed = 0;
        document.getElementById('goal-num').innerText = goal;
        document.getElementById('current-fed').innerText = fed;
        monster.innerText = '👾';
        tray.innerHTML = '';
        
        const snackType = foodItems[Math.floor(Math.random() * foodItems.length)];
        for (let i = 0; i < 10; i++) {
            const s = document.createElement('div');
            s.className = 'snack'; s.innerText = snackType;
            s.draggable = true;
            s.onmousedown = startDrag;
            s.ontouchstart = startDrag;
            tray.appendChild(s);
        }
    }

    function startDrag(e) {
        const el = e.target;
        let startX = (e.touches ? e.touches[0].clientX : e.clientX);
        let startY = (e.touches ? e.touches[0].clientY : e.clientY);
        
        const move = (me) => {
            let curX = (me.touches ? me.touches[0].clientX : me.clientX);
            let curY = (me.touches ? me.touches[0].clientY : me.clientY);
            el.style.transform = `translate(${curX - startX}px, ${curY - startY}px)`;
            el.style.zIndex = 100;
        };

        const stop = (se) => {
            window.removeEventListener('mousemove', move);
            window.removeEventListener('mouseup', stop);
            window.removeEventListener('touchmove', move);
            window.removeEventListener('touchend', stop);

            const rect = dropZone.getBoundingClientRect();
            const endX = (se.changedTouches ? se.changedTouches[0].clientX : se.clientX);
            const endY = (se.changedTouches ? se.changedTouches[0].clientY : se.clientY);

            if (endX > rect.left && endX < rect.right && endY > rect.top && endY < rect.bottom) {
                eatSnack(el);
            } else {
                el.style.transform = 'none';
            }
        };

        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('touchend', stop);
    }

    function eatSnack(el) {
        fed++;
        el.remove();
        document.getElementById('current-fed').innerText = fed;
        monster.classList.add('eat');
        monster.innerText = '🤤';
        sound(300 + (fed * 50));
        
        setTimeout(() => {
            monster.classList.remove('eat');
            monster.innerText = (fed === goal) ? '🥳' : '👾';
            if (fed === goal) {
                sound(600, 'square');
                setTimeout(init, 1500);
            } else if (fed > goal) {
                monster.innerText = '🤢';
                sound(100, 'sawtooth');
                setTimeout(init, 1000);
            }
        }, 300);
    }

    init();
</script>
</body>
</html>
