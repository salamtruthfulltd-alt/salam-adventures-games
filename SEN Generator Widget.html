<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomBuddy Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap'); body { font-family: 'Quicksand', sans-serif; background-color: #f4f7ff; }</style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl border border-indigo-100 overflow-hidden">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">BloomBuddy Pro 🌸</h1>
            <p class="text-xs opacity-80">SEN Worksheet Assistant</p>
        </div>

        <div class="p-6 space-y-4">
            <input type="password" id="apiKey" placeholder="Paste your Gemini API Key here" 
                class="w-full p-3 border rounded-xl text-sm bg-gray-50 focus:ring-2 focus:ring-indigo-400 outline-none">
            
            <input type="text" id="topic" placeholder="Topic: e.g. How to cross the road" 
                class="w-full p-4 border-2 border-indigo-50 rounded-2xl text-center text-lg focus:border-indigo-400 outline-none">

            <button onclick="generate()" id="genBtn" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg">
                CREATE WORKSHEET
            </button>

            <div id="status" class="hidden text-center p-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold animate-pulse text-sm">
                Generating... please wait.
            </div>

            <div id="outputArea" class="hidden mt-4 border-t pt-4">
                <div id="result" class="p-6 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl text-slate-800 leading-relaxed"></div>
                <button onclick="window.print()" class="mt-4 w-full py-2 bg-slate-200 rounded-xl text-[10px] font-bold text-slate-600 uppercase tracking-widest">
                    Print to Paper or PDF
                </button>
            </div>
        </div>
    </div>

    <script>
        async function generate() {
            const key = document.getElementById('apiKey').value;
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');

            if (!key || !topic) return alert("Please enter your API Key and a Topic.");

            btn.disabled = true;
            status.classList.remove('hidden');
            document.getElementById('outputArea').classList.add('hidden');

            try {
                // Using Gemini 3.1 Flash - The 2026 standard for speed and reliability
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Act as a SEN Teacher. Create a 3-step worksheet about ${topic}. Keep it very simple. Add 2 Yes/No questions. NO CHAT, NO INTROS. JUST THE WORKSHEET.` }] }],
                        generationConfig: { temperature: 0.2, maxOutputTokens: 500 }
                    })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                const text = data.candidates[0].content.parts[0].text;
                result.innerHTML = text.replace(/\n/g, "<br>");
                document.getElementById('outputArea').classList.remove('hidden');
                status.classList.add('hidden');
            } catch (err) {
                alert("AI Error: " + err.message);
                status.classList.add('hidden');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
