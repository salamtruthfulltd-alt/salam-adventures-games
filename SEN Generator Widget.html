<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomBuddy | SEN Worksheet Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f4f8; overflow: hidden; }
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        iframe { flex-grow: 1; border: none; width: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="bg-indigo-600 p-4 text-white shadow-lg flex justify-between items-center no-print">
            <div>
                <h1 class="text-xl font-bold italic">BloomBuddy 🌸</h1>
                <p class="text-[10px] uppercase tracking-widest opacity-80 font-bold">Reliable AI for Parents & Teachers</p>
            </div>
            <div class="text-[10px] bg-white/20 px-3 py-1 rounded-full font-bold uppercase">
                Active Engine: EasyClass 2026
            </div>
        </div>

        <iframe 
            src="https://easyclass.ai/tools/worksheet-generator" 
            title="AI Worksheet Generator"
            allow="clipboard-write">
        </iframe>

        <div class="bg-white p-2 border-t border-slate-200 text-center no-print">
            <p class="text-[10px] text-slate-400 font-bold uppercase">
                Step 1: Enter Topic | Step 2: Select Level | Step 3: Print
            </p>
        </div>
    </div>

</body>
</html>
