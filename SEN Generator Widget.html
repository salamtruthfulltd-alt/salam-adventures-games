<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEN Worksheet Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden">
        <div class="bg-blue-600 p-4 text-white">
            <h1 class="text-lg font-bold">SEN AI Worksheet Tool</h1>
            <p class="text-xs opacity-80">Simple • Accessible • Instant</p>
        </div>

        <div class="p-5 space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Topic</label>
                <input type="text" id="topic" placeholder="e.g. Life Cycle of a Frog" 
                    class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <button onclick="generate()" id="genBtn" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md active:scale-95 transition-all">
                Build Worksheet
            </button>

            <div id="status" class="hidden text-center py-2">
                <div class="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-blue-600 mr-2"></div>
                <span class="text-sm text-gray-600" id="statusText">Thinking...</span>
            </div>

            <div id="outputArea" class="hidden space-y-3">
                <div id="result" class="p-5 bg-yellow-50 border-2 border-yellow-100 rounded-xl text-gray-800 leading-relaxed text-sm shadow-inner overflow-y-auto max-h-80">
                    </div>
                <button onclick="window.print()" class="w-full py-2 text-blue-600 font-semibold text-xs border border-blue-200 rounded-lg hover:bg-blue-50">
                    🖨️ Print Worksheet
                </button>
            </div>
        </div>
    </div>

    <script>
        async function generate() {
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            const output = document.getElementById('outputArea');
            const result = document.getElementById('result');

            if (!topic) return alert("Please enter a topic!");

            // UI State
            btn.disabled = true;
            status.classList.remove('hidden');
            output.classList.add('hidden');
            statusText.innerText = "Connecting to AI...";

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/MistralAI/Mistral-7B-Instruct-v0.2",
                    {
                        headers: { "Content-Type": "application/json" },
                        method: "POST",
                        body: JSON.stringify({ 
                            inputs: `[INST] You are a Special Education teacher. Create a simple worksheet about ${topic}. Use 3 short bullet points. Use easy words. Add two YES/NO questions. Do not use complex metaphors. [/INST]`,
                            parameters: { max_new_tokens: 400, temperature: 0.1 }
                        }),
                    }
                );

                const data = await response.json();

                if (data.error && data.error.includes("loading")) {
                    statusText.innerText = "AI is waking up... click again in 10s.";
                    btn.disabled = false;
                    return;
                }

                if (data[0] && data[0].generated_text) {
                    // Clean the "Instruction" tag out of the result
                    const fullText = data[0].generated_text;
                    const parts = fullText.split('[/INST]');
                    const finalOutput = parts[parts.length - 1].trim();
                    
                    result.innerHTML = finalOutput.replace(/\n/g, "<br>");
                    output.classList.remove('hidden');
                    status.classList.add('hidden');
                }

            } catch (error) {
                console.error(error);
                statusText.innerText = "Connection error. Try again!";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
