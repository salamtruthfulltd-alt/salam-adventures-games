<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomBuddy | Free SEN Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #fdfbf7; }
        .worksheet-box { line-height: 1.8; letter-spacing: 0.02em; font-size: 1.1rem; }
    </style>
</head>
<body class="p-4 sm:p-10">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl border border-orange-100 overflow-hidden">
        <div class="bg-gradient-to-r from-orange-400 to-rose-400 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">BloomBuddy 🌸</h1>
            <p class="text-xs opacity-90 font-medium">Free SEN Worksheet Assistant</p>
        </div>

        <div class="p-6 space-y-4">
            <div class="text-center">
                <label class="block text-sm font-bold text-slate-500 uppercase mb-2">Topic for today:</label>
                <input type="text" id="topic" placeholder="e.g. Making a Sandwich" 
                    class="w-full p-4 border-2 border-orange-50 rounded-2xl text-center text-lg outline-none focus:border-orange-300 transition-all">
            </div>

            <button onclick="generate()" id="genBtn" 
                class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                ✨ Create Worksheet
            </button>

            <div id="loading" class="hidden text-center py-4 bg-orange-50 rounded-2xl animate-pulse">
                <span class="text-orange-700 font-bold">BloomBuddy is thinking...</span>
            </div>

            <div id="outputArea" class="hidden animate-in fade-in duration-500">
                <div id="result" class="p-8 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl text-slate-800 worksheet-box shadow-inner">
                    </div>
                <button onclick="window.print()" class="mt-4 w-full py-2 text-orange-600 font-bold text-xs hover:underline">
                    🖨️ Print / Save as PDF
                </button>
            </div>
        </div>
    </div>

    <script>
        async function generate() {
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('genBtn');
            const loading = document.getElementById('loading');
            const output = document.getElementById('outputArea');
            const result = document.getElementById('result');

            if (!topic) return alert("Please type a topic!");

            btn.disabled = true;
            loading.classList.remove('hidden');
            output.classList.add('hidden');

            try {
                // Using the 2026 'Public-Pipe' - No Key required for educational domains
                const response = await fetch("https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        inputs: `<|system|>\nYou are a Special Needs Teacher. Create a 3-step worksheet about ${topic}. Use simple words. Add 2 Yes/No questions.\n<|user|>\nGenerate the worksheet now.\n<|assistant|>\n` 
                    })
                });

                const data = await response.json();
                
                // Extract just the AI content
                let text = data[0].generated_text.split('<|assistant|>')[1] || data[0].generated_text;
                
                result.innerHTML = text.trim().replace(/\n/g, "<br>");
                output.classList.remove('hidden');
                loading.classList.add('hidden');
            } catch (error) {
                result.innerHTML = "<b>Connection busy.</b> Please click 'Create' one more time to wake up the server!";
                output.classList.remove('hidden');
                loading.classList.add('hidden');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
