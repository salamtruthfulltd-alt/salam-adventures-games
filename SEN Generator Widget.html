<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomBuddy | Reliable SEN Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #fdfcfb; }
        .print-only { display: none; }
        @media print { .no-print { display: none; } .print-only { display: block; } }
    </style>
</head>
<body class="p-4 sm:p-10">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl border border-rose-100 overflow-hidden no-print">
        <div class="bg-gradient-to-r from-rose-400 to-orange-400 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">BloomBuddy 🌸</h1>
            <p class="text-xs opacity-90 font-medium">Reliable Support for Teachers & Parents</p>
        </div>

        <div class="p-6 space-y-4">
            <input type="password" id="apiKey" placeholder="Enter Gemini API Key" 
                class="w-full p-2 text-xs border rounded-lg bg-gray-50 mb-2">
            
            <input type="text" id="topic" placeholder="Topic: e.g. How to tie shoes" 
                class="w-full p-4 border-2 border-orange-50 rounded-2xl focus:border-orange-300 outline-none text-center text-lg">

            <button onclick="generate()" id="genBtn" 
                class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl shadow-lg transition active:scale-95">
                ✨ Create Worksheet
            </button>

            <div id="status" class="hidden text-center py-4 bg-orange-50 rounded-2xl">
                <span class="text-orange-700 text-sm font-bold animate-pulse">BloomBuddy is working...</span>
            </div>
        </div>
    </div>

    <div id="outputArea" class="hidden max-w-xl mx-auto mt-8 p-8 bg-white border-2 border-orange-100 rounded-3xl shadow-sm">
        <div id="result" class="text-slate-800 leading-relaxed text-lg"></div>
        <button onclick="window.print()" class="mt-6 w-full py-2 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs no-print">🖨️ Print to Paper or PDF</button>
    </div>

    <script>
        async function generate() {
            const key = document.getElementById('apiKey').value;
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');

            if (!key || !topic) return alert("Please add your API Key and a Topic.");

            btn.disabled = true;
            status.classList.remove('hidden');
            
            try {
                // Direct call to Google's most reliable 2026 endpoint
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are an SEN teacher. Create a simple, literal worksheet about ${topic}. Use 3 steps and 2 Yes/No questions.` }] }]
                    })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;

                result.innerHTML = text.replace(/\n/g, "<br>");
                document.getElementById('outputArea').classList.remove('hidden');
                status.classList.add('hidden');
            } catch (error) {
                alert("Connection Error: Please check your API key and Credits.");
                status.classList.add('hidden');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
