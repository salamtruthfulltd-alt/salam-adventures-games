<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomBuddy | SEN Worksheet Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #f8fafc; margin: 0; overflow: hidden; }
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        
        /* The Sandbox Cage */
        .iframe-wrapper { flex-grow: 1; position: relative; width: 100%; height: 100%; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="bg-indigo-600 p-4 text-white shadow-md flex justify-between items-center no-print">
            <div>
                <h1 class="text-xl font-bold italic flex items-center gap-2">BloomBuddy 🌸</h1>
                <p class="text-[10px] uppercase tracking-widest opacity-80 font-bold">Inclusive Learning Support</p>
            </div>
            <div class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter">
                🔒 Locked Mode Active
            </div>
        </div>

        <div class="iframe-wrapper">
            <iframe 
                src="https://flintk12.com/tools/ai-worksheet-generator" 
                title="SEN AI Worksheet Generator"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
                allow="clipboard-write">
            </iframe>
        </div>

        <div class="bg-white p-2 border-t border-slate-200 text-center no-print">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                1. Set Topic & Level <span class="mx-2">|</span> 2. Generate <span class="mx-2">|</span> 3. Print
            </p>
        </div>
    </div>

</body>
</html>
