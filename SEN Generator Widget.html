<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomBuddy | SEN Worksheet Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f9ff; }
        .worksheet-font { font-size: 1.1rem; line-height: 1.8; letter-spacing: 0.02em; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-lg mx-auto bg-white rounded-3xl shadow-xl border border-blue-100 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">BloomBuddy 🌸</h1>
            <p class="text-sm opacity-90">Creating gentle, accessible learning for every child.</p>
        </div>

        <div class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 text-center">What are we learning about today?</label>
                <input type="text" id="topic" placeholder="e.g. Friendly Dinosaurs or Making Toast" 
                    class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-400 outline-none text-center transition-all">
            </div>

            <button onclick="generate()" id="genBtn" 
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg transform transition active:scale-95">
                ✨ Create Worksheet
            </button>

            <div id="status" class="hidden text-center py-4 bg-blue-50 rounded-2xl animate-pulse">
                <span class="text-blue-700 font-medium" id="statusText">BloomBuddy is thinking...</span>
            </div>

            <div id="outputArea" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-bold text-slate-400 uppercase">Your Custom Worksheet:</span>
                    <button onclick="window.print()" class="text-blue-600 text-xs font-bold hover:underline">🖨️ Print / Save PDF</button>
                </div>
                <div id="result" class="p-8 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl text-slate-800 worksheet-font shadow-inner">
                    </div>
                <p class="text-[10px] text-slate-400 mt-4 text-center italic font-sans">Handcrafted by AI for unique learners.</p>
            </div>
        </div>
    </div>

    <script>
        async function generate() {
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            const output = document.getElementById('outputArea');
            const result = document.getElementById('result');

            if (!topic) return alert("Please type a topic first!");

            // Reset UI
            btn.disabled = true;
            status.classList.remove('hidden');
            output.classList.add('hidden');
            statusText.innerText = "🌸 BloomBuddy is gathering ideas...";

            try {
                // Using a more reliable "Serverless" endpoint
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta",
                    {
                        headers: { "Content-Type": "application/json" },
                        method: "POST",
                        body: JSON.stringify({ 
                            inputs: `<|system|>\nYou are a supportive SEN teacher. Use simple, clear, literal language.\n<|user|>\nCreate a short worksheet about ${topic}. Include 3 simple steps and 2 Yes/No questions. Keep it very brief.\n<|assistant|>\n`,
                            parameters: { max_new_tokens: 350, temperature: 0.3 }
                        }),
                    }
                );

                const data = await response.json();

                // Check for loading error
                if (data.error && data.error.includes("loading")) {
                    statusText.innerText = "🌸 BloomBuddy is waking up! Try again in 10 seconds.";
                    btn.disabled = false;
                    return;
                }

                if (data[0] && data[0].generated_text) {
                    // Extract only the AI's response
                    const fullText = data[0].generated_text;
                    const resultText = fullText.split('<|assistant|>')[1] || fullText;
                    
                    result.innerHTML = resultText.trim().replace(/\n/g, "<br>");
                    output.classList.remove('hidden');
                    status.classList.add('hidden');
                } else {
                    throw new Error("No data");
                }

            } catch (error) {
                console.error(error);
                statusText.innerText = "⚠️ The AI is a bit busy. Please try once more!";
                btn.disabled = false;
            } finally {
                btn.disabled = false;
                btn.innerText = "✨ Create Another";
            }
        }
    </script>
</body>
</html>
