<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomBuddy | SEN Worksheet Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f4f8; overflow: hidden; margin: 0; }
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }
        .sen-badge { background: #fef3c7; color: #92400e; padding: 2px 10px; border-radius: 9999px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="bg-indigo-600 p-4 text-white shadow-lg flex justify-between items-center no-print">
            <div>
                <h1 class="text-xl font-bold italic">BloomBuddy 🌸</h1>
                <p class="text-[10px] uppercase tracking-widest opacity-80 font-bold">Differentiated Learning for SEN</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="sen-badge">SEN MODE ACTIVE</span>
                <div class="text-[10px] bg-white/20 px-3 py-1 rounded-full font-bold uppercase hidden sm:block">
                    Engine: MagicSchool v2026
                </div>
            </div>
        </div>

        <iframe 
            src="https://www.magicschool.ai/tools/worksheet-generator" 
            title="SEN AI Worksheet Generator"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            allow="clipboard-write">
        </iframe>

        <div class="bg-white p-3 border-t border-slate-200 text-center no-print shadow-inner">
            <p class="text-[11px] text-slate-500 font-bold uppercase flex justify-center gap-4">
                <span>1. Enter Topic</span>
                <span class="text-slate-300">|</span>
                <span>2. Select Grade Level</span>
                <span class="text-slate-300">|</span>
                <span>3. Generate & Print</span>
            </p>
        </div>
    </div>

</body>
</html>
