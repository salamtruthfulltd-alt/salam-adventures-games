<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini Counting Game</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:transparent;
}

.game{
  width:100%;
  max-width:420px;
  margin:auto;
  padding:10px;
  border-radius:20px;
  background:#ffffff;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

h1{
  font-size:20px;
  margin:6px 0;
}

.count{
  font-size:32px;
  font-weight:900;
  color:#ff7b21;
}

.fruits{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  margin:10px 0;
}

.fruit{
  font-size:26px;
}

.text{
  font-size:18px;
  font-weight:800;
  margin:6px 0;
}

button{
  width:100%;
  padding:12px;
  font-size:18px;
  font-weight:900;
  border:none;
  border-radius:14px;
  background:#ff8a3d;
  color:#fff;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}
</style>
</head>
<body>

<div class="game">
  <h1>Tap & Count 🍎</h1>
  <div class="count" id="count">0</div>
  <div class="fruits" id="fruits"></div>
  <div class="text" id="text">Start counting!</div>
  <button onclick="next()">Tap</button>
</div>

<script>
const items = [
 {s:'banana',p:'bananas',e:'🍌'},
 {s:'apple',p:'apples',e:'🍎'},
 {s:'orange',p:'oranges',e:'🍊'},
 {s:'cherry',p:'cherries',e:'🍒'}
];

let count=0;
let item=random();

function random(){
 return items[Math.floor(Math.random()*items.length)];
}

function speak(t){
 if(!window.speechSynthesis) return;
 speechSynthesis.cancel();
 const u=new SpeechSynthesisUtterance(t);
 u.rate=0.9;
 speechSynthesis.speak(u);
}

function update(){
 document.getElementById('count').innerText=count;
 const grid=document.getElementById('fruits');
 grid.innerHTML='';

 for(let i=0;i<count;i++){
  const f=document.createElement('div');
  f.className='fruit';
  f.innerText=item.e;
  grid.appendChild(f);
 }

 if(count===0){
  text.innerText='Start counting!';
 }else if(count===10){
  text.innerText=`${count} ${item.p} - Amazing! Well done! Fantastic! 🎉`;
 }else{
  text.innerText=`${count} ${count===1?item.s:item.p}`;
 }
}

function next(){
 if(count>=10){
  count=0;
  item=random();
 }else{
  count++;
 }
 update();

 if(count===10){
  speak(`${count} ${item.p}. Amazing! Well done! Fantastic!`);
 }else{
  speak(`${count} ${count===1?item.s:item.p}`);
 }
}

update();
</script>

</body>
</html>
