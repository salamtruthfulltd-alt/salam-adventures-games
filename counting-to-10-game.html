<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counting To 10 Game For Kids | Free Preschool Number Game</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DD5B9L9ZCR"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DD5B9L9ZCR');
  </script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Comic Sans MS", Arial, sans-serif;
      background: linear-gradient(180deg, #dff7ff 0%, #fff8dc 100%);
      color: #24324a;
      text-align: center;
      overflow-x: hidden;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 10px 24px;
    }

    .top-badge {
      display: inline-block;
      background: #fff;
      color: #ff7a00;
      padding: 7px 14px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 13px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.08;
      color: #16407d;
      text-shadow: 0 2px 0 #fff;
    }

    .subheading {
      max-width: 620px;
      margin: 0 auto 14px;
      font-size: clamp(14px, 2.3vw, 18px);
      line-height: 1.4;
      color: #49617e;
      font-weight: 700;
    }

    .game-shell {
      background: rgba(255,255,255,0.95);
      border: 3px solid #ffffff;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(37,72,120,0.14);
      padding: 14px 12px 18px;
      overflow: hidden;
    }

    .top-row {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .panel {
      min-width: 130px;
      background: linear-gradient(180deg, #ffffff, #f4fbff);
      border-radius: 18px;
      padding: 10px 12px;
      box-shadow: 0 7px 14px rgba(0,0,0,0.07);
    }

    .panel-label {
      margin-bottom: 5px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-weight: 900;
      color: #6e819b;
    }

    .panel-value {
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 900;
      color: #ff4d87;
    }

    .panel-value.blue {
      color: #1a72db;
    }

    .instruction {
      font-size: clamp(17px, 2.8vw, 24px);
      font-weight: 900;
      color: #ff7a00;
      margin: 8px 0 4px;
    }

    .fruit-name {
      margin-bottom: 12px;
      font-size: clamp(15px, 2.5vw, 19px);
      font-weight: 900;
      color: #13a06c;
    }

    .level-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .level-btn {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      color: #16407d;
      background: #eaf6ff;
      box-shadow: 0 6px 12px rgba(0,0,0,0.06);
    }

    .level-btn.active {
      color: white;
      background: linear-gradient(180deg, #1aa7ff, #0f74d8);
    }

    .game-area {
      min-height: 210px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 14px 8px;
      border-radius: 20px;
      background: linear-gradient(180deg, #fbfeff, #eefaff);
      border: 2px dashed #bce6ff;
      margin-bottom: 12px;
      position: relative;
    }

    .fruit-btn {
      width: 78px;
      height: 78px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff, #fff0f6);
      box-shadow: 0 8px 14px rgba(0,0,0,0.10);
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      overflow: hidden;
    }

    .fruit-btn:hover { transform: scale(1.04); }
    .fruit-btn:active { transform: scale(0.94); }

    .fruit-btn.gone {
      opacity: 0.14;
      transform: scale(0.8);
      pointer-events: none;
    }

    .fruit-btn img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 3px 3px rgba(0,0,0,0.08));
    }

    .message {
      min-height: 44px;
      font-size: clamp(22px, 3.7vw, 32px);
      color: #1c944a;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .bubble-word {
      min-height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 8px;
    }

    .bubble-pill {
      display: inline-block;
      padding: 9px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff8fca, #ff5f93);
      color: white;
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 900;
      box-shadow: 0 9px 14px rgba(255,95,147,0.26);
      transform: scale(0.88);
      opacity: 0;
      transition: all 0.22s ease;
    }

    .bubble-pill.show {
      opacity: 1;
      transform: scale(1);
    }

    .stars {
      min-height: 28px;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .button-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .game-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 8px 14px rgba(0,0,0,0.11);
      transition: transform 0.15s ease;
    }

    .game-btn:hover { transform: translateY(-1px); }

    .start-btn {
      background: linear-gradient(180deg, #ff9800, #ff5d5d);
    }

    .play-again-btn {
      background: linear-gradient(180deg, #2ecc71, #129a57);
    }

    .helper-text {
      font-size: 14px;
      color: #556b88;
      margin-top: 12px;
      font-weight: 700;
    }

    .number-pop {
      position: fixed;
      font-size: 30px;
      font-weight: 900;
      color: #ff7a00;
      text-shadow: 0 2px 0 #fff;
      pointer-events: none;
      z-index: 9999;
      animation: popUp 0.8s ease forwards;
    }

    @keyframes popUp {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.55);
      }
      20% {
        opacity: 1;
        transform: translateY(-8px) scale(1.12);
      }
      100% {
        opacity: 0;
        transform: translateY(-42px) scale(1);
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 10px 8px 18px;
      }

      .game-shell {
        padding: 12px 8px 14px;
      }

      .fruit-btn {
        width: 68px;
        height: 68px;
      }

      .fruit-btn img {
        width: 48px;
        height: 48px;
      }

      .panel {
        min-width: 110px;
        padding: 8px 10px;
      }

      .game-area {
        gap: 10px;
        min-height: 190px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-badge">🍓 Free Preschool Maths Game</div>

    <h1>Counting To 10 Game For Kids</h1>
    <p class="subheading">
      Tap the fruit, hear the number, and count all the way to the end.
    </p>

    <div class="game-shell">
      <div class="top-row">
        <div class="panel">
          <div class="panel-label">Current Number</div>
          <div class="panel-value" id="currentNumber">0</div>
        </div>

        <div class="panel">
          <div class="panel-label">Fruit To Count</div>
          <div class="panel-value blue" id="totalNumber">0</div>
        </div>
      </div>

      <div class="level-row">
        <button class="level-btn active" onclick="setLevel('easy', this)">Easy</button>
        <button class="level-btn" onclick="setLevel('medium', this)">Medium</button>
        <button class="level-btn" onclick="setLevel('hard', this)">Hard</button>
      </div>

      <div class="instruction" id="instructionText">Press Start And Count The Fruit!</div>
      <div class="fruit-name" id="fruitName">Today’s Fruit: Apples</div>

      <div class="game-area" id="gameArea"></div>

      <div class="message" id="message"></div>

      <div class="bubble-word">
        <span class="bubble-pill" id="bubblePill">Amazing!</span>
      </div>

      <div class="stars" id="stars"></div>

      <div class="button-row">
        <button class="game-btn start-btn" onclick="startGame()">Start Game</button>
        <button class="game-btn play-again-btn" onclick="startGame()">Play Again</button>
      </div>

      <div class="helper-text">
        Play again for a new fruit and a new counting challenge.
      </div>
    </div>
  </div>

  <script>
    let count = 0;
    let total = 0;
    let currentFruit = null;
    let selectedVoice = null;
    let currentLevel = "easy";

    const fruits = [
      { name: "Apples", img: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f34e.png" },
      { name: "Bananas", img: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f34c.png" },
      { name: "Strawberries", img: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f353.png" },
      { name: "Oranges", img: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f34a.png" },
      { name: "Grapes", img: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f347.png" },
      { name: "Watermelons", img: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f349.png" },
      { name: "Pineapples", img: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f34d.png" },
      { name: "Cherries", img: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f352.png" }
    ];

    const praiseWords = [
      "Amazing!",
      "Brilliant!",
      "Super!",
      "Fantastic!",
      "Wow!",
      "Great Job!"
    ];

    function setLevel(level, btn) {
      currentLevel = level;
      document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      startGame();
    }

    function randomFruit() {
      return fruits[Math.floor(Math.random() * fruits.length)];
    }

    function randomPraise() {
      return praiseWords[Math.floor(Math.random() * praiseWords.length)];
    }

    function randomTotal() {
      if (currentLevel === "easy") return Math.floor(Math.random() * 3) + 1;
      if (currentLevel === "medium") return Math.floor(Math.random() * 3) + 4;
      return Math.floor(Math.random() * 4) + 7;
    }

    function updatePanels() {
      document.getElementById("currentNumber").textContent = count;
      document.getElementById("totalNumber").textContent = total;
    }

    function pickVoice() {
      const voices = window.speechSynthesis.getVoices();
      if (!voices.length) return null;
      return (
        voices.find(v => /female|samantha|zira|google uk english female|hazel|libby|aria/i.test(v.name)) ||
        voices.find(v => /en-GB/i.test(v.lang)) ||
        voices.find(v => /en/i.test(v.lang)) ||
        voices[0]
      );
    }

    function speak(text, rate = 0.9, pitch = 1.06) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(String(text));
      utterance.lang = "en-GB";
      utterance.rate = rate;
      utterance.pitch = pitch;
      if (!selectedVoice) selectedVoice = pickVoice();
      if (selectedVoice) utterance.voice = selectedVoice;
      window.speechSynthesis.speak(utterance);
    }

    function showBubbleWord(word) {
      const bubble = document.getElementById("bubblePill");
      bubble.textContent = word;
      bubble.classList.remove("show");
      void bubble.offsetWidth;
      bubble.classList.add("show");
    }

    function showNumberPop(x, y, number) {
      const pop = document.createElement("div");
      pop.className = "number-pop";
      pop.textContent = number;
      pop.style.left = x + "px";
      pop.style.top = y + "px";
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), 800);
    }

    function createFruitButton() {
      const fruit = document.createElement("button");
      fruit.className = "fruit-btn";
      fruit.type = "button";

      const img = document.createElement("img");
      img.src = currentFruit.img;
      img.alt = currentFruit.name;
      fruit.appendChild(img);

      fruit.addEventListener("click", function () {
        if (fruit.classList.contains("gone")) return;

        count++;
        updatePanels();
        fruit.classList.add("gone");

        document.getElementById("message").textContent = count;
        showBubbleWord(randomPraise());
        speak(`Number ${count}`);

        const rect = fruit.getBoundingClientRect();
        showNumberPop(rect.left + rect.width / 2 - 10, rect.top + 8, count);

        if (count === total) {
          setTimeout(() => {
            document.getElementById("instructionText").textContent = "You Did It!";
            document.getElementById("message").textContent = `Amazing! You Counted ${total}!`;
            document.getElementById("stars").textContent = "⭐ ⭐ ⭐";
            showBubbleWord("Amazing!");
            speak(`Amazing counting! You counted ${total}!`, 0.88, 1.04);
          }, 220);
        }
      });

      return fruit;
    }

    function startGame() {
      const gameArea = document.getElementById("gameArea");
      const message = document.getElementById("message");
      const stars = document.getElementById("stars");
      const instructionText = document.getElementById("instructionText");
      const fruitName = document.getElementById("fruitName");
      const bubble = document.getElementById("bubblePill");

      window.speechSynthesis.cancel();

      count = 0;
      total = randomTotal();
      currentFruit = randomFruit();

      gameArea.innerHTML = "";
      message.textContent = "";
      stars.textContent = "";
      bubble.classList.remove("show");

      instructionText.textContent = "Tap Each Fruit And Count Out Loud!";
      fruitName.textContent = `Today’s Fruit: ${currentFruit.name}`;
      updatePanels();

      for (let i = 0; i < total; i++) {
        gameArea.appendChild(createFruitButton());
      }

      setTimeout(() => {
        speak(`Let’s count the ${currentFruit.name.toLowerCase()}`, 0.88, 1.02);
      }, 250);
    }

    if (window.speechSynthesis) {
      window.speechSynthesis.onvoiceschanged = () => {
        selectedVoice = pickVoice();
      };
    }

    startGame();
  </script>
</body>
</html>
