<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salam Adventures | SEN Worksheet Generator</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef4fa;
            margin: 0;
            padding: 10px;
            color: #1a2a3a;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 15px 20px 20px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #f5a623;
            padding-bottom: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .logo-img {
            height: 50px;
            width: auto;
            max-width: 150px;
        }

        .brand-name {
            line-height: 1.1;
        }

        .brand-salam {
            font-size: 22px;
            font-weight: 800;
            color: #2c5a2e;
            letter-spacing: 0.5px;
        }

        .brand-adventures {
            font-size: 16px;
            font-weight: 600;
            color: #f5a623;
            letter-spacing: 1px;
        }

        .sen-badge {
            margin-left: auto;
            background: #f0f2f5;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: bold;
            color: #4a6741;
        }

        .controls {
            background: #f9f5eb;
            padding: 12px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-group label {
            font-weight: bold;
            font-size: 11px;
            color: #5a4a2e;
        }

        select, input {
            padding: 5px 10px;
            border-radius: 25px;
            border: 1px solid #ddd0b6;
            background: white;
            font-size: 12px;
            cursor: pointer;
        }

        button {
            background: #f5a623;
            color: white;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #e0910f;
        }

        .generator-controls {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .step-btn {
            background: #2c5a2e;
            font-size: 11px;
            padding: 6px 15px;
        }

        .step-btn:hover {
            background: #1f4421;
        }

        .generator-status {
            background: #e8f5e9;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: #2e7d32;
            display: inline-block;
            margin-bottom: 10px;
        }

        .worksheet {
            background: #fffef8;
            border: 1px solid #f0e2cc;
            border-radius: 20px;
            padding: 15px;
            margin-top: 10px;
        }

        .target-area {
            text-align: center;
            margin-bottom: 15px;
            padding: 8px;
            background: #fff4e6;
            border-radius: 40px;
        }

        .target-label {
            font-weight: bold;
            font-size: 14px;
            color: #3b5c2a;
        }

        .target-symbol {
            font-size: 48px;
            background: white;
            display: inline-block;
            padding: 5px 25px;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #f5c48a;
            margin-top: 5px;
        }

        .grid {
            display: grid;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
        }

        .grid-item {
            font-size: 28px;
            background: #fefaf0;
            border-radius: 12px;
            padding: 6px 4px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #eee2ce;
            transition: all 0.2s;
        }

        .grid-item.selected {
            background: #d9f0e1;
            border-color: #2e7d64;
            transform: scale(0.95);
        }

        .instruction {
            font-size: 12px;
            background: #eef3fc;
            padding: 8px;
            border-radius: 20px;
            text-align: center;
            margin-top: 12px;
            color: #2c3e50;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            text-align: center;
        }

        .print-btn {
            background: #2c5a2e;
        }

        .copy-btn {
            background: #3b82f6;
        }

        .download-btn {
            background: #8b5cf6;
        }

        .action-btn:hover {
            opacity: 0.9;
        }

        .progress-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
        }

        .progress-step {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #666;
        }

        .progress-step.completed {
            background: #4caf50;
            color: white;
        }

        .progress-step.active {
            background: #f5a623;
            color: white;
            transform: scale(1.1);
        }

        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c5a2e;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeInOut 2s ease-in-out;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .controls, .action-buttons, .sen-badge, .generator-controls, 
            .generator-status, .progress-indicator, button {
                display: none !important;
            }
            .worksheet {
                border: none;
                padding: 0;
                margin: 0;
            }
            .container {
                padding: 0;
                margin: 0;
                box-shadow: none;
                max-width: 100%;
            }
            .grid-item.selected {
                background: #d9f0e1;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="https://salamtruthfulltd-alt.github.io/salam-adventures-games/Salam%20Adventures.png" alt="Salam Adventures Logo" class="logo-img" onerror="this.style.display='none';">
        <div class="brand-name">
            <div class="brand-salam">Salam</div>
            <div class="brand-adventures">Adventures</div>
        </div>
        <div class="sen-badge">
            🌟 SEN
        </div>
    </div>

    <div style="text-align: center;">
        <div class="generator-status" id="generatorStatus">⚙️ Generator Ready</div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>🎯 Grid</label>
            <select id="gridSize">
                <option value="16">4x4</option>
                <option value="25" selected>5x5</option>
                <option value="36">6x6</option>
            </select>
        </div>
        <div class="control-group">
            <label>🌀 Symbols</label>
            <select id="symbolSet">
                <option value="shapes">Shapes</option>
                <option value="emoji">Emoji</option>
                <option value="animals" selected>Animals</option>
                <option value="letters">Letters</option>
            </select>
        </div>
        <div class="control-group">
            <label>📊 Level</label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <button id="generateBtn">✨ Generate All</button>
        <div class="generator-controls">
            <button id="stepBtn" class="step-btn">⚡ Next Step</button>
            <button id="resetGenBtn" class="step-btn">🔄 Reset</button>
        </div>
    </div>

    <div class="progress-indicator" id="progressIndicator">
        <div class="progress-step" id="step1">1</div>
        <div class="progress-step" id="step2">2</div>
        <div class="progress-step" id="step3">3</div>
        <div class="progress-step" id="step4">4</div>
    </div>

    <div id="worksheetArea" class="worksheet">
        <!-- Filled by JavaScript -->
    </div>

    <!-- THREE ACTION OPTIONS for embeds -->
    <div class="action-buttons">
        <button class="action-btn print-btn" onclick="printUsingBrowser()">🖨️ Print</button>
        <button class="action-btn copy-btn" onclick="copyToClipboard()">📋 Copy Worksheet</button>
        <button class="action-btn download-btn" onclick="downloadAsHTML()">💾 Download</button>
    </div>
</div>

<script>
    const symbolSets = {
        shapes: {
            base: ['●', '■', '▲', '★'],
            easy: { '●': '○', '■': '□', '▲': '△', '★': '☆' },
            hard: { '●': '⬤', '■': '◼', '▲': '⭗', '★': '⭒' }
        },
        emoji: {
            base: ['😊', '😢', '😡', '😲'],
            easy: { '😊': '🙂', '😢': '😥', '😡': '😠', '😲': '😧' },
            hard: { '😊': '😌', '😢': '😭', '😡': '🤬', '😲': '😮' }
        },
        animals: {
            base: ['🐶', '🐱', '🐭', '🐰'],
            easy: { '🐶': '🐕', '🐱': '🐈', '🐭': '🐁', '🐰': '🐇' },
            hard: { '🐶': '🐩', '🐱': '🐆', '🐭': '🐹', '🐰': '🐇' }
        },
        letters: {
            base: ['A', 'B', 'C', 'D'],
            easy: { 'A': 'Λ', 'B': '8', 'C': '(', 'D': '|)' },
            hard: { 'A': 'Δ', 'B': '♭', 'C': '©', 'D': 'Ⅾ' }
        }
    };

    // ============ JAVASCRIPT GENERATOR ============
    function* worksheetGenerator(gridSize, symbolSetName, difficulty) {
        const symbolLib = symbolSets[symbolSetName];
        if (!symbolLib) return;
        
        const baseSymbols = symbolLib.base;
        
        const targetSymbol = baseSymbols[Math.floor(Math.random() * baseSymbols.length)];
        yield { step: 1, message: `🎯 Target selected: "${targetSymbol}"`, targetSymbol, baseSymbols };
        
        let distractorPool;
        if (difficulty === 'easy') {
            distractorPool = baseSymbols.map(s => symbolLib.easy[s] || s);
        } else if (difficulty === 'hard') {
            distractorPool = baseSymbols.map(s => symbolLib.hard[s] || s);
        } else {
            distractorPool = [...baseSymbols];
        }
        yield { step: 2, message: `🌀 Distractors ready (${difficulty} mode)`, targetSymbol, distractorPool };
        
        let cells = [];
        const targetCount = Math.max(3, Math.floor(gridSize / 4));
        
        for (let i = 0; i < targetCount; i++) {
            cells.push(targetSymbol);
        }
        
        while (cells.length < gridSize) {
            let possibleDistractors = distractorPool.filter(s => s !== targetSymbol);
            if (possibleDistractors.length === 0) possibleDistractors = ['?'];
            const randomDist = possibleDistractors[Math.floor(Math.random() * possibleDistractors.length)];
            cells.push(randomDist);
        }
        yield { step: 3, message: `📦 Grid built with ${targetCount} targets`, targetSymbol, cells, distractorPool };
        
        for (let i = cells.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cells[i], cells[j]] = [cells[j], cells[i]];
        }
        yield { step: 4, message: `✨ Final shuffled worksheet ready!`, targetSymbol, cells, complete: true };
    }

    let currentGenerator = null;
    let currentSettings = null;
    let generatedData = null;

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.remove();
        }, 2000);
    }

    function updateProgress(step) {
        for (let i = 1; i <= 4; i++) {
            const stepEl = document.getElementById(`step${i}`);
            if (stepEl) {
                if (i < step) {
                    stepEl.classList.add('completed');
                    stepEl.classList.remove('active');
                } else if (i === step) {
                    stepEl.classList.add('active');
                    stepEl.classList.remove('completed');
                } else {
                    stepEl.classList.remove('completed', 'active');
                }
            }
        }
    }

    function renderWorksheetFromData(data) {
        if (!data || !data.cells) return;
        
        const cols = Math.sqrt(data.cells.length);
        const container = document.getElementById('worksheetArea');
        
        let html = `
            <div class="target-area">
                <div class="target-label">🎯 FIND & CIRCLE ALL MATCHES</div>
                <div class="target-symbol">${data.targetSymbol}</div>
            </div>
            <div class="grid" style="grid-template-columns: repeat(${cols}, 1fr);">
        `;
        
        for (let i = 0; i < data.cells.length; i++) {
            html += `<div class="grid-item" data-symbol="${data.cells[i].replace(/"/g, '&quot;')}">${data.cells[i]}</div>`;
        }
        
        html += `</div>
            <div class="instruction">
                ✏️ Circle every ${data.targetSymbol}
            </div>
        `;
        
        container.innerHTML = html;
        
        document.querySelectorAll('.grid-item').forEach(el => {
            el.addEventListener('click', function() {
                this.classList.toggle('selected');
            });
        });
    }

    function runFullGenerator() {
        const gridSize = parseInt(document.getElementById('gridSize').value);
        const symbolSetName = document.getElementById('symbolSet').value;
        const difficulty = document.getElementById('difficulty').value;
        
        currentSettings = { gridSize, symbolSetName, difficulty };
        const gen = worksheetGenerator(gridSize, symbolSetName, difficulty);
        
        let finalData = null;
        let result = gen.next();
        
        while (!result.done) {
            if (result.value.complete) {
                finalData = result.value;
                document.getElementById('generatorStatus').innerHTML = `✅ ${result.value.message}`;
                updateProgress(4);
            } else {
                document.getElementById('generatorStatus').innerHTML = `⚡ ${result.value.message}`;
                updateProgress(result.value.step);
            }
            result = gen.next();
        }
        
        if (finalData) {
            generatedData = finalData;
            renderWorksheetFromData(finalData);
        }
    }

    function nextGeneratorStep() {
        const gridSize = parseInt(document.getElementById('gridSize').value);
        const symbolSetName = document.getElementById('symbolSet').value;
        const difficulty = document.getElementById('difficulty').value;
        
        if (!currentGenerator || 
            currentSettings?.gridSize !== gridSize || 
            currentSettings?.symbolSetName !== symbolSetName || 
            currentSettings?.difficulty !== difficulty) {
            currentSettings = { gridSize, symbolSetName, difficulty };
            currentGenerator = worksheetGenerator(gridSize, symbolSetName, difficulty);
            generatedData = null;
        }
        
        const result = currentGenerator.next();
        
        if (!result.done) {
            const stepData = result.value;
            document.getElementById('generatorStatus').innerHTML = `⚡ ${stepData.message}`;
            updateProgress(stepData.step);
            
            if (stepData.complete) {
                generatedData = stepData;
                renderWorksheetFromData(stepData);
                document.getElementById('generatorStatus').innerHTML = `✅ ${stepData.message}`;
                currentGenerator = null;
            } else if (stepData.cells) {
                generatedData = stepData;
                renderWorksheetFromData(stepData);
            }
        } else {
            document.getElementById('generatorStatus').innerHTML = `✅ Generator complete!`;
            currentGenerator = null;
        }
    }

    function resetGenerator() {
        currentGenerator = null;
        currentSettings = null;
        generatedData = null;
        updateProgress(0);
        document.getElementById('generatorStatus').innerHTML = `🔄 Generator reset. Click "Next Step" or "Generate All"`;
        document.getElementById('worksheetArea').innerHTML = `<div style="text-align:center; padding:40px; color:#999;">Click "Generate All" or "Next Step" to create a worksheet</div>`;
    }

    // ============ PRINT FUNCTION THAT WORKS IN EMBEDS ============
    function printUsingBrowser() {
        // Method: Use browser's native print on the entire page
        // This works because the print media query hides controls
        window.print();
        showToast('🖨️ Print dialog opened - check your browser');
    }

    // ============ COPY TO CLIPBOARD ============
    function copyToClipboard() {
        const worksheetContent = document.getElementById('worksheetArea').cloneNode(true);
        const headerContent = document.querySelector('.header').cloneNode(true);
        
        const printContainer = document.createElement('div');
        printContainer.appendChild(headerContent);
        printContainer.appendChild(worksheetContent);
        
        // Add footer
        const footer = document.createElement('p');
        footer.style.textAlign = 'center';
        footer.style.marginTop = '30px';
        footer.style.fontSize = '10px';
        footer.style.color = '#999';
        footer.innerHTML = '© Salam Adventures • SEN Visual Discrimination • www.salamadventures.com';
        printContainer.appendChild(footer);
        
        const htmlContent = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Salam Adventures Worksheet</title>
                <style>
                    body { font-family: 'Segoe UI', sans-serif; padding: 20px; }
                    .header { display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #f5a623; padding-bottom: 12px; margin-bottom: 15px; }
                    .brand-salam { font-size: 22px; font-weight: 800; color: #2c5a2e; }
                    .brand-adventures { font-size: 16px; font-weight: 600; color: #f5a623; }
                    .target-area { text-align: center; margin-bottom: 15px; padding: 8px; background: #fff4e6; border-radius: 40px; }
                    .target-symbol { font-size: 48px; display: inline-block; padding: 5px 25px; border-radius: 60px; border: 1px solid #f5c48a; }
                    .grid { display: grid; gap: 8px; justify-content: center; margin: 15px 0; }
                    .grid-item { font-size: 28px; text-align: center; padding: 6px; border: 1px solid #ddd; }
                    .instruction { font-size: 12px; background: #eef3fc; padding: 8px; border-radius: 20px; text-align: center; }
                </style>
            </head>
            <body>
                ${printContainer.innerHTML}
            </body>
            </html>
        `;
        
        navigator.clipboard.writeText(htmlContent).then(() => {
            showToast('✅ Worksheet copied to clipboard! Paste anywhere (Word, Google Docs, Email)');
        }).catch(() => {
            showToast('❌ Could not copy. Try the Download button instead.');
        });
    }

    // ============ DOWNLOAD AS HTML FILE ============
    function downloadAsHTML() {
        const worksheetContent = document.getElementById('worksheetArea').cloneNode(true);
        const headerContent = document.querySelector('.header').cloneNode(true);
        
        const fullHtml = `<!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>Salam Adventures - SEN Worksheet</title>
            <style>
                body {
                    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                    padding: 40px;
                    max-width: 900px;
                    margin: 0 auto;
                }
                .header {
                    display: flex;
                    align-items: center;
                    gap: 12px;
                    border-bottom: 2px solid #f5a623;
                    padding-bottom: 12px;
                    margin-bottom: 15px;
                    flex-wrap: wrap;
                }
                .brand-salam {
                    font-size: 22px;
                    font-weight: 800;
                    color: #2c5a2e;
                }
                .brand-adventures {
                    font-size: 16px;
                    font-weight: 600;
                    color: #f5a623;
                }
                .target-area {
                    text-align: center;
                    margin-bottom: 15px;
                    padding: 8px;
                    background: #fff4e6;
                    border-radius: 40px;
                }
                .target-symbol {
                    font-size: 48px;
                    background: white;
                    display: inline-block;
                    padding: 5px 25px;
                    border-radius: 60px;
                    border: 1px solid #f5c48a;
                }
                .grid {
                    display: grid;
                    gap: 8px;
                    justify-content: center;
                    margin: 15px 0;
                }
                .grid-item {
                    font-size: 28px;
                    background: #fefaf0;
                    border-radius: 12px;
                    padding: 6px 4px;
                    text-align: center;
                    border: 1px solid #eee2ce;
                }
                .instruction {
                    font-size: 12px;
                    background: #eef3fc;
                    padding: 8px;
                    border-radius: 20px;
                    text-align: center;
                    margin-top: 12px;
                }
                @media print {
                    body { padding: 0; }
                }
            </style>
        </head>
        <body>
            ${headerContent.outerHTML}
            ${worksheetContent.outerHTML}
            <p style="text-align:center; margin-top:30px; font-size:10px; color:#999;">
                © Salam Adventures • SEN Visual Discrimination • www.salamadventures.com
            </p>
            <script>
                // Auto-open print dialog when downloaded file is opened
                if (window.matchMedia) {
                    setTimeout(() => { window.print(); }, 500);
                }
            <\/script>
        </body>
        </html>`;
        
        const blob = new Blob([fullHtml], { type: 'text/html' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `salam-worksheet-${Date.now()}.html`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        showToast('💾 Worksheet downloaded! Open the file and press Ctrl+P to print');
    }

    // Event listeners
    document.getElementById('generateBtn').addEventListener('click', runFullGenerator);
    document.getElementById('stepBtn').addEventListener('click', nextGeneratorStep);
    document.getElementById('resetGenBtn').addEventListener('click', resetGenerator);
    
    // Initial load
    window.addEventListener('load', () => {
        runFullGenerator();
    });
</script>
</body>
</html>
