<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salam Adventures | Memory Match Game</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .game-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #f5a623;
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-circle {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .brand-salam {
            font-size: 24px;
            font-weight: 800;
            color: #2c5a2e;
        }

        .brand-adventures {
            font-size: 14px;
            font-weight: 600;
            color: #f5a623;
        }

        .game-stats {
            background: #f0fdf4;
            padding: 10px 20px;
            border-radius: 30px;
            text-align: center;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #10b981;
        }

        .matches {
            font-size: 14px;
            color: #666;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 25px 0;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #f5a623 0%, #e0910f 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transform: scale(1);
        }

        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }

        .card.flipped, .card.matched {
            background: white;
            border: 2px solid #10b981;
            cursor: default;
        }

        .card.matched {
            background: #d9f0e1;
            opacity: 0.7;
            cursor: default;
        }

        .card.flipped:hover, .card.matched:hover {
            transform: scale(1);
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-new {
            background: #10b981;
            color: white;
        }

        .btn-new:hover {
            background: #059669;
        }

        .btn-print {
            background: #3b82f6;
            color: white;
        }

        .btn-print:hover {
            background: #2563eb;
        }

        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 30px;
            background: #fef3c7;
            color: #92400e;
            font-weight: bold;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .game-container {
                box-shadow: none;
                padding: 10px;
                max-width: 100%;
            }
            .controls, .game-stats, .message, .btn-new, .btn-print {
                display: none !important;
            }
            .card {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            .game-board {
                gap: 8px;
            }
            .card.flipped, .card.matched {
                border: 2px solid #333;
            }
        }

        @media (max-width: 500px) {
            .card {
                font-size: 28px;
            }
            .game-board {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-circle">SA</div>
            <div>
                <div class="brand-salam">Salam</div>
                <div class="brand-adventures">Adventures</div>
            </div>
        </div>
        <div class="game-stats">
            <div class="score" id="score">0</div>
            <div class="matches">Matches</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="controls">
        <button class="btn-new" onclick="resetGame()">🔄 New Game</button>
        <button class="btn-print" onclick="printGame()">🖨️ Print Game Board</button>
    </div>
    <div class="message" id="message">🐫 Match the pairs to win!</div>
</div>

<script>
    // Animal emojis for the game
    const animals = ['🐶', '🐱', '🐭', '🐰', '🦊', '🐻', '🐼', '🐨'];
    
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let lockBoard = false;
    let score = 0;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initGame() {
        // Create pairs of cards
        let cardPairs = [];
        for (let i = 0; i < animals.length; i++) {
            cardPairs.push({ id: i, symbol: animals[i], matched: false });
            cardPairs.push({ id: i, symbol: animals[i], matched: false });
        }
        cards = shuffleArray(cardPairs);
        matchedPairs = 0;
        score = 0;
        flippedCards = [];
        lockBoard = false;
        updateScore();
        document.getElementById('message').innerHTML = '🐫 Match the pairs to win!';
        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById('gameBoard');
        board.innerHTML = '';
        
        cards.forEach((card, index) => {
            const cardElement = document.createElement('div');
            cardElement.className = 'card';
            if (card.flipped || card.matched) {
                cardElement.classList.add('flipped');
                cardElement.innerHTML = card.symbol;
            } else {
                cardElement.innerHTML = '?';
            }
            if (card.matched) {
                cardElement.classList.add('matched');
            }
            cardElement.onclick = () => flipCard(index);
            board.appendChild(cardElement);
        });
    }

    function flipCard(index) {
        if (lockBoard) return;
        if (cards[index].flipped) return;
        if (cards[index].matched) return;
        
        cards[index].flipped = true;
        flippedCards.push(index);
        renderBoard();
        
        if (flippedCards.length === 2) {
            lockBoard = true;
            setTimeout(checkMatch, 500);
        }
    }

    function checkMatch() {
        const card1 = cards[flippedCards[0]];
        const card2 = cards[flippedCards[1]];
        
        if (card1.id === card2.id && flippedCards[0] !== flippedCards[1]) {
            // Match!
            card1.matched = true;
            card2.matched = true;
            matchedPairs++;
            score += 10;
            updateScore();
            
            if (matchedPairs === animals.length) {
                document.getElementById('message').innerHTML = '🎉 WINNER! Perfect Score! 🎉';
            } else {
                document.getElementById('message').innerHTML = '✅ Great match! +10 points';
                setTimeout(() => {
                    document.getElementById('message').innerHTML = '🐫 Keep matching!';
                }, 1000);
            }
        } else {
            // No match
            card1.flipped = false;
            card2.flipped = false;
            if (score > 0) {
                score -= 2;
                updateScore();
            }
            document.getElementById('message').innerHTML = '❌ Not a match! Try again';
            setTimeout(() => {
                document.getElementById('message').innerHTML = '🐫 Match the pairs to win!';
            }, 1000);
        }
        
        flippedCards = [];
        lockBoard = false;
        renderBoard();
    }

    function updateScore() {
        document.getElementById('score').innerHTML = score;
    }

    function resetGame() {
        initGame();
    }

    // Start the game

</script>
</body>
</html>
