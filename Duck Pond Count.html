<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckling Drag & Drop</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --grass: #a3e635; --water: #38bdf8; --border: #3f6212; }
        .game-card { 
            width: 100%; max-width: 320px; margin: 10px auto; 
            font-family: 'Fredoka One', cursive; background: var(--grass); 
            padding: 15px; border-radius: 25px; border: 5px solid var(--border);
            position: relative; touch-action: none; overflow: hidden;
        }

        /* Target Pond */
        #pond-zone {
            width: 100%; height: 140px; background: var(--water);
            border-radius: 50% / 40%; border: 4px solid #0369a1;
            margin-bottom: 20px; display: flex; align-items: center;
            justify-content: center; position: relative;
            box-shadow: inset 0 8px 15px rgba(0,0,0,0.2);
        }

        .duckling {
            font-size: 38px; cursor: grab; position: absolute;
            user-select: none; touch-action: none; z-index: 10;
            transition: transform 0.1s;
        }
        .duckling:active { cursor: grabbing; transform: scale(1.2); }
        .in-water { pointer-events: none; z-index: 1; filter: brightness(0.9); }

        .header { color: var(--border); font-size: 1.1rem; margin-bottom: 10px; }
        .score-ui { font-size: 0.8rem; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 10px; }
        
        .splash {
            position: absolute; width: 30px; height: 30px; border: 2px solid white;
            border-radius: 50%; animation: splash 0.4s ease-out forwards;
        }
        @keyframes splash { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body>

<div class="game-card">
    <div class="header">Put <span id="target-count" style="color:#0369a1">0</span> Ducklings in the Pond!</div>
    
    <div id="pond-zone">
        </div>

    <div id="grass-area" style="height: 150px; position: relative;"></div>

    <div class="score-ui">DUCKS IN WATER: <span id="current-count">0</span></div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function playQuack(f) {
        const o=audio.createOscillator(), g=audio.createGain();
        o.type='triangle'; o.frequency.value=f; g.gain.value=0.05;
        o.connect(g); g.connect(audio.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime+0.2);
        o.stop(audio.currentTime+0.2);
    }

    let goal=0, count=0;
    const pond = document.getElementById('pond-zone');
    const grass = document.getElementById('grass-area');

    function init() {
        goal = Math.floor(Math.random()*7)+3;
        count = 0;
        document.getElementById('target-count').innerText = goal;
        document.getElementById('current-count').innerText = count;
        pond.innerHTML = '';
        grass.innerHTML = '';

        for(let i=0; i<10; i++) {
            const d = document.createElement('div');
            d.className = 'duckling'; d.innerText = '🐥';
            d.style.left = Math.random() * 220 + 'px';
            d.style.top = Math.random() * 80 + 'px';
            d.onpointerdown = startDrag;
            grass.appendChild(d);
        }
    }

    function startDrag(e) {
        const el = e.target;
        el.setPointerCapture(e.pointerId);
        const startX = e.clientX, startY = e.clientY;
        const origX = el.offsetLeft, origY = el.offsetTop;

        const onMove = (me) => {
            el.style.left = (origX + (me.clientX - startX)) + 'px';
            el.style.top = (origY + (me.clientY - startY)) + 'px';
        };

        const onUp = (ue) => {
            el.removeEventListener('pointermove', onMove);
            el.removeEventListener('pointerup', onUp);
            
            const pRect = pond.getBoundingClientRect();
            if (ue.clientX > pRect.left && ue.clientX < pRect.right && 
                ue.clientY > pRect.top && ue.clientY < pRect.bottom) {
                dropInPond(el, ue.clientX - pRect.left, ue.clientY - pRect.top);
            } else {
                // Snap back to grass
                el.style.left = Math.random() * 220 + 'px';
                el.style.top = Math.random() * 80 + 'px';
            }
        };

        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
    }

    function dropInPond(el, x, y) {
        count++;
        document.getElementById('current-count').innerText = count;
        
        // Move element to pond container
        pond.appendChild(el);
        el.className = 'duckling in-water';
        el.style.left = (x - 20) + 'px';
        el.style.top = (y - 20) + 'px';
        
        // Splash
        const s = document.createElement('div');
        s.className = 'splash';
        s.style.left = (x - 15) + 'px'; s.style.top = (y - 15) + 'px';
        pond.appendChild(s);
        setTimeout(()=>s.remove(), 400);

        playQuack(300 + (count * 50));

        if(count === goal) {
            playQuack(600);
            setTimeout(() => { alert("HOORAY! THE DUCKLINGS ARE SWIMMING! 🐥"); init(); }, 500);
        } else if (count > goal) {
            playQuack(150);
            setTimeout(init, 500);
        }
    }

    init();
</script>
</body>
</html>
