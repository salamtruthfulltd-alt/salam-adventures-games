<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Pond Count</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --water: #60a5fa; --grass: #4ade80; --border: #166534; }
        .game-wrap { width: 100%; max-width: 320px; margin: 10px auto; font-family: 'Fredoka One', cursive; text-align: center; background: var(--grass); padding: 15px; border-radius: 25px; border: 4px solid var(--border); box-shadow: 0 8px 0 #14532d; }
        
        /* The Pond */
        #pond { 
            width: 100%; height: 200px; background: var(--water); border-radius: 50% / 30%; 
            position: relative; margin: 15px 0; border: 4px solid #3b82f6; overflow: hidden;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.2);
        }

        .duck { 
            position: absolute; font-size: 35px; cursor: pointer; 
            transition: transform 0.1s; user-select: none; z-index: 10;
        }
        .duck.in-pond { pointer-events: none; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }

        .ui-header { color: white; text-shadow: 2px 2px 0 var(--border); font-size: 1.2rem; }
        .count-bar { background: rgba(0,0,0,0.2); padding: 5px; border-radius: 10px; color: white; font-size: 0.8rem; margin-top: 10px; }
        
        /* Splash effect */
        .splash {
            position: absolute; width: 40px; height: 40px; border: 3px solid white;
            border-radius: 50%; animation: splashOut 0.4s ease-out forwards;
        }
        @keyframes splashOut { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

<div class="game-wrap">
    <div class="ui-header">GET <span id="target-qty">0</span> DUCKS IN!</div>
    
    <div id="pond">
        </div>

    <div class="count-bar">DUCKS IN POND: <span id="current-qty">0</span></div>
    <button id="reset-btn" style="margin-top:10px; border:none; background:var(--border); color:white; padding:5px 15px; border-radius:10px; cursor:pointer; font-family:'Fredoka One';" onclick="init()">START OVER</button>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function playQuack(f) {
        const o=audio.createOscillator(), g=audio.createGain();
        o.type='triangle'; o.frequency.value=f; g.gain.value=0.1;
        o.connect(g); g.connect(audio.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime+0.2);
        o.stop(audio.currentTime+0.2);
    }

    let target=0, collected=0, duckData=[];
    const pond = document.getElementById('pond');

    function init() {
        target = Math.floor(Math.random()*8)+2;
        collected = 0;
        duckData = [];
        document.getElementById('target-qty').innerText = target;
        document.getElementById('current-qty').innerText = collected;
        pond.innerHTML = '';
        
        // Spawn 10 ducks
        for(let i=0; i<10; i++) {
            const d = document.createElement('div');
            d.className = 'duck'; d.innerText = '🦆';
            
            const data = {
                el: d,
                x: Math.random() * 250,
                y: Math.random() * 150,
                speed: 0.5 + Math.random() * 1.5,
                dir: Math.random() > 0.5 ? 1 : -1,
                active: true
            };
            
            d.onmousedown = (e) => boop(data);
            d.ontouchstart = (e) => boop(data);
            
            pond.appendChild(d);
            duckData.push(data);
        }
    }

    function boop(data) {
        if(!data.active) return;
        
        collected++;
        data.active = false;
        data.el.classList.add('in-pond');
        document.getElementById('current-qty').innerText = collected;
        
        // Splash effect
        const s = document.createElement('div');
        s.className = 'splash';
        s.style.left = data.x + 'px'; s.style.top = data.y + 'px';
        pond.appendChild(s);
        setTimeout(()=>s.remove(), 400);

        playQuack(400 + (collected * 50));

        if(collected === target) {
            playQuack(600);
            setTimeout(() => { alert("YOU DID IT! 🎉"); init(); }, 500);
        } else if (collected > target) {
            playQuack(150);
            setTimeout(init, 500);
        }
    }

    function moveDucks() {
        duckData.forEach(d => {
            if(!d.active) return;
            
            d.x += d.speed * d.dir;
            if(d.x > 280 || d.x < 0) d.dir *= -1;
            
            // Wobble
            const wobble = Math.sin(Date.now() / 200) * 2;
            
            d.el.style.left = d.x + 'px';
            d.el.style.top = (d.y + wobble) + 'px';
            d.el.style.transform = `scaleX(${d.dir * -1})`;
        });
        requestAnimationFrame(moveDucks);
    }

    init();
    moveDucks();
</script>
</body>
</html>
