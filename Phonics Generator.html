<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salam Adventures | Phonics Generator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
font-family:Segoe UI,Arial;
background:linear-gradient(135deg,#e5f7ee,#d7f0e5);
padding:20px;
}
.toolbar{
background:#fff;
padding:12px;
border-radius:50px;
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
}
button{
padding:10px 20px;
border:none;
border-radius:30px;
color:#fff;
font-weight:bold;
cursor:pointer;
}
.btn1{background:#18b787;}
.btn2{background:#f2a23a;}
.btn3{background:#4d8cf0;}

.page{
width:210mm;
min-height:297mm;
background:#fff;
margin:auto;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
border-bottom:3px solid #18b787;
margin-bottom:20px;
}

.brand{
display:flex;
align-items:center;
gap:15px;
}

.logo{
width:80px;
height:80px;
object-fit:contain;
}

h1{color:#18b787;}
.section{margin-top:20px;}

.card{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.line{border-bottom:2px solid #000;height:25px;margin:10px 0;}

</style>

</head>

<body>

<div class="toolbar">
<button class="btn1" onclick="generate()">New Sheet</button>
<button class="btn2" onclick="refresh()">Refresh</button>
<button class="btn3" onclick="window.print()">Print</button>
</div>

<div class="page" id="page"></div>

<script>

const logo = "https://salamtruthfulltd-alt.github.io/salam-adventures-games/salam.png";

const words = ["cat","dog","sun","hat","pig","bed"];
const sentences = [
"the cat sat on the mat.",
"i can see the big sun.",
"the dog is in the bus."
];

function generate(){

let pickWords = words.sort(()=>0.5-Math.random()).slice(0,6);
let pickSent = sentences.sort(()=>0.5-Math.random()).slice(0,2);

document.getElementById("page").innerHTML = `

<div class="header">
<div class="brand">
<img src="${logo}" class="logo">
<div>
<h1>Salam Adventures</h1>
<p>Phonics Level 1</p>
</div>
</div>
<div>
Name: _______<br>
Date: _______
</div>
</div>

<div class="section">
<h3>⭐ Sight Word</h3>
<div class="line"></div>
<div class="line"></div>
</div>

<div class="section">
<h3>🔤 Missing Letter</h3>
<div class="grid">
${pickWords.map(w=>`
<div class="card">_ ${w.slice(1)}</div>
`).join("")}
</div>
</div>

<div class="section">
<h3>📝 Sentence Trace</h3>
${pickSent.map(s=>`
<div class="line">${s}</div>
`).join("")}
</div>

`;

}

function refresh(){ generate(); }

generate();

</script>

</body>
</html>
