<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salam Adventures | Colour & Object Naming Generator</title>
  <meta name="description" content="Create printable colour and object naming worksheets for kids. Generate fun activities to match colours to objects, name pictures, and find the correct colour for early learners and SEN support." />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --green:#18b887;
      --green-dark:#11966f;
      --orange:#f2a23a;
      --blue:#4b89f0;
      --ink:#213547;
      --muted:#6b7a8c;
      --paper:#fffdf8;
      --line:#d9e3eb;
    }
    body{
      font-family:"Segoe UI",Arial,sans-serif;
      background:linear-gradient(135deg,#eaf8f1 0%,#d8efe4 100%);
      color:var(--ink);
      padding:20px;
    }
    .toolbar{
      max-width:1200px;
      margin:0 auto 22px;
      background:#fff;
      border:1px solid rgba(24,184,135,.16);
      border-radius:999px;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
      padding:14px 16px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
      align-items:center;
    }
    .control-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    label{font-size:13px;font-weight:700;color:#365067}
    select{
      border:1px solid #d9e5ec;border-radius:999px;padding:10px 14px;font-size:14px;background:#fff;color:var(--ink);outline:none;
    }
    .btn{
      border:none;border-radius:999px;padding:11px 20px;font-size:14px;font-weight:800;color:#fff;cursor:pointer;transition:.2s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-main{background:var(--green)}
    .btn-main:hover{background:var(--green-dark)}
    .btn-alt{background:var(--orange)}
    .btn-alt:hover{background:#de8c20}
    .btn-print{background:var(--blue)}
    .btn-print:hover{background:#2f74e8}
    .status{background:#f3f8fb;color:var(--green-dark);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700}

    .page{
      width:210mm;min-height:297mm;margin:0 auto;background:var(--paper);border-radius:8px;box-shadow:0 18px 38px rgba(0,0,0,.14);padding:15mm 16mm 14mm;
    }
    .header{
      display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:3px solid var(--green);padding-bottom:12px;margin-bottom:18px;flex-wrap:wrap;
    }
    .brand{display:flex;gap:14px;align-items:center}
    .logo-wrap{
      width:72px;height:72px;border-radius:16px;overflow:hidden;background:#f7fcfa;border:1px solid #dceee7;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .logo-wrap img{width:100%;height:100%;object-fit:contain;display:block}
    .brand h1{color:var(--green);font-size:30px;line-height:1;margin-bottom:6px}
    .brand p{font-size:14px;font-weight:700;color:#64748b}
    .meta{min-width:240px;font-size:13px;font-weight:700;color:#111}
    .meta div{margin:5px 0}
    .fill-line{display:inline-block;min-width:120px;border-bottom:2px solid #111;transform:translateY(-2px)}

    .hero-box{
      background:linear-gradient(180deg,#f7f2e8 0%,#fbf8f2 100%);
      border:1.5px solid #f0c67b;border-radius:16px;padding:16px 18px;margin-bottom:18px;
    }
    .hero-top{color:#d98a00;font-size:13px;font-weight:800;text-transform:uppercase;margin-bottom:8px}
    .hero-title{font-size:24px;font-weight:900;color:#1f2f3d;margin-bottom:6px}
    .hero-sub{font-size:14px;color:#66788a;font-weight:600}

    .section{margin-top:18px}
    .section-title{
      background:linear-gradient(90deg,#dff0ea 0%,#edf8f4 100%);
      border-left:5px solid var(--green);color:var(--green);font-size:14px;font-weight:900;text-transform:uppercase;padding:9px 14px;margin-bottom:12px;
    }

    .activity-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:#fcfcfd;border:1px solid #dde6ed;border-radius:18px;padding:16px;min-height:230px}
    .card-title{font-size:14px;font-weight:900;color:#2b465c;margin-bottom:12px;text-transform:uppercase}
    .item-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .item{background:#fff;border:1px solid #e0e8ef;border-radius:16px;padding:12px;text-align:center}
    .emoji{font-size:42px;line-height:1;margin-bottom:8px}
    .word-label{font-size:18px;font-weight:800;color:#1f2f3d;margin-bottom:6px}
    .colour-pill{
      display:inline-block;min-width:90px;padding:8px 12px;border-radius:999px;font-weight:800;font-size:14px;border:2px solid #d9e3ea;background:#fff;color:#223042;
    }
    .blank-line{height:26px;border-bottom:2px dashed #9fb0bf;margin-top:10px}

    .match-row{
      display:flex;justify-content:space-between;align-items:center;gap:12px;background:#fff;border:1px solid #e0e8ef;border-radius:14px;padding:10px 12px;margin-bottom:10px;
    }
    .left-pack{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
    .right-pack{min-width:120px;text-align:center}

    .find-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .find-box{background:#fff;border:1px solid #e0e8ef;border-radius:16px;padding:14px;text-align:center;min-height:120px}
    .swatch{width:52px;height:52px;border-radius:14px;margin:0 auto 10px;border:2px solid rgba(0,0,0,.08)}
    .find-word{font-size:17px;font-weight:800;color:#1f2f3d}

    .tips{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .tip-card{background:#fff;border:1px solid #e0e8ef;border-radius:16px;padding:14px;text-align:center}
    .tip-card h4{color:#2b465c;font-size:14px;font-weight:900;margin-bottom:6px}
    .tip-card p{color:#6b7a8c;font-size:12px;line-height:1.4}

    footer{margin-top:22px;border-top:1px solid #e4ebf2;padding-top:10px;text-align:center;font-size:10px;color:#96a3b5}

    @media print{
      body{background:#fff;padding:0}
      .toolbar{display:none}
      .page{width:100%;min-height:auto;box-shadow:none;padding:12mm}
    }
    @media (max-width: 900px){
      .page{width:100%;min-height:auto}
      .activity-grid,.tips,.find-grid,.item-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="control-group">
      <label for="levelSelect">Level</label>
      <select id="levelSelect">
        <option value="easy" selected>Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>

    <div class="control-group">
      <label for="themeSelect">Theme</label>
      <select id="themeSelect">
        <option value="mixed" selected>Mixed</option>
        <option value="animals">Animals</option>
        <option value="food">Food</option>
        <option value="school">School</option>
      </select>
    </div>

    <button class="btn btn-main" id="generateBtn">✨ New Colour Sheet</button>
    <button class="btn btn-alt" id="refreshBtn">🎨 Refresh Items</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ Print / Save PDF</button>
    <div class="status" id="statusMsg">🌟 Ready to generate colour practice</div>
  </div>

  <div class="page" id="worksheet"></div>

  <script>
    const logoUrl = "https://salamtruthfulltd-alt.github.io/salam-adventures-games/salam.png";

    const colourBank = [
      {name:"red", hex:"#ef4444"},
      {name:"blue", hex:"#3b82f6"},
      {name:"green", hex:"#22c55e"},
      {name:"yellow", hex:"#facc15"},
      {name:"orange", hex:"#fb923c"},
      {name:"purple", hex:"#a855f7"},
      {name:"pink", hex:"#ec4899"},
      {name:"brown", hex:"#8b5e3c"}
    ];

    const objectBanks = {
      animals: [
        {name:"frog", emoji:"🐸", colour:"green"},
        {name:"lion", emoji:"🦁", colour:"yellow"},
        {name:"pig", emoji:"🐷", colour:"pink"},
        {name:"bird", emoji:"🐦", colour:"blue"},
        {name:"fox", emoji:"🦊", colour:"orange"},
        {name:"bear", emoji:"🐻", colour:"brown"}
      ],
      food: [
        {name:"apple", emoji:"🍎", colour:"red"},
        {name:"banana", emoji:"🍌", colour:"yellow"},
        {name:"orange", emoji:"🍊", colour:"orange"},
        {name:"grapes", emoji:"🍇", colour:"purple"},
        {name:"pear", emoji:"🍐", colour:"green"},
        {name:"cherries", emoji:"🍒", colour:"red"}
      ],
      school: [
        {name:"book", emoji:"📘", colour:"blue"},
        {name:"apple", emoji:"🍎", colour:"red"},
        {name:"pencil", emoji:"✏️", colour:"yellow"},
        {name:"leaf", emoji:"🍃", colour:"green"},
        {name:"bag", emoji:"🎒", colour:"purple"},
        {name:"basketball", emoji:"🏀", colour:"orange"}
      ]
    };

    objectBanks.mixed = [...objectBanks.animals, ...objectBanks.food, ...objectBanks.school];

    function shuffle(arr){
      const a = [...arr];
      for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pick(arr, n){
      return shuffle(arr).slice(0, n);
    }

    function colourByName(name){
      return colourBank.find(c => c.name === name) || {name, hex:"#e5e7eb"};
    }

    function levelCount(level){
      if(level === "easy") return 4;
      if(level === "medium") return 6;
      return 8;
    }

    function buildData(){
      const level = document.getElementById("levelSelect").value;
      const theme = document.getElementById("themeSelect").value;
      const count = levelCount(level);
      const objects = pick(objectBanks[theme], count);
      const findItemsCount = level === "hard" ? Math.min(8, objects.length) : Math.min(4, objects.length);
      const findItems = pick(objects, findItemsCount);
      return {level, theme, objects, findItems};
    }

    function render(data){
      const matchRows = data.objects.slice(0, Math.min(4, data.objects.length)).map(obj => `
        <div class="match-row">
          <div class="left-pack"><span style="font-size:28px;">${obj.emoji}</span><span>${obj.name}</span></div>
          <div class="right-pack"><div class="blank-line" style="margin-top:0;"></div></div>
        </div>
      `).join("");

      const nameItems = data.objects.slice(0, Math.min(4, data.objects.length)).map(obj => `
        <div class="item">
          <div class="emoji">${obj.emoji}</div>
          <div class="blank-line"></div>
        </div>
      `).join("");

      const findBoxes = data.findItems.map(obj => {
        const col = colourByName(obj.colour);
        return `
          <div class="find-box">
            <div class="swatch" style="background:${col.hex};"></div>
            <div class="find-word">${obj.name}</div>
          </div>
        `;
      }).join("");

      const colourChoiceObjects = data.objects.slice(0, Math.min(4, data.objects.length)).map(obj => {
        const correct = colourByName(obj.colour);
        const options = shuffle([correct, ...pick(colourBank.filter(c => c.name !== obj.colour), 2)]);
        return `
          <div class="item">
            <div class="emoji">${obj.emoji}</div>
            <div class="word-label">${obj.name}</div>
            ${options.map(c => `<div class="colour-pill" style="margin:6px auto; background:${c.hex}; color:${c.name==='yellow' ? '#222' : '#fff'}">${c.name}</div>`).join("")}
          </div>
        `;
      }).join("");

      document.getElementById("worksheet").innerHTML = `
        <div class="header">
          <div class="brand">
            <div class="logo-wrap">
              <img src="${logoUrl}" alt="Salam Adventures Logo" onerror="this.onerror=null;this.src='https://via.placeholder.com/72x72.png?text=SA';">
            </div>
            <div>
              <h1>Salam Adventures</h1>
              <p>Colour & Object Naming Generator</p>
            </div>
          </div>
          <div class="meta">
            <div>Name: <span class="fill-line"></span></div>
            <div>Date: <span class="fill-line"></span></div>
            <div>Level: <span class="fill-line">${data.level}</span></div>
          </div>
        </div>

        <div class="hero-box">
          <div class="hero-top">⭐ Colour and Naming Practice ⭐</div>
          <div class="hero-title">Match • Name • Find</div>
          <div class="hero-sub">Theme: ${data.theme} • Build colour words, object naming, and visual matching skills</div>
        </div>

        <div class="section">
          <div class="section-title">🎨 Part 1: Match Colour to Object</div>
          <div class="card">${matchRows}</div>
        </div>

        <div class="section">
          <div class="section-title">🗣️ Part 2: Name the Object</div>
          <div class="activity-grid">
            <div class="card">
              <div class="card-title">Look at each picture and write the name.</div>
              <div class="item-grid">${nameItems}</div>
            </div>
            <div class="card">
              <div class="card-title">Choose the correct colour word.</div>
              <div class="item-grid">${colourChoiceObjects}</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">🔎 Part 3: Find the Colour</div>
          <div class="find-grid">${findBoxes}</div>
        </div>

        <div class="section">
          <div class="section-title">💡 Part 4: Quick Teaching Tips</div>
          <div class="tips">
            <div class="tip-card">
              <h4>Say It First</h4>
              <p>Name the object aloud before writing or matching the colour.</p>
            </div>
            <div class="tip-card">
              <h4>Point and Match</h4>
              <p>Point to the picture, then point to the colour word or swatch.</p>
            </div>
            <div class="tip-card">
              <h4>Keep It Simple</h4>
              <p>Use a smaller number of pictures first for children who need extra support.</p>
            </div>
          </div>
        </div>

        <footer>Salam Adventures • Colour and object naming made simple and fun</footer>
      `;
    }

    let current = null;

    function flashStatus(text){
      const el = document.getElementById("statusMsg");
      el.textContent = text;
      setTimeout(() => {
        el.textContent = "🌟 Ready to generate colour practice";
      }, 1800);
    }

    function generateSheet(){
      current = buildData();
      render(current);
      flashStatus("✅ New colour worksheet ready");
    }

    document.addEventListener("DOMContentLoaded", () => {
      generateSheet();
      document.getElementById("generateBtn").addEventListener("click", generateSheet);
      document.getElementById("refreshBtn").addEventListener("click", generateSheet);
      document.getElementById("levelSelect").addEventListener("change", generateSheet);
      document.getElementById("themeSelect").addEventListener("change", generateSheet);
    });
  </script>
</body>
</html>
