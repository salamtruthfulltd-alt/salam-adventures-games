<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salam Adventures | Number Bonds Generator - Addition & Subtraction | Easy, Middle & Hard Levels</title>
    <meta name="description" content="Free printable number bonds worksheets for addition and subtraction. Learn part-part-whole relationships with visual number bonds. 3 difficulty levels for K-5 math, homeschool, and classroom use.">
    <meta name="keywords" content="number bonds, part part whole, addition worksheets, subtraction worksheets, number bonds to 10, number bonds to 20, Salam Adventures, homeschool math, K-5 math, printable math worksheets, fact families">
    <meta name="author" content="Salam Adventures">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Salam Adventures | Number Bonds Generator - Addition & Subtraction">
    <meta property="og:description" content="Free printable number bonds worksheets. Learn part-part-whole relationships with visual number bonds. 3 difficulty levels for K-5 math.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://salamtruthfulltd-alt.github.io/salam-adventures-games/Salam%20Adventures.png">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --easy: #22c55e;
            --middle: #f97316;
            --hard: #ef4444;
            --secondary: #8b5cf6;
        }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #f0f9f0 0%, #dcfce7 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .toolbar {
            max-width: 1200px;
            margin: 0 auto 25px auto;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            background: white;
            padding: 15px 28px;
            border-radius: 80px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid rgba(16,185,129,0.4);
        }

        .btn {
            padding: 10px 28px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-easy { background: var(--easy); color: white; }
        .btn-easy:hover { background: #16a34a; transform: translateY(-2px); }
        .btn-middle { background: var(--middle); color: white; }
        .btn-middle:hover { background: #ea580c; transform: translateY(-2px); }
        .btn-hard { background: var(--hard); color: white; }
        .btn-hard:hover { background: #dc2626; transform: translateY(-2px); }
        .btn-print { background: var(--secondary); color: white; }
        .btn-print:hover { background: #7c3aed; transform: translateY(-2px); }

        .status-pill {
            background: #f1f5f9;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-dark);
        }

        .level-badge {
            text-align: center;
            margin-bottom: 20px;
        }
        .level-tag {
            display: inline-block;
            padding: 8px 30px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }
        .level-easy { background: var(--easy); }
        .level-middle { background: var(--middle); }
        .level-hard { background: var(--hard); }

        .worksheet {
            background: white;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 15mm 18mm;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .logo-container {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #10b981, #059669);
            overflow: hidden;
        }

        .salam-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .logo-fallback {
            color: white;
            font-size: 38px;
            font-weight: bold;
        }

        .title h1 {
            color: var(--primary);
            font-size: 28px;
            margin: 0;
        }
        .title p {
            color: #475569;
            font-weight: 600;
            font-size: 13px;
            margin-top: 5px;
        }

        .student-info {
            background: #f8fafc;
            padding: 8px 18px;
            border-radius: 28px;
            font-size: 12px;
            text-align: right;
            line-height: 1.6;
        }

        .problems-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .problem-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .number-bond {
            flex: 1;
            min-width: 250px;
            background: #fefce8;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #fde68a;
            page-break-inside: avoid;
            text-align: center;
        }

        .problem-number {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
            text-align: left;
        }

        /* Number Bond Diagram */
        .bond-diagram {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .whole-box {
            background: #10b981;
            color: white;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .whole-label {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .parts-container {
            display: flex;
            gap: 20px;
        }

        .part-box {
            background: #f59e0b;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .part-label {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .plus-sign {
            font-size: 32px;
            font-weight: bold;
            color: #64748b;
        }

        .equals-sign {
            font-size: 32px;
            font-weight: bold;
            color: #64748b;
        }

        .answer-line {
            border-bottom: 2px dashed #94a3b8;
            margin: 15px 0 5px;
            height: 35px;
            width: 100%;
        }

        .instruction {
            font-size: 11px;
            color: #64748b;
            text-align: center;
            margin: 10px 0;
        }

        .visual-circles {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #10b981;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .section {
            margin: 25px 0 20px;
        }

        .section-title {
            background: #ecfdf5;
            padding: 6px 16px;
            border-left: 7px solid var(--primary);
            font-weight: 800;
            font-size: 16px;
            color: var(--primary-dark);
            margin-bottom: 15px;
            border-radius: 0 30px 30px 0;
            display: inline-block;
        }

        @media print {
            .toolbar { display: none; }
            body { background: white; padding: 0; margin: 0; }
            .worksheet { box-shadow: none; padding: 15mm; width: 100%; }
            .number-bond { break-inside: avoid; }
        }

        footer {
            text-align: center;
            font-size: 10px;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            margin-top: 30px;
            padding-top: 12px;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn btn-easy" id="easyBtn">🌱 Easy Level (Numbers 1-10)</button>
    <button class="btn btn-middle" id="middleBtn">⭐ Middle Level (Numbers 10-30)</button>
    <button class="btn btn-hard" id="hardBtn">🔥 Hard Level (Numbers 30-100)</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ Print / PDF</button>
    <div class="status-pill" id="statusMsg">🔢 Salam Number Bonds · Ready</div>
</div>

<div class="worksheet" id="worksheetContainer">
    <div style="text-align: center; padding: 60px;">Loading Salam Adventures Number Bonds...</div>
</div>

<script>
    const logoUrl = "https://salamtruthfulltd-alt.github.io/salam-adventures-games/Salam%20Adventures.png";
    
    function generateEasyBonds() {
        const bonds = [];
        for (let i = 0; i < 8; i++) {
            const whole = Math.floor(Math.random() * 9) + 2;
            const part1 = Math.floor(Math.random() * (whole - 1)) + 1;
            const part2 = whole - part1;
            bonds.push({ whole: whole, part1: part1, part2: part2, missing: Math.random() > 0.5 ? 'part1' : 'part2' });
        }
        return bonds;
    }
    
    function generateMiddleBonds() {
        const bonds = [];
        for (let i = 0; i < 8; i++) {
            const whole = Math.floor(Math.random() * 20) + 11;
            const part1 = Math.floor(Math.random() * (whole - 5)) + 5;
            const part2 = whole - part1;
            bonds.push({ whole: whole, part1: part1, part2: part2, missing: Math.random() > 0.5 ? 'part1' : 'part2' });
        }
        return bonds;
    }
    
    function generateHardBonds() {
        const bonds = [];
        for (let i = 0; i < 8; i++) {
            const whole = Math.floor(Math.random() * 70) + 31;
            const part1 = Math.floor(Math.random() * (whole - 10)) + 10;
            const part2 = whole - part1;
            bonds.push({ whole: whole, part1: part1, part2: part2, missing: Math.random() > 0.5 ? 'part1' : 'part2' });
        }
        return bonds;
    }
    
    function drawVisualCircles(count, color) {
        let html = `<div class="visual-circles">`;
        let showCount = Math.min(count, 20);
        for (let i = 0; i < showCount; i++) {
            html += `<div class="circle" style="background: ${color};">${i+1}</div>`;
        }
        if (count > 20) html += `<div class="circle" style="background: #94a3b8;">+${count-20}</div>`;
        html += `</div>`;
        return html;
    }
    
    function renderEasy() {
        const bonds = generateEasyBonds();
        const container = document.getElementById('worksheetContainer');
        
        let problemsHtml = '';
        for (let i = 0; i < bonds.length; i += 2) {
            problemsHtml += `<div class="problem-row">`;
            for (let j = i; j < i + 2 && j < bonds.length; j++) {
                const b = bonds[j];
                const showWhole = b.whole <= 15 ? drawVisualCircles(b.whole, '#10b981') : '';
                
                let bondHtml = '';
                if (b.missing === 'part1') {
                    bondHtml = `
                        <div class="bond-diagram">
                            <div class="parts-container">
                                <div class="part-box" style="background: #f59e0b;">
                                    <span>?</span>
                                    <span class="part-label">Part</span>
                                </div>
                                <div class="plus-sign">+</div>
                                <div class="part-box" style="background: #f59e0b;">
                                    <span>${b.part2}</span>
                                    <span class="part-label">Part</span>
                                </div>
                            </div>
                            <div class="equals-sign">=</div>
                            <div class="whole-box">
                                <span>${b.whole}</span>
                                <span class="whole-label">Whole</span>
                            </div>
                        </div>
                        <div class="instruction">✨ Find the missing part: ? + ${b.part2} = ${b.whole}</div>
                    `;
                } else {
                    bondHtml = `
                        <div class="bond-diagram">
                            <div class="parts-container">
                                <div class="part-box" style="background: #f59e0b;">
                                    <span>${b.part1}</span>
                                    <span class="part-label">Part</span>
                                </div>
                                <div class="plus-sign">+</div>
                                <div class="part-box" style="background: #f59e0b;">
                                    <span>?</span>
                                    <span class="part-label">Part</span>
                                </div>
                            </div>
                            <div class="equals-sign">=</div>
                            <div class="whole-box">
                                <span>${b.whole}</span>
                                <span class="whole-label">Whole</span>
                            </div>
                        </div>
                        <div class="instruction">✨ Find the missing part: ${b.part1} + ? = ${b.whole}</div>
                    `;
                }
                
                problemsHtml += `
                    <div class="number-bond">
                        <div class="problem-number">Question ${j + 1}</div>
                        ${showWhole ? `<div style="margin-bottom: 10px;"><strong>🔵 ${b.whole} total objects:</strong>${showWhole}</div>` : ''}
                        ${bondHtml}
                        <div class="answer-line"></div>
                    </div>
                `;
            }
            problemsHtml += `</div>`;
        }
        
        container.innerHTML = `
            <div class="header">
                <div class="brand">
                    <div class="logo-container">
                        <img src="${logoUrl}" class="salam-logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'logo-fallback\\'>س</div>'">
                    </div>
                    <div class="title">
                        <h1>Salam Adventures</h1>
                        <p>Number Bonds · Easy Level (Numbers 1-10)</p>
                    </div>
                </div>
                <div class="student-info">🧒 Name: ___________________<br>📅 Date: ___________________</div>
            </div>
            <div class="level-badge"><span class="level-tag level-easy">🌱 Easy Level · Number Bonds to 10</span></div>
            <div class="problems-container">${problemsHtml}</div>
            <footer>🌟 Salam Adventures · Part-Whole relationships · Easy level 🌟</footer>
        `;
    }
    
    function renderMiddle() {
        const bonds = generateMiddleBonds();
        const container = document.getElementById('worksheetContainer');
        
        let problemsHtml = '';
        for (let i = 0; i < bonds.length; i += 2) {
            problemsHtml += `<div class="problem-row">`;
            for (let j = i; j < i + 2 && j < bonds.length; j++) {
                const b = bonds[j];
                
                let bondHtml = '';
                if (b.missing === 'part1') {
                    bondHtml = `
                        <div class="bond-diagram">
                            <div class="whole-box" style="background: #10b981; width: 90px; height: 90px;">
                                <span>${b.whole}</span>
                                <span class="whole-label">Whole</span>
                            </div>
                            <div class="parts-container">
                                <div class="part-box" style="background: #f59e0b; width: 70px; height: 70px;">
                                    <span>?</span>
                                    <span class="part-label">Part</span>
                                </div>
                                <div class="part-box" style="background: #f59e0b; width: 70px; height: 70px;">
                                    <span>${b.part2}</span>
                                    <span class="part-label">Part</span>
                                </div>
                            </div>
                        </div>
                        <div class="instruction">✨ ${b.part2} + ? = ${b.whole}</div>
                    `;
                } else {
                    bondHtml = `
                        <div class="bond-diagram">
                            <div class="whole-box" style="background: #10b981; width: 90px; height: 90px;">
                                <span>${b.whole}</span>
                                <span class="whole-label">Whole</span>
                            </div>
                            <div class="parts-container">
                                <div class="part-box" style="background: #f59e0b; width: 70px; height: 70px;">
                                    <span>${b.part1}</span>
                                    <span class="part-label">Part</span>
                                </div>
                                <div class="part-box" style="background: #f59e0b; width: 70px; height: 70px;">
                                    <span>?</span>
                                    <span class="part-label">Part</span>
                                </div>
                            </div>
                        </div>
                        <div class="instruction">✨ ${b.part1} + ? = ${b.whole}</div>
                    `;
                }
                
                problemsHtml += `
                    <div class="number-bond">
                        <div class="problem-number">Question ${j + 1}</div>
                        ${bondHtml}
                        <div class="answer-line"></div>
                        <div class="instruction">💡 Write the fact family: ${b.part1} + ${b.part2} = ${b.whole}</div>
                    </div>
                `;
            }
            problemsHtml += `</div>`;
        }
        
        container.innerHTML = `
            <div class="header">
                <div class="brand">
                    <div class="logo-container">
                        <img src="${logoUrl}" class="salam-logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'logo-fallback\\'>س</div>'">
                    </div>
                    <div class="title">
                        <h1>Salam Adventures</h1>
                        <p>Number Bonds · Middle Level (Numbers 10-30)</p>
                    </div>
                </div>
                <div class="student-info">🧒 Name: ___________________<br>📅 Date: ___________________</div>
            </div>
            <div class="level-badge"><span class="level-tag level-middle">⭐ Middle Level · Number Bonds to 30</span></div>
            <div class="problems-container">${problemsHtml}</div>
            <footer>🌟 Salam Adventures · Part-Whole relationships · Middle level 🌟</footer>
        `;
    }
    
    function renderHard() {
        const bonds = generateHardBonds();
        const container = document.getElementById('worksheetContainer');
        
        let problemsHtml = '';
        for (let i = 0; i < bonds.length; i += 2) {
            problemsHtml += `<div class="problem-row">`;
            for (let j = i; j < i + 2 && j < bonds.length; j++) {
                const b = bonds[j];
                
                let bondHtml = '';
                if (b.missing === 'part1') {
                    bondHtml = `
                        <div class="bond-diagram">
                            <div class="whole-box" style="background: #10b981;">
                                <span>${b.whole}</span>
                            </div>
                            <div class="parts-container">
                                <div class="part-box" style="background: #ef4444;">
                                    <span>?</span>
                                </div>
                                <div class="part-box" style="background: #ef4444;">
                                    <span>${b.part2}</span>
                                </div>
                            </div>
                        </div>
                        <div class="instruction">🔥 ${b.part2} + ___ = ${b.whole}</div>
                    `;
                } else {
                    bondHtml = `
                        <div class="bond-diagram">
                            <div class="whole-box" style="background: #10b981;">
                                <span>${b.whole}</span>
                            </div>
                            <div class="parts-container">
                                <div class="part-box" style="background: #ef4444;">
                                    <span>${b.part1}</span>
                                </div>
                                <div class="part-box" style="background: #ef4444;">
                                    <span>?</span>
                                </div>
                            </div>
                        </div>
                        <div class="instruction">🔥 ${b.part1} + ___ = ${b.whole}</div>
                    `;
                }
                
                problemsHtml += `
                    <div class="number-bond">
                        <div class="problem-number">Question ${j + 1}</div>
                        ${bondHtml}
                        <div class="answer-line"></div>
                        <div class="instruction">📝 Write the complete fact family:</div>
                        <div class="answer-line" style="height: 25px;"></div>
                        <div class="answer-line" style="height: 25px;"></div>
                    </div>
                `;
            }
            problemsHtml += `</div>`;
        }
        
        const wordProblemWhole = Math.floor(Math.random() * 50) + 50;
        const wordProblemPart = Math.floor(Math.random() * (wordProblemWhole - 20)) + 20;
        
        container.innerHTML = `
            <div class="header">
                <div class="brand">
                    <div class="logo-container">
                        <img src="${logoUrl}" class="salam-logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'logo-fallback\\'>س</div>'">
                    </div>
                    <div class="title">
                        <h1>Salam Adventures</h1>
                        <p>Number Bonds · Hard Level (Numbers 30-100)</p>
                    </div>
                </div>
                <div class="student-info">🧒 Name: ___________________<br>📅 Date: ___________________</div>
            </div>
            <div class="level-badge"><span class="level-tag level-hard">🔥 Hard Level · Number Bonds to 100</span></div>
            <div class="problems-container">${problemsHtml}</div>
            <div class="section">
                <div class="section-title">🏆 Challenge Word Problem</div>
                <div class="number-bond">
                    <div class="problem-text" style="font-size: 18px; margin-bottom: 15px;">Salam has ${wordProblemWhole} total marbles. ${wordProblemPart} are blue. The rest are red. How many red marbles are there?</div>
                    <div class="bond-diagram">
                        <div class="whole-box" style="background: #10b981; width: 90px; height: 90px;">
                            <span>${wordProblemWhole}</span>
                            <span class="whole-label">Total</span>
                        </div>
                        <div class="parts-container">
                            <div class="part-box" style="background: #3b82f6; width: 70px; height: 70px;">
                                <span>${wordProblemPart}</span>
                                <span class="part-label">Blue</span>
                            </div>
                            <div class="part-box" style="background: #ef4444; width: 70px; height: 70px;">
                                <span>?</span>
                                <span class="part-label">Red</span>
                            </div>
                        </div>
                    </div>
                    <div class="answer-line" style="height: 50px;"></div>
                </div>
            </div>
            <footer>🌟 Salam Adventures · Part-Whole relationships · Hard level 🌟</footer>
        `;
    }
    
    function updateStatus(msg) {
        const status = document.getElementById('statusMsg');
        status.innerHTML = msg;
        setTimeout(() => {
            status.innerHTML = '🔢 Salam Number Bonds · Ready';
        }, 2000);
    }
    
    document.getElementById('easyBtn').addEventListener('click', () => { renderEasy(); updateStatus('🌱 Easy level worksheet ready!'); });
    document.getElementById('middleBtn').addEventListener('click', () => { renderMiddle(); updateStatus('⭐ Middle level worksheet ready!'); });
    document.getElementById('hardBtn').addEventListener('click', () => { renderHard(); updateStatus('🔥 Hard level worksheet ready!'); });
    
    renderEasy();
</script>
</body>
</html>
