<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Quest Mini</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cabinet: #2563eb;
            --screen-bg: #f0f9ff;
            --text: #0c4a6e;
        }

        /* Responsive Wrapper for Website Integration */
        .game-wrapper {
            max-width: 500px; /* Compact width */
            margin: 20px auto;
            font-family: 'Nunito', sans-serif;
            text-align: center;
        }

        .seo-mini {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        /* Compact Arcade Cabinet */
        .arcade-mini {
            background: var(--cabinet);
            border-radius: 30px;
            padding: 15px;
            border: 6px solid #1d4ed8;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        .screen-mini {
            background: var(--screen-bg);
            border: 8px solid #1e293b;
            border-radius: 15px;
            height: 380px; /* Fixed height for consistency */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            overflow: hidden;
        }

        .target-num {
            font-family: 'Fredoka One', cursive;
            font-size: 4rem;
            color: #2563eb;
            margin: 0;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
        }

        .item {
            font-size: 35px;
            cursor: pointer;
            transition: 0.1s;
            user-select: none;
        }

        .item.collected { 
            opacity: 0.1; 
            pointer-events: none; 
            transform: scale(0.5);
        }

        .controls-mini {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-mini {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 20px;
            font-family: 'Fredoka One';
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .btn-green { background: #22c55e; }
        .btn-red { background: #ef4444; }
        .btn-mini:active { transform: translateY(3px); box-shadow: none; }

        .count-pop {
            position: absolute;
            font-family: 'Fredoka One';
            color: #fbbf24;
            pointer-events: none;
            animation: popUp 0.5s ease-out forwards;
            z-index: 10;
        }

        @keyframes popUp { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(1.5); } }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="seo-mini">
        <strong style="color:#2563eb">Counting Quest:</strong> An interactive 1-10 math game for preschoolers. Practice number recognition and motor skills!
    </div>

    <div class="arcade-mini">
        <div class="screen-mini" id="gameScreen">
            <div style="font-size: 0.8rem; font-weight: 900; color: #64748b;">COLLECT EXACTLY:</div>
            <h1 class="target-num" id="target">?</h1>
            
            <div class="item-grid" id="grid"></div>
            
            <div style="font-weight: 900; color: #1e293b;">
                COUNTED: <span id="liveCount" style="color:#2563eb">0</span>
            </div>
        </div>

        <div class="controls-mini">
            <button class="btn-mini btn-red" onclick="resetGame()">RESET</button>
            <button class="btn-mini btn-green" onclick="checkFinal()">SUBMIT</button>
        </div>
    </div>

    <div class="seo-mini" style="margin-top:15px; font-size:0.8rem">
        Levels & Sounds Included • Fun Early Numeracy Tool • No Download Required
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playNote(freq, type = 'sine', vol = 0.05, duration = 0.1) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const state = { target: 0, count: 0, emojis: ['🍎', '🐸', '🚀', '🐱', '🍦', '🐼'] };

    function initLevel() {
        state.target = Math.floor(Math.random() * 8) + 2;
        state.count = 0;
        const emoji = state.emojis[Math.floor(Math.random() * state.emojis.length)];
        document.getElementById('target').textContent = state.target;
        document.getElementById('liveCount').textContent = "0";
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const el = document.createElement('div');
            el.className = 'item'; el.textContent = emoji;
            el.onclick = (e) => handleItemClick(e, el);
            grid.appendChild(el);
        }
    }

    function handleItemClick(e, el) {
        if (el.classList.contains('collected')) return;
        state.count++;
        el.classList.add('collected');
        document.getElementById('liveCount').textContent = state.count;
        playNote(300 + (state.count * 50));
        
        const pop = document.createElement('div');
        pop.className = 'count-pop'; pop.textContent = state.count;
        pop.style.left = (e.clientX - 15) + 'px'; pop.style.top = (e.clientY - 30) + 'px';
        document.body.appendChild(pop);
        setTimeout(() => pop.remove(), 500);
    }

    function resetGame() { playNote(200, 'sawtooth'); initLevel(); }

    function checkFinal() {
        const s = document.getElementById('gameScreen');
        if (state.count === state.target) {
            playNote(523); setTimeout(() => playNote(783), 100);
            s.style.background = '#dcfce7';
            setTimeout(() => { s.style.background = '#f0f9ff'; initLevel(); }, 600);
        } else {
            playNote(100, 'sawtooth');
            s.style.background = '#fee2e2';
            setTimeout(() => { s.style.background = '#f0f9ff'; resetGame(); }, 600);
        }
    }

    initLevel();
</script>
</body>
</html>
