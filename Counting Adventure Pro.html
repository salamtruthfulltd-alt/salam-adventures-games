<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Adventure: Mega Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cabinet: #2563eb;
            --screen-border: #1e293b;
            --screen-bg: #f0f9ff;
            --btn-red: #ef4444;
            --btn-green: #22c55e;
            --text: #0c4a6e;
        }

        body {
            margin: 0;
            height: 100vh;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        /* Giant Arcade Cabinet Casing */
        .arcade-container {
            width: 95vw;
            height: 90vh;
            max-width: 1000px;
            background: var(--cabinet);
            border-radius: 50px 50px 20px 20px;
            border: 12px solid #1d4ed8;
            box-shadow: 0 0 0 10px #1e293b, 0 30px 60px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            padding: 40px;
            position: relative;
        }

        /* Marquee / Top Panel */
        .marquee {
            text-align: center;
            background: #1e293b;
            margin: -40px -40px 30px -40px;
            padding: 20px;
            border-radius: 40px 40px 0 0;
            color: #fbbf24;
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #fbbf24;
            border-bottom: 5px solid #fbbf24;
        }

        /* The Big Screen */
        .screen {
            flex: 1;
            background: var(--screen-bg);
            border: 15px solid var(--screen-border);
            border-radius: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            color: var(--text);
        }

        .target-zone {
            text-align: center;
            margin-top: 40px;
        }

        .target-number {
            font-family: 'Fredoka One', cursive;
            font-size: 120px;
            margin: 0;
            color: #2563eb;
            line-height: 1;
        }

        /* The Interaction Area */
        .play-area {
            width: 90%;
            height: 250px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .item {
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            user-select: none;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }

        /* Animation for pressing */
        .item:active { transform: scale(0.8); }
        .item.collected { 
            opacity: 0.2; 
            pointer-events: none; 
            transform: translateY(-50px) scale(0.5);
            filter: grayscale(1);
        }

        /* Buttons / Control Deck */
        .control-deck {
            height: 120px;
            margin-top: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .joystick-btn {
            width: 200px;
            height: 70px;
            border: none;
            border-radius: 35px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 0 rgba(0,0,0,0.3);
            transition: all 0.1s;
        }

        .btn-clear { background: var(--btn-red); }
        .btn-submit { background: var(--btn-green); }
        
        .joystick-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        /* Floating feedback */
        .count-pop {
            position: absolute;
            font-family: 'Fredoka One';
            font-size: 4rem;
            color: #fbbf24;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-150px); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="arcade-container">
    <div class="marquee">COUNTING QUEST</div>

    <div class="screen" id="mainScreen">
        <div class="stats">
            <div>LEVEL: <span id="lvl">1</span></div>
            <div>STARS: <span id="score">0</span></div>
        </div>

        <div class="target-zone">
            <div style="font-size: 1.2rem; font-weight: bold;">FIND EXACTLY:</div>
            <h1 class="target-number" id="target">?</h1>
        </div>

        <div class="play-area" id="grid"></div>
        
        <div id="counter-msg" style="font-size: 2rem; color: #1e293b; font-weight: 900;">
            Current Count: <span id="liveCount">0</span>
        </div>
    </div>

    <div class="control-deck">
        <button class="joystick-btn btn-clear" onclick="resetGame()">TRY AGAIN</button>
        <button class="joystick-btn btn-submit" onclick="checkFinal()">SUBMIT</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playNote(freq, type = 'sine', vol = 0.1, duration = 0.1) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const state = {
        level: 1,
        score: 0,
        target: 0,
        count: 0,
        emojis: ['🦁', '🐙', '🦖', '🦄', '🐝', '🍩', '🍔', '🚀']
    };

    function initLevel() {
        state.target = Math.floor(Math.random() * 10) + 1;
        state.count = 0;
        const emoji = state.emojis[Math.floor(Math.random() * state.emojis.length)];
        
        document.getElementById('target').textContent = state.target;
        document.getElementById('lvl').textContent = state.level;
        document.getElementById('score').textContent = state.score;
        document.getElementById('liveCount').textContent = "0";
        
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        
        // Always generate 10 items so they have to count carefully
        for (let i = 0; i < 10; i++) {
            const el = document.createElement('div');
            el.className = 'item';
            el.textContent = emoji;
            el.onclick = (e) => handleItemClick(e, el);
            grid.appendChild(el);
        }
    }

    function handleItemClick(e, el) {
        if (el.classList.contains('collected')) return;
        
        state.count++;
        el.classList.add('collected');
        document.getElementById('liveCount').textContent = state.count;
        
        // Sound pitch increases with count
        playNote(300 + (state.count * 60), 'triangle', 0.15, 0.2);
        
        // Visual Pop
        const pop = document.createElement('div');
        pop.className = 'count-pop';
        pop.textContent = state.count;
        pop.style.left = e.clientX - 50 + 'px';
        pop.style.top = e.clientY - 100 + 'px';
        document.body.appendChild(pop);
        setTimeout(() => pop.remove(), 800);
    }

    function resetGame() {
        playNote(200, 'sawtooth', 0.1, 0.2);
        initLevel();
    }

    function checkFinal() {
        if (state.count === state.target) {
            // Success
            playNote(523, 'sine', 0.1, 0.1);
            setTimeout(() => playNote(659, 'sine', 0.1, 0.1), 100);
            setTimeout(() => playNote(783, 'sine', 0.2, 0.3), 200);
            
            state.score += (state.level * 10);
            state.level++;
            
            document.getElementById('mainScreen').style.background = '#dcfce7';
            setTimeout(() => {
                document.getElementById('mainScreen').style.background = 'var(--screen-bg)';
                initLevel();
            }, 1000);
        } else {
            // Fail
            playNote(100, 'sawtooth', 0.2, 0.5);
            document.getElementById('mainScreen').style.background = '#fee2e2';
            setTimeout(() => {
                document.getElementById('mainScreen').style.background = 'var(--screen-bg)';
                resetGame();
            }, 800);
        }
    }

    // Start Game
    initLevel();
</script>

</body>
</html>
