<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Quest Micro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --dark: #1e293b; --bg: #f0f9ff; }
        
        /* The Wrapper: Set this to 100% if putting in a small div, or 350px for a sidebar */
        .game-widget {
            width: 100%;
            max-width: 350px; 
            margin: 10px auto;
            font-family: 'Nunito', sans-serif;
            user-select: none;
        }

        /* Arcade Casing */
        .arcade-card {
            background: var(--blue);
            border-radius: 24px;
            padding: 12px;
            border-bottom: 6px solid #1d4ed8;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* Fixed Game Screen */
        .screen {
            background: var(--bg);
            border: 6px solid var(--dark);
            border-radius: 16px;
            height: 320px;
            position: relative; /* Keeps pop-ups inside */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            overflow: hidden;
            padding: 10px;
        }

        .target-display {
            text-align: center;
            line-height: 1;
        }

        .target-display span { font-size: 0.7rem; color: #64748b; font-weight: 900; display: block; }
        .target-display h1 { font-family: 'Fredoka One'; font-size: 3.5rem; color: var(--blue); margin: 0; }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 100%;
        }

        .item {
            font-size: 32px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s;
        }

        .item.done { opacity: 0.1; pointer-events: none; transform: scale(0.7); }

        /* Buttons */
        .btn-row { display: flex; gap: 8px; margin-top: 12px; }
        .btn {
            flex: 1; padding: 10px; border: none; border-radius: 15px;
            font-family: 'Fredoka One'; color: white; cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2); font-size: 0.9rem;
        }
        .btn-go { background: #22c55e; }
        .btn-no { background: #ef4444; }
        .btn:active { transform: translateY(2px); box-shadow: none; }

        /* Pop-up animation restricted to screen */
        .pop {
            position: absolute;
            font-family: 'Fredoka One';
            color: #fbbf24;
            pointer-events: none;
            animation: up 0.5s ease-out forwards;
            font-size: 1.5rem;
        }
        @keyframes up { 0% { opacity: 1; } 100% { opacity: 0; transform: translateY(-40px); } }
        
        .seo-tag { font-size: 0.75rem; color: #94a3b8; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>

<div class="game-widget">
    <div class="arcade-card">
        <div class="screen" id="stage">
            <div class="target-display">
                <span>COLLECT</span>
                <h1 id="num">?</h1>
            </div>

            <div class="grid" id="box"></div>
            
            <div style="font-weight: 900; font-size: 0.8rem;">
                COUNT: <span id="cur" style="color:var(--blue)">0</span>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-no" onclick="reset()">CLR</button>
            <button class="btn btn-go" onclick="check()">SUBMIT</button>
        </div>
    </div>
    <div class="seo-tag"><b>Counting Quest:</b> Early Math Learning Game</div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, t='sine') {
        const o=audio.createOscillator(), g=audio.createGain();
        o.type=t; o.frequency.value=f; g.gain.value=0.05;
        o.connect(g); g.connect(audio.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime+0.1);
        o.stop(audio.currentTime+0.1);
    }

    let goal=0, has=0;
    const icons = ['🍎','⭐','🐸','🚀','🐱','🍦'];

    function start() {
        goal = Math.floor(Math.random()*9)+2;
        has = 0;
        const icon = icons[Math.floor(Math.random()*icons.length)];
        document.getElementById('num').innerText = goal;
        document.getElementById('cur').innerText = "0";
        const b = document.getElementById('box');
        b.innerHTML = '';
        for(let i=0; i<10; i++) {
            const d = document.createElement('div');
            d.className='item'; d.innerText=icon;
            d.onclick=(e)=>hit(e, d);
            b.appendChild(d);
        }
    }

    function hit(e, d) {
        if(d.classList.contains('done')) return;
        has++;
        d.classList.add('done');
        document.getElementById('cur').innerText = has;
        beep(300+(has*40));
        
        // Pop-up logic relative to the screen container
        const p = document.createElement('div');
        p.className='pop'; p.innerText=has;
        const rect = document.getElementById('stage').getBoundingClientRect();
        p.style.left = (e.clientX - rect.left - 10) + 'px';
        p.style.top = (e.clientY - rect.top - 20) + 'px';
        document.getElementById('stage').appendChild(p);
        setTimeout(()=>p.remove(), 500);
    }

    function reset() { beep(200,'sawtooth'); start(); }

    function check() {
        const s = document.getElementById('stage');
        if(has === goal) {
            beep(500); setTimeout(()=>beep(800), 100);
            s.style.background='#dcfce7';
            setTimeout(()=>{s.style.background='#f0f9ff'; start();}, 600);
        } else {
            beep(100,'sawtooth');
            s.style.background='#fee2e2';
            setTimeout(()=>{s.style.background='#f0f9ff'; reset();}, 600);
        }
    }

    start();
</script>
</body>
</html>
