<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gumball Mini Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ef4444; --dark: #b91c1c; }
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        body { 
            margin: 0; padding: 0; background: #fef2f2; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; width: 100vw; overflow: hidden; font-family: 'Fredoka One', cursive;
        }

        #start-overlay {
            position: fixed; inset: 0; background: var(--red);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white;
        }

        .card {
            width: 250px; height: 330px; background: white; 
            padding: 10px; border-radius: 25px; border: 4px solid var(--red);
            box-shadow: 0 5px 0 var(--dark); display: flex; 
            flex-direction: column; align-items: center; position: relative;
        }

        .msg { color: var(--red); font-size: 0.9rem; margin-bottom: 5px; height: 1.1rem; }

        #globe {
            width: 100px; height: 100px; background: rgba(226, 232, 240, 0.4); 
            border: 2px solid #cbd5e1; border-radius: 50%; 
            position: relative; overflow: hidden;
        }

        .base {
            width: 65px; height: 22px; background: var(--red);
            margin: -8px 0 10px 0; border-radius: 5px 5px 15px 15px;
            border-bottom: 4px solid var(--dark); z-index: 5;
        }

        #tray { 
            width: 100%; height: 45px; background: #fee2e2; 
            border-radius: 10px; border: 2px dashed #fca5a5;
            margin-top: auto; margin-bottom: 5px;
        }

        .gumball {
            width: 26px; height: 26px; border-radius: 50%; position: absolute;
            z-index: 100; border: 1.5px solid rgba(0,0,0,0.1);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
            cursor: grab;
        }

        button {
            padding: 10px 30px; font-size: 1.1rem; font-family: 'Fredoka One';
            background: white; color: var(--red); border: none; border-radius: 50px;
            box-shadow: 0 4px 0 var(--dark);
        }
    </style>
</head>
<body>

<div id="start-overlay" onclick="start()">
    <button>PLAY</button>
</div>

<div class="card" id="game-stage">
    <div class="msg" id="msg">Count to 5!</div>
    <div id="globe"></div>
    <div class="base"></div>
    <div id="tray"></div>
</div>

<script>
    let audioCtx, count = 0;
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];
    const stage = document.getElementById('game-stage');
    const globe = document.getElementById('globe');
    const msg = document.getElementById('msg');
    const tray = document.getElementById('tray');

    function start() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('start-overlay').style.display = 'none';
        reset();
    }

    function popSound() {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(400 + (count * 40), audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function reset() {
        count = 0;
        document.querySelectorAll('.gumball').forEach(b => b.remove());
        msg.innerText = "Count to 5!";
        
        // Locked Tray Positioning
        const trayX = tray.offsetLeft + 6;
        const trayY = tray.offsetTop + 8;
        const step = (tray.clientWidth - 30) / 5;

        colors.forEach((color, i) => {
            const b = document.createElement('div');
            b.className = 'gumball';
            b.style.background = color;
            b.style.left = (trayX + (i * step)) + 'px';
            b.style.top = trayY + 'px';
            b.onpointerdown = grab;
            stage.appendChild(b);
        });
    }

    function grab(e) {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        const ball = e.target;
        ball.setPointerCapture(e.pointerId);
        ball.style.zIndex = "1000";

        const sRect = stage.getBoundingClientRect();
        const gRect = globe.getBoundingClientRect();
        const gx = gRect.left + (gRect.width / 2);
        const gy = gRect.top + (gRect.height / 2);

        const move = (ev) => {
            ball.style.left = (ev.clientX - sRect.left - 13) + 'px';
            ball.style.top = (ev.clientY - sRect.top - 13) + 'px';
        };

        const drop = (ev) => {
            ball.removeEventListener('pointermove', move);
            ball.removeEventListener('pointerup', drop);
            
            const dist = Math.hypot(ev.clientX - gx, ev.clientY - gy);

            if (dist < 55) {
                count++;
                ball.onpointerdown = null;
                ball.style.zIndex = "10";
                
                const finalX = (gRect.left - sRect.left) + 15 + (Math.random() * 40);
                const finalY = (gRect.top - sRect.top) + 45 - (Math.floor((count-1)/2) * 15);
                
                ball.style.left = finalX + 'px';
                ball.style.top = finalY + 'px';
                
                popSound();
                if(count === 5) {
                    msg.innerText = "YAY! 5 GUMBALLS!";
                    setTimeout(reset, 3000);
                }
            } else {
                reset(); 
            }
        };

        ball.addEventListener('pointermove', move);
        ball.addEventListener('pointerup', drop);
    }
</script>
</body>
</html>
