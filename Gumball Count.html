<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gumball Count: 1-5 Fun</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255,255,255,0.2); --machine-red: #ef4444; }
        body { margin: 0; background: #fef2f2; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        .game-card { 
            width: 100%; max-width: 320px; font-family: 'Fredoka One', cursive; 
            background: #fff; padding: 20px; border-radius: 40px; border: 6px solid var(--machine-red);
            position: relative; touch-action: none; text-align: center; box-shadow: 0 10px 0 #b91c1c;
        }

        /* The Gumball Globe */
        #globe {
            width: 180px; height: 180px; background: var(--glass); border: 4px solid #e2e8f0;
            border-radius: 50%; margin: 0 auto 10px; position: relative;
            overflow: hidden; box-shadow: inset 0 10px 20px rgba(0,0,0,0.05);
        }

        /* Machine Base */
        .base {
            width: 120px; height: 60px; background: var(--machine-red);
            margin: -15px auto 15px; border-radius: 10px 10px 40px 40px;
            position: relative; z-index: 2; border-bottom: 8px solid #b91c1c;
        }

        .gumball {
            width: 35px; height: 35px; border-radius: 50%; position: absolute;
            cursor: grab; z-index: 10; border: 2px solid rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .gumball:active { transform: scale(1.2); cursor: grabbing; }

        .in-globe { pointer-events: none; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .target-text { color: var(--machine-red); font-size: 1.5rem; margin-bottom: 10px; }
        #tray { height: 70px; background: #fee2e2; border-radius: 20px; position: relative; margin-top: 10px; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="target-text">Put 5 Gumballs in the Machine!</div>
    
    <div id="globe">
        </div>
    <div class="base"></div>

    <div id="tray">
        </div>
    <div style="margin-top:10px; font-size:0.8rem; color:#991b1b;">DRAG THE CANDY UP!</div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];

    function playPop(f) {
        if (audio.state === 'suspended') audio.resume();
        const o=audio.createOscillator(), g=audio.createGain();
        o.type='sine'; o.frequency.setValueAtTime(f, audio.currentTime);
        o.frequency.exponentialRampToValueAtTime(10, audio.currentTime + 0.1);
        g.gain.setValueAtTime(0.1, audio.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.1);
        o.connect(g); g.connect(audio.destination);
        o.start(); o.stop(audio.currentTime + 0.1);
    }

    function playCheer() {
        for(let i=0; i<10; i++) {
            setTimeout(() => playPop(400 + Math.random()*600), i * 100);
        }
    }

    let count = 0;
    const globe = document.getElementById('globe');
    const tray = document.getElementById('tray');

    function init() {
        count = 0; globe.innerHTML = ''; tray.innerHTML = '';
        for(let i=0; i<6; i++) {
            const b = document.createElement('div');
            b.className = 'gumball';
            b.style.background = colors[i];
            b.style.left = (15 + (i*45)) + 'px';
            b.style.top = '15px';
            b.onpointerdown = startDrag;
            tray.appendChild(b);
        }
    }

    function startDrag(e) {
        const el = e.target; el.setPointerCapture(e.pointerId);
        const startX = e.clientX, startY = e.clientY, origX = el.offsetLeft, origY = el.offsetTop;

        const onMove = (me) => {
            el.style.left = (origX + (me.clientX - startX)) + 'px';
            el.style.top = (origY + (me.clientY - startY)) + 'px';
        };

        const onUp = (ue) => {
            el.removeEventListener('pointermove', onMove);
            el.removeEventListener('pointerup', onUp);
            
            const gRect = globe.getBoundingClientRect();
            if (ue.clientX > gRect.left && ue.clientX < gRect.right && 
                ue.clientY > gRect.top && ue.clientY < gRect.bottom) {
                
                count++;
                el.classList.add('in-globe');
                globe.appendChild(el);
                // "Physics" placement - balls settle at bottom
                el.style.left = (20 + (Math.random() * 110)) + 'px';
                el.style.top = (130 - (Math.floor((count-1)/3) * 30)) + 'px';
                
                playPop(300 + (count * 100));

                if(count === 5) {
                    playCheer();
                    setTimeout(init, 3000);
                }
            } else {
                el.style.left = (origX) + 'px'; el.style.top = '15px';
            }
        };
        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
    }
    init();
</script>
</body>
</html>
