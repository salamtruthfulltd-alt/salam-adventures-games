<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gumball Fun</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ef4444; --dark: #b91c1c; }
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }

        body { 
            margin: 0; padding: 0; background: #fef2f2; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden; font-family: 'Fredoka One', cursive;
        }

        /* The 'Unlocker' Screen */
        #start-screen {
            position: fixed; inset: 0; background: var(--red);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; color: white;
        }

        .btn-play {
            padding: 15px 40px; font-size: 1.5rem; font-family: 'Fredoka One';
            background: white; color: var(--red); border: none; border-radius: 50px;
            box-shadow: 0 5px 0 var(--dark); cursor: pointer; transition: 0.1s;
        }
        .btn-play:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--dark); }

        .game-card {
            width: 280px; background: white; padding: 15px; 
            border-radius: 25px; border: 4px solid var(--red);
            box-shadow: 0 5px 0 var(--dark); display: flex; flex-direction: column; align-items: center;
            position: relative;
        }

        .status-msg { color: var(--red); font-size: 1.1rem; margin-bottom: 10px; height: 1.5rem; }

        #globe {
            width: 120px; height: 120px; background: rgba(226, 232, 240, 0.5); 
            border: 2px solid #cbd5e1; border-radius: 50%; 
            position: relative; overflow: hidden;
        }

        .machine-base {
            width: 80px; height: 30px; background: var(--red);
            margin: -10px 0 10px 0; border-radius: 5px 5px 20px 20px;
            border-bottom: 4px solid var(--dark);
        }

        #tray { 
            width: 100%; height: 50px; background: #fee2e2; 
            border-radius: 12px; position: relative; border: 2px dashed #fca5a5;
        }

        .gumball {
            width: 32px; height: 32px; border-radius: 50%; position: absolute;
            z-index: 100; border: 1.5px solid rgba(0,0,0,0.1);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
            cursor: grab; touch-action: none;
        }
    </style>
</head>
<body>

<div id="start-screen">
    <div style="font-size: 2rem; margin-bottom: 20px;">Gumball Count!</div>
    <button class="btn-play" onclick="initGame()">START GAME</button>
</div>

<div class="game-card" id="gameArea">
    <div class="status-msg" id="status">Put 5 Gumballs in!</div>
    <div id="globe"></div>
    <div class="machine-base"></div>
    <div id="tray"></div>
</div>

<script>
    let audioCtx;
    let count = 0;
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];
    const globe = document.getElementById('globe');
    const tray = document.getElementById('tray');
    const status = document.getElementById('status');
    const gameArea = document.getElementById('gameArea');

    function initGame() {
        // Essential: Initialize Audio on a human 'Click' event
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('start-screen').style.display = 'none';
        resetBoard();
    }

    function playPopSound(freq) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
        
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function resetBoard() {
        count = 0;
        globe.innerHTML = '';
        tray.innerHTML = '';
        status.innerText = "Count to 5!";
        
        for(let i = 0; i < 6; i++) {
            const ball = document.createElement('div');
            ball.className = 'gumball';
            ball.style.background = colors[i];
            ball.style.left = (10 + (i * 42)) + 'px';
            ball.style.top = '8px';
            
            // Pointer events work for BOTH Mouse and Touch
            ball.onpointerdown = handleDrag;
            tray.appendChild(ball);
        }
    }

    function handleDrag(e) {
        const ball = e.target;
        ball.setPointerCapture(e.pointerId);
        
        // Find where the game is on the screen to calculate relative movement
        const rect = gameArea.getBoundingClientRect();

        const onMove = (ev) => {
            // Center gumball on mouse/finger
            const x = ev.clientX - rect.left - 16;
            const y = ev.clientY - rect.top - 16;
            
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
            
            // Bring to front while moving
            if (ball.parentElement !== gameArea) gameArea.appendChild(ball);
        };

        const onUp = (ev) => {
            ball.removeEventListener('pointermove', onMove);
            ball.removeEventListener('pointerup', onUp);
            
            const gRect = globe.getBoundingClientRect();
            
            // Check if gumball was dropped inside the glass
            if (ev.clientX > gRect.left && ev.clientX < gRect.right && 
                ev.clientY > gRect.top && ev.clientY < gRect.bottom) {
                
                count++;
                globe.appendChild(ball);
                ball.onpointerdown = null; // Can't move it again
                
                // Random drop position inside globe
                ball.style.left = (10 + Math.random() * 70) + 'px';
                ball.style.top = (85 - (Math.floor((count-1)/2) * 22)) + 'px';
                
                playPopSound(300 + (count * 100));

                if(count === 5) {
                    status.innerText = "GREAT JOB!";
                    setTimeout(() => playPopSound(800), 200);
                    setTimeout(resetBoard, 3000);
                }
            } else {
                // If dropped outside, snap back to tray
                resetBoard();
            }
        };

        ball.addEventListener('pointermove', onMove);
        ball.addEventListener('pointerup', onUp);
    }
</script>

</body>
</html>
