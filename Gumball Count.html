<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gumball Count 1-5</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ef4444; --dark: #b91c1c; }
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        body { 
            margin: 0; padding: 0; background: #fef2f2; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; width: 100vw; overflow: hidden; font-family: 'Fredoka One', cursive;
        }

        #overlay {
            position: fixed; inset: 0; background: var(--red);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white;
        }

        .card {
            width: 280px; height: 380px; background: white; 
            padding: 15px; border-radius: 30px; border: 5px solid var(--red);
            box-shadow: 0 6px 0 var(--dark); display: flex; 
            flex-direction: column; align-items: center; position: relative;
        }

        .msg { color: var(--red); font-size: 1.1rem; margin-bottom: 5px; height: 1.5rem; }

        #globe {
            width: 130px; height: 130px; background: rgba(226, 232, 240, 0.4); 
            border: 3px solid #cbd5e1; border-radius: 50%; 
            position: relative; overflow: hidden;
        }

        .base {
            width: 80px; height: 30px; background: var(--red);
            margin: -12px 0 10px 0; border-radius: 5px 5px 20px 20px;
            border-bottom: 5px solid var(--dark); z-index: 5;
        }

        #tray { 
            width: 100%; height: 60px; background: #fee2e2; 
            border-radius: 12px; border: 2px dashed #fca5a5;
            margin-top: auto; margin-bottom: 5px;
        }

        .gumball {
            width: 32px; height: 32px; border-radius: 50%; position: absolute;
            z-index: 100; border: 2px solid rgba(0,0,0,0.1);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
            cursor: grab;
        }

        button {
            padding: 12px 35px; font-size: 1.4rem; font-family: 'Fredoka One';
            background: white; color: var(--red); border: none; border-radius: 50px;
            box-shadow: 0 4px 0 var(--dark);
        }
    </style>
</head>
<body>

<div id="overlay" onclick="start()">
    <button>START GAME</button>
</div>

<div class="card" id="game-stage">
    <div class="msg" id="msg">Count to 5!</div>
    <div id="globe"></div>
    <div class="base"></div>
    <div id="tray"></div>
</div>

<script>
    let audioCtx, count = 0;
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];
    const stage = document.getElementById('game-stage');
    const globe = document.getElementById('globe');
    const msg = document.getElementById('msg');
    const tray = document.getElementById('tray');

    function start() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('overlay').style.display = 'none';
        reset();
    }

    function beep(f) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.frequency.setValueAtTime(f, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.1);
    }

    function reset() {
        count = 0;
        document.querySelectorAll('.gumball').forEach(b => b.remove());
        msg.innerText = "Count to 5!";
        
        const trayRect = tray.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();
        
        const startX = tray.offsetLeft + 10;
        const startY = tray.offsetTop + 14;
        const spacing = (tray.clientWidth - 45) / 5;

        colors.forEach((color, i) => {
            const b = document.createElement('div');
            b.className = 'gumball';
            b.style.background = color;
            b.style.left = (startX + (i * spacing)) + 'px';
            b.style.top = startY + 'px';
            b.onpointerdown = grab;
            stage.appendChild(b);
        });
    }

    function grab(e) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const ball = e.target;
        ball.setPointerCapture(e.pointerId);
        ball.style.zIndex = "1000";

        const sRect = stage.getBoundingClientRect();
        const gRect = globe.getBoundingClientRect();
        
        const gx = gRect.left + (gRect.width / 2);
        const gy = gRect.top + (gRect.height / 2);

        const move = (ev) => {
            ball.style.left = (ev.clientX - sRect.left - 16) + 'px';
            ball.style.top = (ev.clientY - sRect.top - 16) + 'px';
        };

        const drop = (ev) => {
            ball.removeEventListener('pointermove', move);
            ball.removeEventListener('pointerup', drop);
            
            const dist = Math.hypot(ev.clientX - gx, ev.clientY - gy);

            if (dist < 75) {
                count++;
                ball.onpointerdown = null;
                ball.style.zIndex = "10";
                
                // Absolute placement relative to Stage
                const finalX = (gRect.left - sRect.left) + 25 + (Math.random() * 50);
                const finalY = (gRect.top - sRect.top) + 60 - (Math.floor((count-1)/2) * 20);
                
                ball.style.left = finalX + 'px';
                ball.style.top = finalY + 'px';
                
                beep(300 + (count * 100));
                if(count === 5) {
                    msg.innerText = "5 GUMBALLS! YAY!";
                    setTimeout(() => beep(800), 200);
                    setTimeout(reset, 3000);
                }
            } else {
                reset(); 
            }
        };

        ball.addEventListener('pointermove', move);
        ball.addEventListener('pointerup', drop);
    }
</script>
</body>
</html>
