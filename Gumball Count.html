<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gumball Count 1-5</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ef4444; --dark: #b91c1c; }
        
        /* Stop the phone from bouncing or zooming */
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }

        body { 
            margin: 0; padding: 0; background: #fef2f2; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden; font-family: 'Fredoka One', cursive;
        }

        .game-card { 
            width: 92vw; max-width: 340px; 
            height: auto; max-height: 95dvh;
            background: white; padding: 15px; 
            border-radius: 30px; border: 5px solid var(--red);
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 6px 0 var(--dark); position: relative;
        }

        .title { color: var(--red); font-size: 1.1rem; margin-bottom: 8px; }

        /* Globe scales based on screen width */
        #globe {
            width: 45vw; height: 45vw; max-width: 150px; max-height: 150px;
            background: rgba(226, 232, 240, 0.4); 
            border: 3px solid #cbd5e1; border-radius: 50%; 
            position: relative; overflow: hidden; z-index: 1;
        }

        .base {
            width: 35%; height: 40px; background: var(--red);
            margin: -12px 0 8px 0; border-radius: 5px 5px 25px 25px;
            border-bottom: 5px solid var(--dark); z-index: 2;
        }

        #tray { 
            width: 100%; height: 70px; background: #fee2e2; 
            border-radius: 15px; position: relative;
            border: 2px dashed #fca5a5; margin-top: auto;
        }

        .gumball {
            width: 36px; height: 36px; border-radius: 50%; position: absolute;
            z-index: 100; border: 2px solid rgba(0,0,0,0.1);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
            touch-action: none; cursor: grab;
        }

        .hint { font-size: 0.7rem; color: #991b1b; margin-top: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="game-card" id="gameArea">
    <div class="title" id="status">Put 5 Gumballs in!</div>
    
    <div id="globe"></div>
    <div class="base"></div>

    <div id="tray"></div>
    <div class="hint">Drag gumballs up to the machine</div>
</div>

<script>
    const globe = document.getElementById('globe');
    const tray = document.getElementById('tray');
    const status = document.getElementById('status');
    const gameArea = document.getElementById('gameArea');
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];
    let count = 0;

    function init() {
        count = 0;
        globe.innerHTML = '';
        tray.innerHTML = '';
        status.innerText = "Put 5 Gumballs in!";
        
        // Dynamic spacing based on the actual tray width on the phone
        const trayWidth = tray.clientWidth;
        const ballSpacing = (trayWidth - 40) / 5;

        for(let i = 0; i < 6; i++) {
            const ball = document.createElement('div');
            ball.className = 'gumball';
            ball.style.background = colors[i];
            ball.style.left = (5 + (i * ballSpacing)) + 'px';
            ball.style.top = '15px';
            
            ball.addEventListener('pointerdown', startDrag);
            tray.appendChild(ball);
        }
    }

    function startDrag(e) {
        const ball = e.target;
        ball.setPointerCapture(e.pointerId);
        ball.style.zIndex = 1000;

        const areaRect = gameArea.getBoundingClientRect();

        function onMove(ev) {
            // Center the ball on the finger/mouse
            const x = ev.clientX - areaRect.left - 18;
            const y = ev.clientY - areaRect.top - 18;
            
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
            
            // Append to main area while dragging to avoid tray clipping
            if (ball.parentElement !== gameArea) gameArea.appendChild(ball);
        }

        function onUp(ev) {
            ball.removeEventListener('pointermove', onMove);
            ball.removeEventListener('pointerup', onUp);

            const gRect = globe.getBoundingClientRect();
            
            // Did we drop it in the globe?
            if (ev.clientX > gRect.left && ev.clientX < gRect.right && 
                ev.clientY > gRect.top && ev.clientY < gRect.bottom) {
                
                count++;
                globe.appendChild(ball);
                ball.style.position = 'absolute';
                
                // Position relative to globe size (Physics simulation)
                const gW = globe.clientWidth;
                const gH = globe.clientHeight;
                ball.style.left = (15 + Math.random() * (gW - 45)) + 'px';
                ball.style.top = (gH - 40 - (Math.floor((count-1)/2) * 25)) + 'px';
                
                ball.removeEventListener('pointerdown', startDrag);
                ball.style.zIndex = 10;

                if(count === 5) {
                    status.innerText = "YAY! YOU DID IT!";
                    setTimeout(init, 3000);
                }
            } else {
                // If dropped outside, reset this round
                init();
            }
        }

        ball.addEventListener('pointermove', onMove);
        ball.addEventListener('pointerup', onUp);
    }

    // Initialize after layout is solid
    window.addEventListener('load', init);
    window.addEventListener('resize', init);
</script>

</body>
</html>
