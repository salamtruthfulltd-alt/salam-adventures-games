<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gumball Count</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { 
            --machine-red: #ef4444; 
            --machine-dark: #b91c1c;
        }

        * {
            box-sizing: border-box;
            touch-action: none; /* Stops the phone screen from bouncing */
            user-select: none;
        }

        body { 
            margin: 0; 
            padding: 10px;
            background: #fef2f2; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100dvh; /* Dynamic viewport height for mobile browsers */
            font-family: 'Fredoka One', cursive;
            overflow: hidden;
        }

        .game-card { 
            width: 100%;
            max-width: 320px;
            max-height: 95vh;
            background: #fff; 
            padding: 15px; 
            border-radius: 30px; 
            border: 5px solid var(--machine-red);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 8px 0 var(--machine-dark);
        }

        .target-text { 
            color: var(--machine-red); 
            font-size: 1.2rem; 
            margin-bottom: 10px;
        }

        /* The Globe now scales based on the available width */
        #globe {
            width: 50vw;
            height: 50vw;
            max-width: 160px;
            max-height: 160px;
            background: rgba(226, 232, 240, 0.3); 
            border: 3px solid #e2e8f0;
            border-radius: 50%; 
            position: relative;
            overflow: hidden; 
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.05);
        }

        .base {
            width: 40%;
            height: 40px;
            background: var(--machine-red);
            margin: -10px auto 10px; 
            border-radius: 5px 5px 25px 25px;
            border-bottom: 5px solid var(--machine-dark);
            z-index: 2;
        }

        #tray { 
            width: 100%;
            height: 70px; 
            background: #fee2e2; 
            border-radius: 15px; 
            position: relative; 
            margin-top: auto;
            border: 2px dashed #fca5a5;
        }

        .gumball {
            width: 34px; 
            height: 34px; 
            border-radius: 50%; 
            position: absolute;
            cursor: grab; 
            z-index: 10; 
            border: 2px solid rgba(0,0,0,0.1);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .in-globe { pointer-events: none; transition: all 0.4s ease-out; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="target-text" id="msg">Put 5 Gumballs in!</div>
    
    <div id="globe"></div>
    <div class="base"></div>

    <div id="tray"></div>
    <div style="margin-top:8px; font-size:0.7rem; color:#991b1b;">DRAG UP TO FILL</div>
</div>

<script>
    const globe = document.getElementById('globe');
    const tray = document.getElementById('tray');
    const msg = document.getElementById('msg');
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];
    let count = 0;

    function init() {
        count = 0; 
        globe.innerHTML = ''; 
        tray.innerHTML = '';
        msg.innerText = "Put 5 Gumballs in!";
        
        // Calculate spacing based on tray width
        const trayWidth = tray.offsetWidth;
        const spacing = (trayWidth - 40) / 5;

        for(let i=0; i<6; i++) {
            const b = document.createElement('div');
            b.className = 'gumball';
            b.style.background = colors[i];
            b.style.left = (5 + (i * spacing)) + 'px';
            b.style.top = '15px';
            b.onpointerdown = startDrag;
            tray.appendChild(b);
        }
    }

    function startDrag(e) {
        const el = e.target;
        el.setPointerCapture(e.pointerId);
        
        const startX = e.clientX;
        const startY = e.clientY;
        const rect = el.getBoundingClientRect();
        const parentRect = el.parentElement.getBoundingClientRect();
        
        const origLeft = rect.left - parentRect.left;
        const origTop = rect.top - parentRect.top;

        const onMove = (me) => {
            const deltaX = me.clientX - startX;
            const deltaY = me.clientY - startY;
            el.style.left = (origLeft + deltaX) + 'px';
            el.style.top = (origTop + deltaY) + 'px';
        };

        const onUp = (ue) => {
            el.removeEventListener('pointermove', onMove);
            el.removeEventListener('pointerup', onUp);
            
            const gRect = globe.getBoundingClientRect();
            
            if (ue.clientX > gRect.left && ue.clientX < gRect.right && 
                ue.clientY > gRect.top && ue.clientY < gRect.bottom) {
                
                count++;
                el.classList.add('in-globe');
                globe.appendChild(el);
                
                // Position relative to globe size
                const gWidth = globe.offsetWidth;
                const gHeight = globe.offsetHeight;
                
                el.style.left = (Math.random() * (gWidth - 40)) + 'px';
                el.style.top = (gHeight - 45 - (Math.floor((count-1)/2) * 30)) + 'px';

                if(count === 5) {
                    msg.innerText = "GREAT JOB!";
                    setTimeout(init, 3000);
                }
            } else {
                // Return to original tray spot
                el.style.left = origLeft + 'px';
                el.style.top = '15px';
            }
        };
        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
    }

    // Run init after a short delay to ensure tray width is calculated
    window.onload = () => {
        init();
        window.addEventListener('resize', init);
    };
</script>
</body>
</html>
