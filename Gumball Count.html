<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Gumball</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ef4444; --dark: #b91c1c; }
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }

        body { 
            margin: 0; padding: 0; background: #fef2f2; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden; font-family: 'Fredoka One', cursive;
        }

        /* Compact Horizontal Layout for Phones */
        .game-scaler {
            width: 95vw;
            max-width: 400px;
            background: white;
            padding: 10px;
            border-radius: 20px;
            border: 3px solid var(--red);
            box-shadow: 0 4px 0 var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title { color: var(--red); font-size: 0.9rem; margin-bottom: 8px; }

        .game-main {
            display: flex;
            flex-direction: row; /* Side by side */
            align-items: center;
            justify-content: space-around;
            width: 100%;
            gap: 10px;
        }

        .machine-side { position: relative; width: 110px; }

        #globe {
            width: 100px; height: 100px; 
            background: rgba(226, 232, 240, 0.5); 
            border: 2px solid #cbd5e1; border-radius: 50%; 
            position: relative; overflow: hidden; z-index: 1;
        }

        .base {
            width: 70px; height: 25px; background: var(--red);
            margin: -8px auto 0; border-radius: 4px 4px 15px 15px;
            border-bottom: 3px solid var(--dark); z-index: 2;
        }

        /* Vertical Tray on the right to save space */
        #tray { 
            width: 80px; height: 120px; background: #fee2e2; 
            border-radius: 10px; position: relative;
            border: 2px dashed #fca5a5;
        }

        .gumball {
            width: 28px; height: 28px; border-radius: 50%; position: absolute;
            z-index: 100; border: 1px solid rgba(0,0,0,0.1);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
            cursor: grab;
        }

        .hint { font-size: 0.6rem; color: #991b1b; margin-top: 8px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="game-scaler" id="mainArea">
    <div class="title" id="status">Put 5 Gumballs in!</div>
    
    <div class="game-main">
        <div class="machine-side">
            <div id="globe"></div>
            <div class="base"></div>
        </div>

        <div id="tray"></div>
    </div>

    <div class="hint">DRAG GUMBALLS TO THE GLASS</div>
</div>

<script>
    const globe = document.getElementById('globe');
    const tray = document.getElementById('tray');
    const status = document.getElementById('status');
    const mainArea = document.getElementById('mainArea');
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];
    let count = 0;

    function init() {
        count = 0; globe.innerHTML = ''; tray.innerHTML = '';
        status.innerText = "Count to 5!";
        
        for(let i = 0; i < 6; i++) {
            const ball = document.createElement('div');
            ball.className = 'gumball';
            ball.style.background = colors[i];
            // Stack them vertically in the side-tray
            ball.style.left = '25px';
            ball.style.top = (5 + (i * 18)) + 'px';
            
            ball.addEventListener('pointerdown', startDrag);
            tray.appendChild(ball);
        }
    }

    function startDrag(e) {
        const ball = e.target;
        ball.setPointerCapture(e.pointerId);
        const areaRect = mainArea.getBoundingClientRect();

        function onMove(ev) {
            const x = ev.clientX - areaRect.left - 14;
            const y = ev.clientY - areaRect.top - 14;
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
            if (ball.parentElement !== mainArea) mainArea.appendChild(ball);
        }

        function onUp(ev) {
            ball.removeEventListener('pointermove', onMove);
            ball.removeEventListener('pointerup', onUp);
            const gRect = globe.getBoundingClientRect();
            
            if (ev.clientX > gRect.left && ev.clientX < gRect.right && 
                ev.clientY > gRect.top && ev.clientY < gRect.bottom) {
                
                count++;
                globe.appendChild(ball);
                ball.style.position = 'absolute';
                ball.style.left = (5 + Math.random() * 65) + 'px';
                ball.style.top = (70 - (Math.floor((count-1)/2) * 20)) + 'px';
                ball.removeEventListener('pointerdown', startDrag);

                if(count === 5) {
                    status.innerText = "GREAT JOB!";
                    setTimeout(init, 2000);
                }
            } else {
                init();
            }
        }
        ball.addEventListener('pointermove', onMove);
        ball.addEventListener('pointerup', onUp);
    }

    window.onload = init;
</script>

</body>
</html>
