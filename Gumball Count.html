<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gumball Fun</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ef4444; --dark: #b91c1c; }
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
        body { 
            margin: 0; padding: 0; background: #fef2f2; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden; font-family: 'Fredoka One', cursive;
        }
        #boot-screen {
            position: fixed; inset: 0; background: var(--red);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; cursor: pointer;
        }
        .game-box {
            width: 280px; background: white; padding: 15px; 
            border-radius: 30px; border: 5px solid var(--red);
            box-shadow: 0 8px 0 var(--dark); display: flex; 
            flex-direction: column; align-items: center; position: relative;
        }
        .status-text { color: var(--red); font-size: 1.1rem; margin-bottom: 10px; height: 1.5rem; }
        #globe {
            width: 140px; height: 140px; background: rgba(226, 232, 240, 0.4); 
            border: 3px solid #cbd5e1; border-radius: 50%; 
            position: relative; overflow: hidden;
        }
        .machine-base {
            width: 90px; height: 35px; background: var(--red);
            margin: -15px 0 10px 0; border-radius: 5px 5px 25px 25px;
            border-bottom: 5px solid var(--dark); z-index: 5;
        }
        #tray { 
            width: 100%; height: 60px; background: #fee2e2; 
            border-radius: 15px; position: relative; border: 2px dashed #fca5a5;
        }
        .gumball {
            width: 36px; height: 36px; border-radius: 50%; position: absolute;
            z-index: 100; border: 2px solid rgba(0,0,0,0.1);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
            cursor: grab;
        }
        .btn-start {
            padding: 15px 40px; font-size: 1.5rem; font-family: 'Fredoka One';
            background: white; color: var(--red); border: none; border-radius: 50px;
            box-shadow: 0 5px 0 var(--dark);
        }
    </style>
</head>
<body>

<div id="boot-screen" onclick="launch()">
    <button class="btn-start">START GAME</button>
</div>

<div class="game-box" id="gameArea">
    <div class="status-text" id="statusMsg">Put 5 Gumballs in!</div>
    <div id="globe"></div>
    <div class="machine-base"></div>
    <div id="tray"></div>
</div>

<script>
    let audio, count = 0;
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];
    const globe = document.getElementById('globe');
    const tray = document.getElementById('tray');
    const statusMsg = document.getElementById('statusMsg');
    const gameArea = document.getElementById('gameArea');

    function launch() {
        audio = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('boot-screen').style.display = 'none';
        initRound();
    }

    function playPop(freq) {
        if (!audio) return;
        if (audio.state === 'suspended') audio.resume();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.frequency.setValueAtTime(freq, audio.currentTime);
        osc.frequency.exponentialRampToValueAtTime(20, audio.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audio.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.1);
        osc.connect(gain); gain.connect(audio.destination);
        osc.start(); osc.stop(audio.currentTime + 0.1);
    }

    function initRound() {
        count = 0; globe.innerHTML = ''; tray.innerHTML = '';
        statusMsg.innerText = "Count to 5!";
        for(let i = 0; i < 6; i++) {
            const ball = document.createElement('div');
            ball.className = 'gumball';
            ball.style.background = colors[i];
            ball.style.left = (8 + (i * 44)) + 'px';
            ball.style.top = '10px';
            ball.addEventListener('pointerdown', handleGrab);
            tray.appendChild(ball);
        }
    }

    function handleGrab(e) {
        if (audio && audio.state === 'suspended') audio.resume();
        const ball = e.target;
        ball.setPointerCapture(e.pointerId);
        ball.style.zIndex = "1000";
        
        const areaRect = gameArea.getBoundingClientRect();

        const move = (ev) => {
            const x = ev.clientX - areaRect.left - 18;
            const y = ev.clientY - areaRect.top - 18;
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
            if (ball.parentElement !== gameArea) gameArea.appendChild(ball);
        };

        const release = (ev) => {
            ball.removeEventListener('pointermove', move);
            ball.removeEventListener('pointerup', release);
            
            // MATH FIX: Get center of the gumball and center of the globe
            const globeRect = globe.getBoundingClientRect();
            const globeCenterX = globeRect.left + (globeRect.width / 2);
            const globeCenterY = globeRect.top + (globeRect.height / 2);
            
            const ballCenterX = ev.clientX;
            const ballCenterY = ev.clientY;

            // Distance calculation
            const dist = Math.hypot(ballCenterX - globeCenterX, ballCenterY - globeCenterY);

            // If center of ball is within 70px of center of globe, it counts!
            if (dist < 75) {
                count++;
                globe.appendChild(ball);
                ball.removeEventListener('pointerdown', handleGrab);
                ball.style.zIndex = "10";
                
                // Stack neatly
                ball.style.left = (15 + Math.random() * 70) + 'px';
                ball.style.top = (95 - (Math.floor((count-1)/2) * 22)) + 'px';
                
                playPop(300 + (count * 100));

                if(count === 5) {
                    statusMsg.innerText = "5 GUMBALLS! YAY!";
                    setTimeout(() => playPop(800), 200);
                    setTimeout(initRound, 3000);
                }
            } else {
                initRound(); // Snap back
            }
        };

        ball.addEventListener('pointermove', move);
        ball.addEventListener('pointerup', release);
    }
</script>
</body>
</html>
