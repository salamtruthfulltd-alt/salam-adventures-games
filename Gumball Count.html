<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gumball Count</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ef4444; --dark: #b91c1c; }
        
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }

        body { 
            margin: 0; padding: 0; background: #fef2f2; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: 100dvh; overflow: hidden; font-family: 'Fredoka One', cursive;
        }

        /* The Box that keeps everything small enough for a phone */
        .game-scaler {
            width: 95vw;
            max-width: 300px; /* Narrower for modern phones */
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 12px;
            border-radius: 25px;
            border: 4px solid var(--red);
            box-shadow: 0 5px 0 var(--dark);
        }

        .title { color: var(--red); font-size: 1rem; margin-bottom: 5px; }

        /* Smaller Globe to save vertical space */
        #globe {
            width: 130px; height: 130px; 
            background: rgba(226, 232, 240, 0.5); 
            border: 3px solid #cbd5e1; border-radius: 50%; 
            position: relative; overflow: hidden; z-index: 1;
        }

        .base {
            width: 80px; height: 35px; background: var(--red);
            margin: -10px 0 5px 0; border-radius: 5px 5px 20px 20px;
            border-bottom: 4px solid var(--dark); z-index: 2;
        }

        #tray { 
            width: 100%; height: 60px; background: #fee2e2; 
            border-radius: 12px; position: relative;
            border: 2px dashed #fca5a5;
        }

        .gumball {
            width: 30px; height: 30px; border-radius: 50%; position: absolute;
            z-index: 100; border: 1.5px solid rgba(0,0,0,0.1);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
            cursor: grab;
        }

        .hint { font-size: 0.6rem; color: #991b1b; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="game-scaler" id="mainArea">
    <div class="title" id="status">Put 5 Gumballs in!</div>
    
    <div id="globe"></div>
    <div class="base"></div>

    <div id="tray"></div>
    <div class="hint">DRAG TO THE GLASS</div>
</div>

<script>
    const globe = document.getElementById('globe');
    const tray = document.getElementById('tray');
    const status = document.getElementById('status');
    const mainArea = document.getElementById('mainArea');
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];
    let count = 0;

    function init() {
        count = 0;
        globe.innerHTML = '';
        tray.innerHTML = '';
        status.innerText = "Put 5 Gumballs in!";
        
        // Calculate tray width for gumball placement
        const trayWidth = tray.clientWidth || 280;
        const ballSpace = (trayWidth - 30) / 5;

        for(let i = 0; i < 6; i++) {
            const ball = document.createElement('div');
            ball.className = 'gumball';
            ball.style.background = colors[i];
            ball.style.left = (5 + (i * ballSpace)) + 'px';
            ball.style.top = '12px';
            
            ball.addEventListener('pointerdown', startDrag);
            tray.appendChild(ball);
        }
    }

    function startDrag(e) {
        const ball = e.target;
        ball.setPointerCapture(e.pointerId);
        
        // Get the area bounds so gumballs stay inside the "box" logic
        const areaRect = mainArea.getBoundingClientRect();

        function onMove(ev) {
            // Center gumball on touch point
            const x = ev.clientX - areaRect.left - 15;
            const y = ev.clientY - areaRect.top - 15;
            
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
            
            // Move ball out of tray so it can go "over" the machine
            if (ball.parentElement !== mainArea) mainArea.appendChild(ball);
        }

        function onUp(ev) {
            ball.removeEventListener('pointermove', onMove);
            ball.removeEventListener('pointerup', onUp);

            const gRect = globe.getBoundingClientRect();
            
            // Check if dropped in glass globe
            if (ev.clientX > gRect.left && ev.clientX < gRect.right && 
                ev.clientY > gRect.top && ev.clientY < gRect.bottom) {
                
                count++;
                globe.appendChild(ball);
                ball.style.position = 'absolute';
                
                // Stack gumballs at the bottom of the globe
                ball.style.left = (10 + Math.random() * 80) + 'px';
                ball.style.top = (95 - (Math.floor((count-1)/2) * 22)) + 'px';
                ball.removeEventListener('pointerdown', startDrag);

                if(count === 5) {
                    status.innerText = "GREAT JOB!";
                    setTimeout(init, 2500);
                }
            } else {
                // If you miss, reset the gumballs back to the tray
                init();
            }
        }

        ball.addEventListener('pointermove', onMove);
        ball.addEventListener('pointerup', onUp);
    }

    // Initial setup
    window.onload = init;
    window.onresize = init;
</script>

</body>
</html>
