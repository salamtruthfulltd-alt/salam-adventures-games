<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gumball Fun 1-5</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ef4444; --dark: #b91c1c; }
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        body { 
            margin: 0; padding: 0; background: #fef2f2; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; width: 100vw; overflow: hidden; font-family: 'Fredoka One', cursive;
        }

        #start-overlay {
            position: fixed; inset: 0; background: var(--red);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white;
        }

        .game-card {
            width: 90vw; max-width: 320px; 
            background: white; padding: 20px; 
            border-radius: 35px; border: 6px solid var(--red);
            box-shadow: 0 8px 0 var(--dark); display: flex; 
            flex-direction: column; align-items: center; position: relative;
        }

        .status-msg { color: var(--red); font-size: 1.2rem; margin-bottom: 10px; }

        #globe {
            width: 130px; height: 130px; 
            background: rgba(226, 232, 240, 0.4); 
            border: 3px solid #cbd5e1; border-radius: 50%; 
            position: relative; overflow: hidden;
        }

        .base {
            width: 90px; height: 30px; background: var(--red);
            margin: -10px 0 15px 0; border-radius: 5px 5px 20px 20px;
            border-bottom: 5px solid var(--dark); z-index: 5;
        }

        .tray-area { 
            width: 100%; height: 75px; background: #fee2e2; 
            border-radius: 20px; border: 2px dashed #fca5a5;
            position: relative; margin-top: 10px;
        }

        .gumball {
            width: 34px; height: 34px; border-radius: 50%; position: absolute;
            z-index: 100; border: 2px solid rgba(0,0,0,0.1);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
            cursor: grab;
        }

        .btn-start {
            padding: 15px 40px; font-size: 1.5rem; font-family: 'Fredoka One';
            background: white; color: var(--red); border: none; border-radius: 50px;
            box-shadow: 0 5px 0 var(--dark); cursor: pointer;
        }
    </style>
</head>
<body>

<div id="start-overlay" onclick="boot()">
    <button class="btn-start">START GAME</button>
</div>

<div class="game-card" id="stage">
    <div class="status-msg" id="msg">Count to 5!</div>
    <div id="globe"></div>
    <div class="base"></div>
    <div class="tray-area" id="trayRef"></div>
</div>

<script>
    let audio, count = 0;
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];
    const stage = document.getElementById('stage');
    const globe = document.getElementById('globe');
    const msg = document.getElementById('msg');
    const trayRef = document.getElementById('trayRef');

    function boot() {
        audio = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('start-overlay').style.display = 'none';
        reset();
    }

    function playPop(f) {
        if (!audio) return;
        if (audio.state === 'suspended') audio.resume();
        const o = audio.createOscillator(), g = audio.createGain();
        o.frequency.setValueAtTime(f, audio.currentTime);
        o.frequency.exponentialRampToValueAtTime(20, audio.currentTime + 0.1);
        g.gain.setValueAtTime(0.1, audio.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.1);
        o.connect(g); g.connect(audio.destination);
        o.start(); o.stop(audio.currentTime + 0.1);
    }

    function reset() {
        count = 0;
        document.querySelectorAll('.gumball').forEach(b => b.remove());
        msg.innerText = "Count to 5!";
        
        const trayRect = trayRef.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();
        
        // Calculate internal tray positions relative to the stage
        const startX = trayRef.offsetLeft + 10;
        const startY = trayRef.offsetTop + 18;
        const spacing = (trayRef.clientWidth - 55) / 5; 

        for(let i = 0; i < 6; i++) {
            const b = document.createElement('div');
            b.className = 'gumball';
            b.style.background = colors[i];
            
            // Fixed: They are placed based on the tray's coordinates
            b.style.left = (startX + (i * spacing)) + 'px';
            b.style.top = startY + 'px'; 
            b.onpointerdown = pickup;
            stage.appendChild(b);
        }
    }

    function pickup(e) {
        if (audio.state === 'suspended') audio.resume();
        const b = e.target;
        b.setPointerCapture(e.pointerId);
        b.style.zIndex = "1000";

        const stageRect = stage.getBoundingClientRect();
        const globeRect = globe.getBoundingClientRect();
        const gx = globeRect.left + (globeRect.width / 2);
        const gy = globeRect.top + (globeRect.height / 2);

        const moving = (ev) => {
            const x = ev.clientX - stageRect.left - 17;
            const y = ev.clientY - stageRect.top - 17;
            b.style.left = x + 'px';
            b.style.top = y + 'px';
        };

        const dropping = (ev) => {
            b.removeEventListener('pointermove', moving);
            b.removeEventListener('pointerup', dropping);
            
            const dist = Math.hypot(ev.clientX - gx, ev.clientY - gy);

            if (dist < 75) {
                count++;
                b.onpointerdown = null;
                b.style.zIndex = "10";
                
                const finalX = (globeRect.left - stageRect.left) + 20 + (Math.random() * 50);
                const finalY = (globeRect.top - stageRect.top) + 65 - (Math.floor((count-1)/2) * 20);
                
                b.style.left = finalX + 'px';
                b.style.top = finalY + 'px';
                
                playPop(300 + (count * 100));
                
                if(count === 5) {
                    msg.innerText = "GREAT JOB!";
                    setTimeout(() => playPop(800), 200);
                    setTimeout(reset, 3000);
                }
            } else {
                reset(); 
            }
        };

        b.addEventListener('pointermove', moving);
        b.addEventListener('pointerup', dropping);
    }
</script>
</body>
</html>
