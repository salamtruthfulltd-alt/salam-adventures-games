<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gumball Tiny</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ef4444; --dark: #b91c1c; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        
        body { 
            margin: 0; padding: 0; background: #fef2f2; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden; font-family: 'Fredoka One', cursive;
        }

        #start {
            position: fixed; inset: 0; background: var(--red);
            display: flex; justify-content: center; align-items: center;
            z-index: 999; color: white;
        }

        .card {
            width: 210px; height: 240px; background: white; 
            padding: 5px; border-radius: 20px; border: 4px solid var(--red);
            box-shadow: 0 4px 0 var(--dark); display: flex; 
            flex-direction: column; align-items: center; position: relative;
        }

        .msg { color: var(--red); font-size: 0.7rem; margin-top: 2px; }

        #globe {
            width: 70px; height: 70px; background: rgba(226, 232, 240, 0.5); 
            border: 2px solid #cbd5e1; border-radius: 50%; 
            margin-top: 5px; position: relative; overflow: hidden;
        }

        .base {
            width: 45px; height: 15px; background: var(--red);
            margin: -5px 0 5px 0; border-radius: 3px 3px 10px 10px;
            border-bottom: 3px solid var(--dark); z-index: 5;
        }

        #tray { 
            width: 100%; height: 30px; background: #fee2e2; 
            border-radius: 8px; border: 1.5px dashed #fca5a5;
            margin-top: auto; margin-bottom: 5px;
        }

        .ball {
            width: 18px; height: 18px; border-radius: 50%; position: absolute;
            z-index: 100; border: 1px solid rgba(0,0,0,0.1);
            box-shadow: inset -1px -1px 2px rgba(0,0,0,0.2);
            cursor: grab;
        }

        button {
            padding: 10px 25px; font-size: 1.2rem; font-family: 'Fredoka One';
            background: white; color: var(--red); border: none; border-radius: 50px;
            box-shadow: 0 4px 0 var(--dark);
        }
    </style>
</head>
<body>

<div id="start" onclick="init()">
    <button>PLAY</button>
</div>

<div class="card" id="stage">
    <div class="msg" id="msg">Count to 5!</div>
    <div id="globe"></div>
    <div class="base"></div>
    <div id="tray"></div>
</div>

<script>
    let audio, count = 0;
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];
    const stage = document.getElementById('stage');
    const globe = document.getElementById('globe');
    const msg = document.getElementById('msg');
    const tray = document.getElementById('tray');

    function init() {
        audio = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('start').style.display = 'none';
        reset();
    }

    function pop() {
        if (!audio) return;
        if (audio.state === 'suspended') audio.resume();
        const o = audio.createOscillator(), g = audio.createGain();
        o.connect(g); g.connect(audio.destination);
        o.frequency.setValueAtTime(440 + (count * 40), audio.currentTime);
        g.gain.setValueAtTime(0.05, audio.currentTime);
        o.start();
        g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.1);
        o.stop(audio.currentTime + 0.1);
    }

    function reset() {
        count = 0;
        document.querySelectorAll('.ball').forEach(b => b.remove());
        msg.innerText = "Count to 5!";
        
        // Exact pixel locking for the balls
        const tx = tray.offsetLeft + 5;
        const ty = tray.offsetTop + 6;
        const spacing = 28; 

        colors.forEach((c, i) => {
            const b = document.createElement('div');
            b.className = 'ball';
            b.style.background = c;
            b.style.left = (tx + (i * spacing)) + 'px';
            b.style.top = ty + 'px';
            b.onpointerdown = grab;
            stage.appendChild(b);
        });
    }

    function grab(e) {
        if (audio && audio.state === 'suspended') audio.resume();
        const b = e.target;
        b.setPointerCapture(e.pointerId);
        b.style.zIndex = "1000";

        const sr = stage.getBoundingClientRect();
        const gr = globe.getBoundingClientRect();
        const gx = gr.left + (gr.width / 2);
        const gy = gr.top + (gr.height / 2);

        const move = (ev) => {
            b.style.left = (ev.clientX - sr.left - 9) + 'px';
            b.style.top = (ev.clientY - sr.top - 9) + 'px';
        };

        const drop = (ev) => {
            b.removeEventListener('pointermove', move);
            b.removeEventListener('pointerup', drop);
            
            const d = Math.hypot(ev.clientX - gx, ev.clientY - gy);

            if (d < 35) {
                count++;
                b.onpointerdown = null;
                b.style.zIndex = "10";
                
                // Absolute placement inside globe bounds
                const finalX = (gr.left - sr.left) + 15 + (Math.random() * 25);
                const finalY = (gr.top - sr.top) + 25 - (Math.floor((count-1)/2) * 10);
                
                b.style.left = finalX + 'px';
                b.style.top = finalY + 'px';
                
                pop();
                if(count === 5) {
                    msg.innerText = "GREAT JOB!";
                    setTimeout(reset, 3000);
                }
            } else {
                reset(); 
            }
        };

        b.addEventListener('pointermove', move);
        b.addEventListener('pointerup', drop);
    }
</script>
</body>
</html>
