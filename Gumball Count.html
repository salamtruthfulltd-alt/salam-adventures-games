<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gumball Count Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ef4444; --dark: #b91c1c; }
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        body { 
            margin: 0; padding: 0; background: #fef2f2; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden; font-family: 'Fredoka One', cursive;
        }

        #start-overlay {
            position: fixed; inset: 0; background: var(--red);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; cursor: pointer;
        }

        .game-box {
            width: 300px; height: 420px; background: white; 
            padding: 15px; border-radius: 30px; border: 5px solid var(--red);
            box-shadow: 0 8px 0 var(--dark); display: flex; 
            flex-direction: column; align-items: center; position: relative;
        }

        .status-text { color: var(--red); font-size: 1.2rem; margin-bottom: 10px; height: 1.5rem; }

        #globe-target {
            width: 150px; height: 150px; background: rgba(226, 232, 240, 0.4); 
            border: 3px solid #cbd5e1; border-radius: 50%; 
            position: relative; overflow: hidden;
        }

        .machine-base {
            width: 100px; height: 40px; background: var(--red);
            margin: -15px 0 20px 0; border-radius: 5px 5px 25px 25px;
            border-bottom: 5px solid var(--dark); z-index: 5;
        }

        .tray-bg { 
            width: 100%; height: 70px; background: #fee2e2; 
            border-radius: 15px; border: 2px dashed #fca5a5;
        }

        .gumball {
            width: 38px; height: 38px; border-radius: 50%; position: absolute;
            z-index: 100; border: 2px solid rgba(0,0,0,0.1);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
            cursor: grab; transition: transform 0.1s;
        }
        
        .in-machine { pointer-events: none; z-index: 10; }

        .btn-start {
            padding: 15px 40px; font-size: 1.5rem; font-family: 'Fredoka One';
            background: white; color: var(--red); border: none; border-radius: 50px;
            box-shadow: 0 5px 0 var(--dark);
        }
    </style>
</head>
<body>

<div id="start-overlay" onclick="launchGame()">
    <button class="btn-start">START GAME</button>
</div>

<div class="game-box" id="mainStage">
    <div class="status-text" id="status">Put 5 Gumballs in!</div>
    
    <div id="globe-target"></div>
    <div class="machine-base"></div>

    <div class="tray-bg"></div>
</div>

<script>
    let audioCtx, count = 0;
    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#4ade80', '#c084fc', '#f472b6'];
    const stage = document.getElementById('mainStage');
    const globe = document.getElementById('globe-target');
    const status = document.getElementById('status');

    function launchGame() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('start-overlay').style.display = 'none';
        spawnBalls();
    }

    function playPop(freq) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function spawnBalls() {
        count = 0;
        // Clear only gumballs, keep the machine
        document.querySelectorAll('.gumball').forEach(b => b.remove());
        status.innerText = "Count to 5!";
        
        for(let i = 0; i < 6; i++) {
            const ball = document.createElement('div');
            ball.className = 'gumball';
            ball.style.background = colors[i];
            // Initial position in tray area
            ball.style.left = (20 + (i * 45)) + 'px';
            ball.style.top = '335px'; 
            
            ball.addEventListener('pointerdown', startDragging);
            stage.appendChild(ball);
        }
    }

    function startDragging(e) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const ball = e.target;
        ball.setPointerCapture(e.pointerId);
        ball.style.transform = "scale(1.2)";
        ball.style.zIndex = "1000";

        const stageRect = stage.getBoundingClientRect();

        const onMove = (ev) => {
            // Keep ball centered under finger
            const x = ev.clientX - stageRect.left - 19;
            const y = ev.clientY - stageRect.top - 19;
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
        };

        const onUp = (ev) => {
            ball.removeEventListener('pointermove', onMove);
            ball.removeEventListener('pointerup', onUp);
            ball.style.transform = "scale(1.0)";
            
            const globeRect = globe.getBoundingClientRect();
            
            // Check if the drop point (finger release) is inside the globe
            const isInside = (
                ev.clientX > globeRect.left && 
                ev.clientX < globeRect.right && 
                ev.clientY > globeRect.top && 
                ev.clientY < globeRect.bottom
            );

            if (isInside) {
                count++;
                ball.classList.add('in-machine');
                ball.removeEventListener('pointerdown', startDragging);
                
                // Final position inside the globe (relative to Stage)
                const relativeLeft = (globeRect.left - stageRect.left) + 20 + (Math.random() * 70);
                const relativeTop = (globeRect.top - stageRect.top) + 80 - (Math.floor((count-1)/2) * 25);
                
                ball.style.left = relativeLeft + 'px';
                ball.style.top = relativeTop + 'px';
                ball.style.zIndex = "10";
                
                playPop(300 + (count * 100));

                if(count === 5) {
                    status.innerText = "YAY! 5 GUMBALLS!";
                    setTimeout(() => playPop(800), 200);
                    setTimeout(spawnBalls, 3000);
                }
            } else {
                // Snap back to tray if missed
                spawnBalls();
            }
        };

        ball.addEventListener('pointermove', onMove);
        ball.addEventListener('pointerup', onUp);
    }
</script>
</body>
</html>
