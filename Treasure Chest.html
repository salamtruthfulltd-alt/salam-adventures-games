<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasure Chest: Level Up Counting</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #fbbf24; --ocean: #0ea5e9; --wood: #78350f; }
        body { margin: 0; background: #0c4a6e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Fredoka One', cursive; }

        .game-box { 
            width: 100%; max-width: 340px; background: #f1f5f9; padding: 20px; 
            border-radius: 35px; border: 6px solid var(--wood); text-align: center;
            box-shadow: 0 15px 0 #451a03; position: relative;
        }

        .level-btns { display: flex; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .lvl { 
            padding: 5px 10px; border: none; border-radius: 10px; cursor: pointer; 
            font-family: 'Fredoka One'; color: white; font-size: 0.7rem;
        }
        .btn-e { background: #22c55e; } .btn-m { background: #f59e0b; } .btn-h { background: #ef4444; }

        /* The Treasure Chest (Drop Zone) */
        #chest {
            width: 140px; height: 100px; background: var(--wood); margin: 0 auto 20px;
            border-radius: 10px 10px 40px 40px; border: 4px solid #451a03;
            position: relative; overflow: hidden; box-shadow: inset 0 10px 20px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; font-size: 40px;
        }

        .coin {
            width: 45px; height: 45px; background: var(--gold); border-radius: 50%;
            position: absolute; cursor: grab; border: 3px solid #b45309;
            display: flex; align-items: center; justify-content: center; font-size: 20px; color: #b45309;
            box-shadow: 0 4px 0 #b45309; z-index: 10;
        }
        .coin:active { cursor: grabbing; transform: scale(1.1); }
        .in-chest { pointer-events: none; opacity: 0.8; transform: scale(0.6) !important; }

        #sea { height: 160px; background: var(--ocean); border-radius: 20px; position: relative; overflow: hidden; border: 3px solid #0369a1; }
        .status { margin-top: 15px; font-size: 1rem; color: var(--wood); }
    </style>
</head>
<body>

<div class="game-box">
    <div class="level-btns">
        <button class="lvl btn-e" onclick="setLvl('easy')">EASY (1-5)</button>
        <button class="lvl btn-m" onclick="setLvl('med')">MED (1-10)</button>
        <button class="lvl btn-h" onclick="setLvl('hard')">HARD (1-20)</button>
    </div>

    <div style="color:var(--ocean); font-size:1.2rem; margin-bottom:10px;">Drag <span id="target-qty">0</span> Coins!</div>
    
    <div id="chest">📦</div>

    <div id="sea"></div>

    <div class="status">COUNT: <span id="cur-qty" style="color:#b45309">0</span></div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    let mode = 'easy', target = 0, count = 0, coins = [];

    function playSound(f, d=0.2) {
        if (audio.state === 'suspended') audio.resume();
        const o=audio.createOscillator(), g=audio.createGain();
        o.type='sine'; o.frequency.value=f; g.gain.value=0.1;
        o.connect(g); g.connect(audio.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime+d);
        o.stop(audio.currentTime+d);
    }

    function setLvl(l) { mode = l; init(); }

    function init() {
        count = 0; coins = [];
        const sea = document.getElementById('sea');
        const chest = document.getElementById('chest');
        sea.innerHTML = ''; chest.innerHTML = '📦';
        document.getElementById('cur-qty').innerText = count;

        if(mode === 'easy') target = Math.floor(Math.random()*4)+2;
        else if(mode === 'med') target = Math.floor(Math.random()*6)+5;
        else target = Math.floor(Math.random()*10)+10;

        document.getElementById('target-qty').innerText = target;

        for(let i=0; i < (target + 2); i++) {
            const c = document.createElement('div');
            c.className = 'coin'; c.innerText = '$';
            c.style.left = Math.random() * 240 + 'px';
            c.style.top = Math.random() * 100 + 'px';
            c.onpointerdown = startDrag;
            sea.appendChild(c);
            
            if(mode !== 'easy') animateCoin(c);
        }
    }

    function animateCoin(el) {
        let speed = mode === 'hard' ? 2 : 0.5;
        let x = parseFloat(el.style.left);
        let dir = Math.random() > 0.5 ? 1 : -1;
        
        function move() {
            if(el.parentElement.id !== 'sea') return;
            x += speed * dir;
            if(x > 260 || x < 0) dir *= -1;
            el.style.left = x + 'px';
            requestAnimationFrame(move);
        }
        move();
    }

    function startDrag(e) {
        const el = e.target; el.setPointerCapture(e.pointerId);
        const sX = e.clientX, sY = e.clientY, oX = el.offsetLeft, oY = el.offsetTop;

        const onMove = (me) => {
            el.style.left = (oX + (me.clientX - sX)) + 'px';
            el.style.top = (oY + (me.clientY - sY)) + 'px';
        };

        const onUp = (ue) => {
            el.removeEventListener('pointermove', onMove);
            el.removeEventListener('pointerup', onUp);
            const r = document.getElementById('chest').getBoundingClientRect();
            if (ue.clientX > r.left && ue.clientX < r.right && ue.clientY > r.top && ue.clientY < r.bottom) {
                dropCoin(el);
            } else {
                el.style.top = '10px';
            }
        };
        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
    }

    function dropCoin(el) {
        count++;
        document.getElementById('cur-qty').innerText = count;
        el.classList.add('in-chest');
        document.getElementById('chest').appendChild(el);
        el.style.left = '40px'; el.style.top = '20px';
        
        playSound(400 + (count * 50));

        if(count === target) {
            document.getElementById('chest').innerText = '💰';
            playSound(800, 0.5);
            setTimeout(init, 2500);
        }
    }
    init();
</script>
</body>
</html>
