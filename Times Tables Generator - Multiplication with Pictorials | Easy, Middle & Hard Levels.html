<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salam Adventures | Times Tables Generator - Multiplication with Pictorials | Easy, Middle & Hard Levels</title>
    <meta name="description" content="Free printable times tables worksheets with pictorial representations. Learn multiplication with arrays, groups, and visual counting. 3 difficulty levels for K-5 math, homeschool, and classroom use.">
    <meta name="keywords" content="times tables, multiplication worksheets, multiplication with pictures, arrays multiplication, groups of multiplication, Salam Adventures, homeschool math, K-5 math, printable multiplication, visual multiplication">
    <meta name="author" content="Salam Adventures">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Salam Adventures | Times Tables Generator - Multiplication with Pictorials">
    <meta property="og:description" content="Free printable times tables worksheets with pictorial representations. Learn multiplication with arrays, groups, and visual counting.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://salamtruthfulltd-alt.github.io/salam-adventures-games/Salam%20Adventures.png">
    <meta property="og:url" content="https://salamtruthfulltd-alt.github.io/salam-adventures-games/">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --easy: #22c55e;
            --middle: #f97316;
            --hard: #ef4444;
            --secondary: #8b5cf6;
        }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #f0f9f0 0%, #dcfce7 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .toolbar {
            max-width: 1200px;
            margin: 0 auto 25px auto;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            background: white;
            padding: 15px 28px;
            border-radius: 80px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid rgba(16,185,129,0.4);
        }

        .btn {
            padding: 10px 28px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-easy { background: var(--easy); color: white; }
        .btn-easy:hover { background: #16a34a; transform: translateY(-2px); }
        .btn-middle { background: var(--middle); color: white; }
        .btn-middle:hover { background: #ea580c; transform: translateY(-2px); }
        .btn-hard { background: var(--hard); color: white; }
        .btn-hard:hover { background: #dc2626; transform: translateY(-2px); }
        .btn-print { background: var(--secondary); color: white; }
        .btn-print:hover { background: #7c3aed; transform: translateY(-2px); }

        .status-pill {
            background: #f1f5f9;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-dark);
        }

        .level-badge {
            text-align: center;
            margin-bottom: 20px;
        }
        .level-tag {
            display: inline-block;
            padding: 8px 30px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }
        .level-easy { background: var(--easy); }
        .level-middle { background: var(--middle); }
        .level-hard { background: var(--hard); }

        .worksheet {
            background: white;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 15mm 18mm;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .logo-container {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #10b981, #059669);
            overflow: hidden;
        }

        .salam-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .logo-fallback {
            color: white;
            font-size: 38px;
            font-weight: bold;
        }

        .title h1 {
            color: var(--primary);
            font-size: 28px;
            margin: 0;
        }
        .title p {
            color: #475569;
            font-weight: 600;
            font-size: 13px;
            margin-top: 5px;
        }

        .student-info {
            background: #f8fafc;
            padding: 8px 18px;
            border-radius: 28px;
            font-size: 12px;
            text-align: right;
            line-height: 1.6;
        }

        .problems-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .problem-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .math-problem {
            flex: 1;
            min-width: 250px;
            background: #fefce8;
            border-radius: 20px;
            padding: 18px;
            border: 1px solid #fde68a;
            page-break-inside: avoid;
        }

        .problem-number {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .problem-text {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            margin: 12px 0;
        }

        .pictorial-container {
            margin: 15px 0;
            padding: 12px;
            background: #f8fafc;
            border-radius: 16px;
            text-align: center;
        }

        .array-grid {
            display: inline-flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-width: 100%;
        }

        .array-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 4px 0;
        }

        .array-icon {
            font-size: 28px;
            display: inline-block;
        }

        .groups-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .group-box {
            text-align: center;
            border: 2px solid #fde68a;
            border-radius: 16px;
            padding: 10px;
            background: white;
            min-width: 80px;
        }

        .group-icons {
            font-size: 28px;
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .instruction {
            font-size: 11px;
            color: #64748b;
            text-align: center;
            margin: 8px 0;
        }

        .answer-line {
            border-bottom: 2px dashed #94a3b8;
            margin: 12px 0 5px;
            height: 30px;
            width: 100%;
        }

        .section {
            margin: 25px 0 20px;
        }

        .section-title {
            background: #ecfdf5;
            padding: 6px 16px;
            border-left: 7px solid var(--primary);
            font-weight: 800;
            font-size: 16px;
            color: var(--primary-dark);
            margin-bottom: 15px;
            border-radius: 0 30px 30px 0;
            display: inline-block;
        }

        @media print {
            .toolbar { display: none; }
            body { background: white; padding: 0; margin: 0; }
            .worksheet { box-shadow: none; padding: 15mm; width: 100%; }
            .math-problem { break-inside: avoid; }
        }

        footer {
            text-align: center;
            font-size: 10px;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            margin-top: 30px;
            padding-top: 12px;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn btn-easy" id="easyBtn">🌱 Easy Level (x2, x3, x4, x5)</button>
    <button class="btn btn-middle" id="middleBtn">⭐ Middle Level (x6, x7, x8)</button>
    <button class="btn btn-hard" id="hardBtn">🔥 Hard Level (x9, x10, x11, x12)</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ Print / PDF</button>
    <div class="status-pill" id="statusMsg">✖️ Salam Times Tables · Ready</div>
</div>

<div class="worksheet" id="worksheetContainer">
    <div style="text-align: center; padding: 60px;">Loading Salam Adventures Times Tables...</div>
</div>

<script>
    const logoUrl = "https://salamtruthfulltd-alt.github.io/salam-adventures-games/Salam%20Adventures.png";
    
    const emojis = ["🐧", "🦁", "🐨", "🐼", "🐸", "🐙", "🦋", "🐞", "⭐", "🍎", "🌈", "⚽"];
    
    function getRandomEmoji() {
        return emojis[Math.floor(Math.random() * emojis.length)];
    }
    
    function drawArray(a, b, emoji) {
        let html = `<div class="array-grid">`;
        let showRows = Math.min(a, 5);
        let showCols = Math.min(b, 6);
        for (let i = 0; i < showRows; i++) {
            html += `<div class="array-row">`;
            for (let j = 0; j < showCols; j++) {
                html += `<span class="array-icon">${emoji}</span>`;
            }
            if (b > showCols) html += `<span style="font-size:12px;">+${b - showCols}</span>`;
            html += `</div>`;
        }
        if (a > showRows) html += `<div style="font-size:11px;">⋮ ${a - showRows} more rows</div>`;
        html += `</div>`;
        return html;
    }
    
    function drawGroups(a, b, emoji) {
        let html = `<div class="groups-container">`;
        let showGroups = Math.min(a, 4);
        for (let i = 0; i < showGroups; i++) {
            html += `<div class="group-box">`;
            html += `<div class="group-icons">`;
            let showIcons = Math.min(b, 5);
            for (let j = 0; j < showIcons; j++) {
                html += `${emoji} `;
            }
            if (b > showIcons) html += `<span style="font-size:10px;">+${b - showIcons}</span>`;
            html += `</div>`;
            html += `<div style="font-size:10px; margin-top:5px;">${b} each</div>`;
            html += `</div>`;
        }
        if (a > showGroups) html += `<div class="group-box" style="justify-content:center; display:flex; align-items:center;">+ ${a - showGroups} more</div>`;
        html += `</div>`;
        return html;
    }
    
    function drawNumberLineMultiplication(start, end, jumps, jumpSize, emoji) {
        let svg = `<svg width="260" height="55" xmlns="http://www.w3.org/2000/svg">`;
        svg += `<line x1="15" y1="25" x2="245" y2="25" stroke="#333" stroke-width="2"/>`;
        
        let step = (end - start) / 10;
        for (let i = start; i <= end; i += step) {
            let x = 15 + ((i - start) / (end - start)) * 230;
            svg += `<line x1="${x}" y1="20" x2="${x}" y2="30" stroke="#333" stroke-width="1"/>`;
            if (i % Math.ceil(end/5) === 0 || i === start || i === end) {
                svg += `<text x="${x}" y="48" text-anchor="middle" font-size="9" fill="#333">${Math.round(i)}</text>`;
            }
        }
        
        let current = start;
        for (let j = 0; j < jumps; j++) {
            let startX = 15 + ((current - start) / (end - start)) * 230;
            current += jumpSize;
            let endX = 15 + ((current - start) / (end - start)) * 230;
            svg += `<line x1="${startX}" y1="25" x2="${endX}" y2="25" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>`;
            svg += `<circle cx="${endX}" cy="25" r="4" fill="#10b981"/>`;
        }
        
        svg += `</svg>`;
        return svg;
    }
    
    function generateEasyProblems() {
        const problems = [];
        const multipliers = [2, 3, 4, 5];
        for (let i = 0; i < 8; i++) {
            const multiplier = multipliers[Math.floor(Math.random() * multipliers.length)];
            const num = Math.floor(Math.random() * 10) + 1;
            problems.push({ num1: multiplier, num2: num, answer: multiplier * num });
        }
        return problems;
    }
    
    function generateMiddleProblems() {
        const problems = [];
        const multipliers = [6, 7, 8];
        for (let i = 0; i < 8; i++) {
            const multiplier = multipliers[Math.floor(Math.random() * multipliers.length)];
            const num = Math.floor(Math.random() * 10) + 1;
            problems.push({ num1: multiplier, num2: num, answer: multiplier * num });
        }
        return problems;
    }
    
    function generateHardProblems() {
        const problems = [];
        const multipliers = [9, 10, 11, 12];
        for (let i = 0; i < 8; i++) {
            const multiplier = multipliers[Math.floor(Math.random() * multipliers.length)];
            const num = Math.floor(Math.random() * 12) + 1;
            problems.push({ num1: multiplier, num2: num, answer: multiplier * num });
        }
        return problems;
    }
    
    function renderEasy() {
        const problems = generateEasyProblems();
        const container = document.getElementById('worksheetContainer');
        
        let problemsHtml = '';
        for (let i = 0; i < problems.length; i += 2) {
            problemsHtml += `<div class="problem-row">`;
            for (let j = i; j < i + 2 && j < problems.length; j++) {
                const p = problems[j];
                const emoji = getRandomEmoji();
                
                let pictorialHtml = '';
                if (p.num2 <= 6) {
                    pictorialHtml = `
                        <div style="margin-bottom: 10px;"><strong>📦 ${p.num1} groups of ${p.num2}:</strong></div>
                        ${drawGroups(p.num1, p.num2, emoji)}
                        <div class="instruction">✨ ${p.num1} groups with ${p.num2} ${emoji} in each group</div>
                    `;
                } else {
                    pictorialHtml = `
                        <div style="margin-bottom: 10px;"><strong>📊 Array: ${p.num1} × ${p.num2}</strong></div>
                        ${drawArray(p.num1, p.num2, emoji)}
                        <div class="instruction">✨ Count the ${emoji} to find the total</div>
                    `;
                }
                
                problemsHtml += `
                    <div class="math-problem">
                        <div class="problem-number">Question ${j + 1}</div>
                        <div class="problem-text">${p.num1} × ${p.num2} = ______</div>
                        <div class="pictorial-container">
                            ${pictorialHtml}
                        </div>
                        <div class="answer-line"></div>
                    </div>
                `;
            }
            problemsHtml += `</div>`;
        }
        
        container.innerHTML = `
            <div class="header">
                <div class="brand">
                    <div class="logo-container">
                        <img src="${logoUrl}" class="salam-logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'logo-fallback\\'>س</div>'">
                    </div>
                    <div class="title">
                        <h1>Salam Adventures</h1>
                        <p>Times Tables · Easy Level (x2, x3, x4, x5)</p>
                    </div>
                </div>
                <div class="student-info">🧒 Name: ___________________<br>📅 Date: ___________________</div>
            </div>
            <div class="level-badge"><span class="level-tag level-easy">🌱 Easy Level · Times Tables x2, x3, x4, x5</span></div>
            <div class="problems-container">${problemsHtml}</div>
            <footer>🌟 Salam Adventures · Visual multiplication mastery · Easy level 🌟</footer>
        `;
    }
    
    function renderMiddle() {
        const problems = generateMiddleProblems();
        const container = document.getElementById('worksheetContainer');
        
        let problemsHtml = '';
        for (let i = 0; i < problems.length; i += 2) {
            problemsHtml += `<div class="problem-row">`;
            for (let j = i; j < i + 2 && j < problems.length; j++) {
                const p = problems[j];
                const emoji = getRandomEmoji();
                
                let pictorialHtml = `
                    <div style="margin-bottom: 10px;"><strong>📦 Groups of ${p.num2}:</strong></div>
                    ${drawGroups(p.num1, p.num2, emoji)}
                    <div class="instruction">✨ ${p.num1} groups of ${p.num2} = ${p.num1} × ${p.num2}</div>
                `;
                
                problemsHtml += `
                    <div class="math-problem">
                        <div class="problem-number">Question ${j + 1}</div>
                        <div class="problem-text">${p.num1} × ${p.num2} = ______</div>
                        <div class="pictorial-container">
                            ${pictorialHtml}
                        </div>
                        <div class="answer-line"></div>
                    </div>
                `;
            }
            problemsHtml += `</div>`;
        }
        
        container.innerHTML = `
            <div class="header">
                <div class="brand">
                    <div class="logo-container">
                        <img src="${logoUrl}" class="salam-logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'logo-fallback\\'>س</div>'">
                    </div>
                    <div class="title">
                        <h1>Salam Adventures</h1>
                        <p>Times Tables · Middle Level (x6, x7, x8)</p>
                    </div>
                </div>
                <div class="student-info">🧒 Name: ___________________<br>📅 Date: ___________________</div>
            </div>
            <div class="level-badge"><span class="level-tag level-middle">⭐ Middle Level · Times Tables x6, x7, x8</span></div>
            <div class="problems-container">${problemsHtml}</div>
            <footer>🌟 Salam Adventures · Visual multiplication mastery · Middle level 🌟</footer>
        `;
    }
    
    function renderHard() {
        const problems = generateHardProblems();
        const container = document.getElementById('worksheetContainer');
        
        let problemsHtml = '';
        for (let i = 0; i < problems.length; i += 2) {
            problemsHtml += `<div class="problem-row">`;
            for (let j = i; j < i + 2 && j < problems.length; j++) {
                const p = problems[j];
                const emoji = getRandomEmoji();
                
                let pictorialHtml = `
                    <div style="margin-bottom: 10px;"><strong>📊 Array Model:</strong></div>
                    ${drawArray(p.num1, Math.min(p.num2, 8), emoji)}
                    <div class="instruction">✨ ${p.num1} × ${p.num2} array (${p.num1} rows, ${p.num2} columns)</div>
                    <div style="margin-top: 12px;">
                        <div style="font-size:12px; margin-bottom:5px;">📏 Number line (${p.num1} jumps of ${p.num2}):</div>
                        ${drawNumberLineMultiplication(0, p.answer, p.num1, p.num2, emoji)}
                    </div>
                `;
                
                problemsHtml += `
                    <div class="math-problem">
                        <div class="problem-number">Question ${j + 1}</div>
                        <div class="problem-text">${p.num1} × ${p.num2} = ______</div>
                        <div class="pictorial-container">
                            ${pictorialHtml}
                        </div>
                        <div class="answer-line"></div>
                    </div>
                `;
            }
            problemsHtml += `</div>`;
        }
        
        const challengeNum1 = Math.floor(Math.random() * 10) + 3;
        const challengeNum2 = Math.floor(Math.random() * 10) + 3;
        
        container.innerHTML = `
            <div class="header">
                <div class="brand">
                    <div class="logo-container">
                        <img src="${logoUrl}" class="salam-logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'logo-fallback\\'>س</div>'">
                    </div>
                    <div class="title">
                        <h1>Salam Adventures</h1>
                        <p>Times Tables · Hard Level (x9, x10, x11, x12)</p>
                    </div>
                </div>
                <div class="student-info">🧒 Name: ___________________<br>📅 Date: ___________________</div>
            </div>
            <div class="level-badge"><span class="level-tag level-hard">🔥 Hard Level · Times Tables x9, x10, x11, x12</span></div>
            <div class="problems-container">${problemsHtml}</div>
            <div class="section">
                <div class="section-title">🏆 Challenge Word Problem</div>
                <div class="math-problem">
                    <div class="problem-text">A box holds ${challengeNum1} pencils. How many pencils are in ${challengeNum2} boxes?</div>
                    <div class="problem-text" style="font-size:20px;">${challengeNum1} × ${challengeNum2} = ______</div>
                    <div class="answer-line" style="height:50px;"></div>
                </div>
            </div>
            <footer>🌟 Salam Adventures · Visual multiplication mastery · Hard level 🌟</footer>
        `;
    }
    
    function updateStatus(msg) {
        const status = document.getElementById('statusMsg');
        status.innerHTML = msg;
        setTimeout(() => {
            status.innerHTML = '✖️ Salam Times Tables · Ready';
        }, 2000);
    }
    
    document.getElementById('easyBtn').addEventListener('click', () => { renderEasy(); updateStatus('🌱 Easy level worksheet ready!'); });
    document.getElementById('middleBtn').addEventListener('click', () => { renderMiddle(); updateStatus('⭐ Middle level worksheet ready!'); });
    document.getElementById('hardBtn').addEventListener('click', () => { renderHard(); updateStatus('🔥 Hard level worksheet ready!'); });
    
    renderEasy();
</script>
</body>
</html>
